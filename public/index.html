<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next Sailings — MSC Schedule Search</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --blue: #0284c7;
      --blue-bg: #f0f9ff;
      --blue-border: #bae6fd;
      --orange: #f59e0b;
      --orange-bg: #fffbeb;
      --orange-border: #fde68a;
      --red-bg: #fef2f2;
      --red-border: #fecaca;
      --red-text: #991b1b;
      --cutoff-bg: #fff7ed;
      --cutoff-border: #fed7aa;
      --cutoff-text: #9a3412;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #e2e8f0 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container { max-width: 940px; margin: 0 auto; padding: 28px 20px; }

    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
    header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

    .search-box {
      background: var(--card);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }

    .search-row {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .port-field { flex: 1; min-width: 200px; position: relative; }

    .port-field label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .port-btn {
      width: 100%;
      padding: 11px 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text3);
      transition: border-color 0.2s;
    }
    .port-btn.selected { color: var(--text); font-weight: 600; }
    .port-btn:hover { border-color: var(--blue); }
    .port-btn .arrow { font-size: 9px; transition: transform 0.2s; }
    .port-btn .arrow.open { transform: rotate(180deg); }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      z-index: 1000;
      max-height: 340px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dropdown-search {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    .dropdown-search input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .dropdown-search input:focus { border-color: var(--blue); }

    .dropdown-list { overflow-y: auto; max-height: 280px; }

    .dropdown-group {
      padding: 7px 14px 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      background: #f8fafc;
      position: sticky;
      top: 0;
    }

    .dropdown-item {
      width: 100%;
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      color: var(--text);
      transition: background 0.1s;
    }
    .dropdown-item:hover { background: #f8fafc; }
    .dropdown-item.active { background: var(--blue-bg); border-left-color: var(--blue); font-weight: 600; }
    .dropdown-item .code { font-size: 10px; color: var(--text3); font-family: monospace; }

    .search-arrow { display: flex; align-items: center; padding-bottom: 4px; font-size: 20px; color: #cbd5e1; }

    .search-btn {
      padding: 11px 30px;
      background: linear-gradient(135deg, #0284c7, #0369a1);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity 0.2s;
      letter-spacing: 0.02em;
    }
    .search-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .search-btn:not(:disabled):hover { opacity: 0.9; }

    .error {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
      color: var(--red-text);
      font-size: 14px;
    }

    .filters { margin-bottom: 18px; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .filter-label { font-size: 12px; color: var(--text3); font-weight: 600; margin-right: 4px; }

    .filter-btn {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text3);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
    }
    .filter-btn.active { border-color: var(--blue); background: var(--blue-bg); color: var(--blue); }

    .filter-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .filter-dot.direct { background: var(--blue); }
    .filter-dot.ts { background: var(--orange); }

    .filter-legend { margin-top: 8px; font-size: 12px; color: var(--text3); }

    .results { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card.expanded { box-shadow: 0 8px 30px rgba(0,0,0,0.08); }

    .card-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
    }
    .card-header:hover { background: #fafbfc; }

    .card-left { display: flex; align-items: center; gap: 12px; min-width: 180px; }

    .card-badge {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .card-badge.direct { background: linear-gradient(135deg, #0284c7, #0ea5e9); }
    .card-badge.ts { background: linear-gradient(135deg, #f59e0b, #f97316); }

    .card-vessel { font-size: 14px; font-weight: 700; color: var(--text); }
    .card-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .card-right { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }

    .date-col { text-align: center; }
    .date-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.05em; }
    .date-val { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 1px; }

    .card-arrow-icon { font-size: 16px; color: #cbd5e1; }

    .tt-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .tt-badge.direct { background: var(--blue-bg); border: 1px solid var(--blue-border); color: var(--blue); }
    .tt-badge.ts { background: var(--orange-bg); border: 1px solid var(--orange-border); color: #d97706; }

    .ts-tag {
      padding: 3px 9px;
      border-radius: 6px;
      background: #fef3c7;
      font-size: 11px;
      font-weight: 600;
      color: #92400e;
    }

    .expand-arrow { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
    .expand-arrow.open { transform: rotate(180deg); }

    .card-body {
      border-top: 1px solid #f1f5f9;
      padding: 16px 20px;
      background: #fafbfc;
    }

    .cutoffs {
      margin-bottom: 14px;
      padding: 9px 13px;
      background: var(--cutoff-bg);
      border-radius: 8px;
      border: 1px solid var(--cutoff-border);
      font-size: 11px;
      color: var(--cutoff-text);
      line-height: 1.6;
    }
    .cutoffs b { font-weight: 700; }

    .leg { margin-bottom: 12px; }
    .leg:last-child { margin-bottom: 0; }

    .leg-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .leg-title.first { color: var(--blue); }
    .leg-title.connecting { color: #d97706; }

    .leg-vessel { font-size: 13px; font-weight: 600; color: var(--text); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
    .leg-voyage { font-size: 11px; color: var(--text3); font-family: monospace; }
    .leg-service-tag { font-size: 11px; padding: 1px 7px; background: #f1f5f9; border-radius: 4px; color: var(--text2); }

    .leg-route { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
    .leg-dates { font-size: 12px; color: var(--text3); margin-bottom: 2px; }

    .port-calls { margin-top: 8px; margin-left: 12px; border-left: 2px solid var(--border); padding-left: 14px; }
    .port-call { font-size: 12px; color: var(--text3); margin-bottom: 3px; display: flex; gap: 7px; align-items: baseline; }
    .port-call .dot { color: var(--text3); font-size: 8px; }
    .port-call .pc-name { font-weight: 500; color: var(--text2); }
    .port-call .pc-code { font-family: monospace; font-size: 10px; }
    .port-call .pc-time { font-size: 11px; }

    .co2 { margin-top: 10px; font-size: 11px; color: var(--text3); }

    .show-more {
      text-align: center;
      margin-top: 16px;
    }

    .show-more button {
      padding: 9px 26px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      font-family: inherit;
    }
    .show-more button:hover { background: var(--blue-bg); }

    .timestamp { margin-top: 18px; text-align: center; font-size: 11px; color: var(--text3); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state .title { font-size: 16px; font-weight: 500; }
    .empty-state .sub { font-size: 13px; margin-top: 5px; }

    .loading { text-align: center; padding: 50px 20px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text3); }

    @media (max-width: 640px) {
      .search-row { flex-direction: column; }
      .search-arrow { display: none; }
      .port-field { min-width: 100%; }
      .search-btn { width: 100%; }
      .card-header { padding: 14px 16px; }
      .card-right { gap: 14px; }
      .card-body { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    const PORTS = [
      { region: "China", ports: [
        { id: 441, name: "Ningbo", code: "CNNGB" },
        { id: 444, name: "Shanghai", code: "CNSHA" },
        { id: 446, name: "Qingdao", code: "CNTAO" },
        { id: 448, name: "Xiamen", code: "CNXMN" },
        { id: 2, name: "Yantian", code: "CNYTN" },
        { id: 30, name: "Shekou", code: "CNSHK" },
        { id: 900, name: "Nansha", code: "CNNSA" },
        { id: 343, name: "Hong Kong", code: "HKHKG" },
        { id: 438, name: "Fuzhou", code: "CNFOC" },
        { id: 463, name: "Dalian", code: "CNDLC" },
        { id: 1298, name: "Tianjin Xingang", code: "CNTSN" },
        { id: 440, name: "Lianyungang", code: "CNLYG" },
      ]},
      { region: "East Asia", ports: [
        { id: 95, name: "Kaohsiung", code: "TWKHH" },
        { id: 274, name: "Busan", code: "KRPUS" },
        { id: 279, name: "Tomakomai", code: "JPTMK" },
        { id: 281, name: "Matsuyama", code: "JPMYJ" },
        { id: 282, name: "Nagoya", code: "JPNGO" },
      ]},
      { region: "Southeast Asia", ports: [
        { id: 122, name: "Singapore", code: "SGSIN" },
        { id: 221, name: "Port Klang", code: "MYPKG" },
        { id: 220, name: "Pasir Gudang", code: "MYPGU" },
        { id: 1292, name: "Vung Tau", code: "VNVUT" },
        { id: 51, name: "Haiphong", code: "VNHPH" },
        { id: 336, name: "Jakarta", code: "IDJKT" },
        { id: 328, name: "Surabaya", code: "IDSUB" },
      ]},
      { region: "South Asia", ports: [
        { id: 252, name: "Colombo", code: "LKCMB" },
        { id: 311, name: "Tuticorin", code: "INTUT" },
        { id: 1516, name: "Ennore", code: "INENO" },
        { id: 16, name: "Mundra", code: "INMUN" },
        { id: 1362, name: "Hazira", code: "INHZA" },
      ]},
      { region: "Brasil", ports: [
        { id: 475, name: "Santos", code: "BRSSZ" },
        { id: 1032, name: "Navegantes", code: "BRNVT" },
        { id: 479, name: "Itajaí", code: "BRITJ" },
        { id: 480, name: "Paranaguá", code: "BRPNG" },
        { id: 1281, name: "Itapoá", code: "BRIOA" },
        { id: 470, name: "Rio Grande", code: "BRRIG" },
        { id: 471, name: "Rio de Janeiro", code: "BRRIO" },
        { id: 473, name: "Salvador", code: "BRSSA" },
        { id: 19, name: "Suape", code: "BRSUA" },
        { id: 332, name: "Pecém", code: "BRPEC" },
        { id: 476, name: "Vitória", code: "BRVIX" },
        { id: 1088, name: "Manaus", code: "BRMAO" },
      ]},
      { region: "South America", ports: [
        { id: 512, name: "Buenos Aires", code: "ARBUE" },
      ]},
      { region: "Europe", ports: [
        { id: 401, name: "Valencia", code: "ESVLC" },
        { id: 377, name: "Le Havre", code: "FRLEH" },
        { id: 300, name: "Genoa", code: "ITGOA" },
        { id: 1466, name: "Vado Ligure", code: "ITVDL" },
        { id: 429, name: "Bremerhaven", code: "DEBRV" },
        { id: 481, name: "Antwerp", code: "BEANR" },
        { id: 149, name: "Leixões", code: "PTLEI" },
        { id: 319, name: "Haifa", code: "ILHFA" },
      ]},
      { region: "Africa", ports: [
        { id: 125, name: "Dakar", code: "SNDKR" },
        { id: 126, name: "Berbera", code: "SOBBO" },
        { id: 127, name: "Mogadishu", code: "SOMGQ" },
      ]},
    ];

    const ALL_PORTS = PORTS.flatMap(g => g.ports);

    let state = {
      from: null,
      to: null,
      fromOpen: false,
      toOpen: false,
      fromSearch: "",
      toSearch: "",
      loading: false,
      error: null,
      results: null,
      serviceFilter: "ALL",
      maxShow: 5,
    };

    function findPort(id) { return ALL_PORTS.find(p => p.id === id); }

    function fmtDate(d) {
      if (!d) return "—";
      const dt = new Date(d);
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${String(dt.getDate()).padStart(2,"0")}/${months[dt.getMonth()]}/${dt.getFullYear()}`;
    }

    function fmtTime(d) {
      if (!d) return "";
      const dt = new Date(d);
      return `${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
    }

    function ttDays(dep, arr) {
      if (!dep || !arr) return "—";
      return Math.round((new Date(arr) - new Date(dep)) / 86400000);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderDropdown(type) {
      const search = type === "from" ? state.fromSearch : state.toSearch;
      const current = type === "from" ? state.from : state.to;
      const filtered = PORTS.map(g => ({
        ...g,
        ports: g.ports.filter(p =>
          p.name.toLowerCase().includes(search.toLowerCase()) ||
          p.code.toLowerCase().includes(search.toLowerCase())
        ),
      })).filter(g => g.ports.length > 0);

      return `
        <div class="dropdown">
          <div class="dropdown-search">
            <input type="text" placeholder="Search port..." value="${esc(search)}"
              oninput="state.${type}Search=this.value;render()" autofocus />
          </div>
          <div class="dropdown-list">
            ${filtered.map(g => `
              <div class="dropdown-group">${esc(g.region)}</div>
              ${g.ports.map(p => `
                <button class="dropdown-item ${p.id === current ? 'active' : ''}"
                  onclick="state.${type}=${p.id};state.${type}Open=false;state.${type}Search='';render()">
                  <span>${esc(p.name)}</span>
                  <span class="code">${esc(p.code)}</span>
                </button>
              `).join("")}
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderSailingCard(route, idx) {
      const legs = route.RouteScheduleLegDetails || [];
      const firstLeg = legs[0] || {};
      const isDirect = legs.length === 1 && firstLeg.SingleLegOnly;
      const vessel = firstLeg.Vessel?.VesselName || "TBN";
      const voyage = firstLeg.DepartureVoyageNo || "";
      const service = firstLeg.MaritimeServiceName || "";
      const etd = route.EstimatedDepartureDate;
      const lastLeg = legs[legs.length - 1] || {};
      const eta = route.EstimatedArrivalDate || lastLeg.EstimatedArrivalTime;
      const tt = ttDays(etd, eta);
      const cutoffs = route.CutOffs || {};
      const tsPort = legs.length > 1 ? legs.slice(1).find(l => l.DeparturePortName) : null;
      const id = `card-${idx}`;

      let cutoffHtml = "";
      if (cutoffs.ContainerYardCutOffDate) {
        cutoffHtml = `
          <div class="cutoffs">
            <b>CY Cut-off:</b> ${esc(cutoffs.ContainerYardCutOffDate)}
            ${cutoffs.ShippingInstructionsCutOffDate ? ` &nbsp;|&nbsp; <b>SI:</b> ${esc(cutoffs.ShippingInstructionsCutOffDate)}` : ""}
            ${cutoffs.VerifiedGrossMassCutOffDate ? ` &nbsp;|&nbsp; <b>VGM:</b> ${esc(cutoffs.VerifiedGrossMassCutOffDate)}` : ""}
            ${cutoffs.ReeferCutOffDate ? `<br><b>Reefer:</b> ${esc(cutoffs.ReeferCutOffDate)}` : ""}
            ${cutoffs.DangerousCargoCutOffDate ? ` &nbsp;|&nbsp; <b>DG:</b> ${esc(cutoffs.DangerousCargoCutOffDate)}` : ""}
          </div>
        `;
      }

      let legsHtml = legs.map((leg, li) => {
        let title = "";
        if (legs.length > 1) {
          if (li === 0) title = `<div class="leg-title first">1st Vessel</div>`;
          else if (leg.LastLeg && !leg.DeparturePortName) title = `<div class="leg-title connecting">Arrival</div>`;
          else title = `<div class="leg-title connecting">${li + 1}° Vessel — ${esc(leg.MaritimeServiceName || "Connecting")}</div>`;
        }

        let vesselLine = "";
        if (leg.DeparturePortName) {
          vesselLine = `
            <div class="leg-vessel">
              <span>${esc(leg.Vessel?.VesselName || "TBN")}</span>
              <span class="leg-voyage">${esc(leg.DepartureVoyageNo || "")}</span>
              ${leg.MaritimeServiceName ? `<span class="leg-service-tag">${esc(leg.MaritimeServiceName)}</span>` : ""}
            </div>
            <div class="leg-route">
              ${esc(leg.DeparturePortName)} (${esc(leg.DeparturePortUNCode || "")}) → ${leg.ArrivalPortName ? `${esc(leg.ArrivalPortName)} (${esc(leg.ArrivalPortUNCode || "")})` : "..."}
            </div>
            <div class="leg-dates">
              ETD: ${fmtDate(leg.EstimatedDepartureTime)} ${fmtTime(leg.EstimatedDepartureTime)}
              ${leg.EstimatedArrivalTime ? ` — ETA: ${fmtDate(leg.EstimatedArrivalTime)} ${fmtTime(leg.EstimatedArrivalTime)}` : ""}
            </div>
          `;
        } else if (leg.ArrivalPortName) {
          vesselLine = `
            <div class="leg-route">→ ${esc(leg.ArrivalPortName)} (${esc(leg.ArrivalPortUNCode || "")}) — ETA: ${fmtDate(leg.EstimatedArrivalTime)} ${fmtTime(leg.EstimatedArrivalTime)}</div>
          `;
        }

        let pcHtml = "";
        if (leg.PortCalls && leg.PortCalls.length > 0) {
          pcHtml = `
            <div class="port-calls">
              ${leg.PortCalls.map(pc => `
                <div class="port-call">
                  <span class="dot">●</span>
                  <span class="pc-name">${esc(pc.PortName)}</span>
                  <span class="pc-code">(${esc(pc.PortCode)})</span>
                  <span class="pc-time">
                    ${pc.EstimatedArrivalHour ? `arr ${esc(pc.EstimatedArrivalHour)}` : ""}
                    ${pc.EstimatedDepartureHour ? ` → dep ${esc(pc.EstimatedDepartureHour)}` : ""}
                  </span>
                </div>
              `).join("")}
            </div>
          `;
        }

        return `<div class="leg">${title}${vesselLine}${pcHtml}</div>`;
      }).join("");

      return `
        <div class="card" id="${id}">
          <div class="card-header" onclick="toggleCard('${id}')">
            <div class="card-left">
              <div class="card-badge ${isDirect ? 'direct' : 'ts'}">${isDirect ? "D" : "T"}</div>
              <div>
                <div class="card-vessel">${esc(vessel)}</div>
                <div class="card-meta">${esc(voyage)} · ${esc(service)}</div>
              </div>
            </div>
            <div class="card-right">
              <div class="date-col">
                <div class="date-label">ETD</div>
                <div class="date-val">${fmtDate(etd)}</div>
              </div>
              <span class="card-arrow-icon">→</span>
              <div class="date-col">
                <div class="date-label">ETA</div>
                <div class="date-val">${fmtDate(eta)}</div>
              </div>
              <span class="tt-badge ${isDirect ? 'direct' : 'ts'}">${tt}d</span>
              ${!isDirect && tsPort ? `<span class="ts-tag">T/S ${esc(tsPort.DeparturePortName)}</span>` : ""}
              <span class="expand-arrow" id="arrow-${id}">▼</span>
            </div>
          </div>
          <div class="card-body" id="body-${id}" style="display:none;">
            ${cutoffHtml}
            ${legsHtml}
            ${route.CO2FootPrint ? `<div class="co2">CO₂: ${esc(route.CO2FootPrint)}</div>` : ""}
          </div>
        </div>
      `;
    }

    function toggleCard(id) {
      const body = document.getElementById("body-" + id);
      const arrow = document.getElementById("arrow-" + id);
      const card = document.getElementById(id);
      if (body.style.display === "none") {
        body.style.display = "block";
        arrow.classList.add("open");
        card.classList.add("expanded");
      } else {
        body.style.display = "none";
        arrow.classList.remove("open");
        card.classList.remove("expanded");
      }
    }

    function render() {
      const fromPort = findPort(state.from);
      const toPort = findPort(state.to);

      let content = `
        <header>
          <h1>⚓ Next Sailings</h1>
          <p>MSC Schedule Search</p>
        </header>
        <div class="search-box">
          <div class="search-row">
            <div class="port-field">
              <label><span>🚢</span> Origin</label>
              <button class="port-btn ${fromPort ? 'selected' : ''}" onclick="state.fromOpen=!state.fromOpen;state.toOpen=false;render()">
                <span>${fromPort ? `${esc(fromPort.name)} (${esc(fromPort.code)})` : "Select port..."}</span>
                <span class="arrow ${state.fromOpen ? 'open' : ''}">▼</span>
              </button>
              ${state.fromOpen ? renderDropdown("from") : ""}
            </div>
            <div class="search-arrow">→</div>
            <div class="port-field">
              <label><span>📍</span> Destination</label>
              <button class="port-btn ${toPort ? 'selected' : ''}" onclick="state.toOpen=!state.toOpen;state.fromOpen=false;render()">
                <span>${toPort ? `${esc(toPort.name)} (${esc(toPort.code)})` : "Select port..."}</span>
                <span class="arrow ${state.toOpen ? 'open' : ''}">▼</span>
              </button>
              ${state.toOpen ? renderDropdown("to") : ""}
            </div>
            <button class="search-btn" ${!state.from || !state.to || state.loading ? 'disabled' : ''} onclick="doSearch()">
              ${state.loading ? "Searching..." : "Search"}
            </button>
          </div>
        </div>
      `;

      if (state.error) {
        content += `<div class="error">${esc(state.error)}</div>`;
      }

      if (state.loading) {
        content += `
          <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">Searching MSC schedules...</div>
          </div>
        `;
      }

      if (state.results && !state.loading) {
        const data = state.results.Data;
        const services = [...new Set(data.map(d => d.Key.MaritimeServiceName))].sort();

        const filtered = state.serviceFilter === "ALL" ? data : data.filter(d => d.Key.MaritimeServiceName === state.serviceFilter);

        const allRoutes = filtered
          .flatMap(d => d.Routes.map(r => ({ ...r, _service: d.Key.MaritimeServiceName, _isDirect: d.Key.IsDirectRoute })))
          .sort((a, b) => new Date(a.EstimatedDepartureDate) - new Date(b.EstimatedDepartureDate));

        const displayed = allRoutes.slice(0, state.maxShow);
        const totalAll = data.flatMap(d => d.Routes).length;

        content += `
          <div class="filters">
            <div class="filter-row">
              <span class="filter-label">Service:</span>
              <button class="filter-btn ${state.serviceFilter === 'ALL' ? 'active' : ''}" onclick="state.serviceFilter='ALL';state.maxShow=5;render()">
                All (${totalAll})
              </button>
              ${services.map(s => {
                const d = data.find(x => x.Key.MaritimeServiceName === s);
                const count = d?.Routes.length || 0;
                const isDirect = d?.Key.IsDirectRoute;
                return `
                  <button class="filter-btn ${state.serviceFilter === s ? 'active' : ''}" onclick="state.serviceFilter='${esc(s)}';state.maxShow=5;render()">
                    <span class="filter-dot ${isDirect ? 'direct' : 'ts'}"></span>
                    ${esc(s)} (${count})
                  </button>
                `;
              }).join("")}
            </div>
            <div class="filter-legend">
              ${fromPort ? esc(fromPort.name) : ""} → ${toPort ? esc(toPort.name) : ""} ·
              <span style="color:var(--blue)">●</span> Direct &nbsp;
              <span style="color:var(--orange)">●</span> Transshipment
            </div>
          </div>
          <div class="results">
            ${displayed.map((r, i) => renderSailingCard(r, i)).join("")}
          </div>
        `;

        if (allRoutes.length > state.maxShow) {
          content += `
            <div class="show-more">
              <button onclick="state.maxShow+=5;render()">Show more (${allRoutes.length - state.maxShow} remaining)</button>
            </div>
          `;
        }

        if (state.results.ResultTimestamp) {
          content += `<div class="timestamp">${esc(state.results.ResultTimestamp)}</div>`;
        }
      }

      if (!state.results && !state.error && !state.loading) {
        content += `
          <div class="empty-state">
            <div class="icon">🚢</div>
            <div class="title">Select origin and destination to search</div>
            <div class="sub">Next available MSC sailings will be shown</div>
          </div>
        `;
      }

      document.getElementById("app").innerHTML = content;

      // Focus search inputs if dropdown is open
      if (state.fromOpen || state.toOpen) {
        const inp = document.querySelector(".dropdown-search input");
        if (inp) inp.focus();
      }
    }

    async function doSearch() {
      if (!state.from || !state.to) return;
      state.loading = true;
      state.error = null;
      state.results = null;
      state.serviceFilter = "ALL";
      state.maxShow = 5;
      render();

      try {
        const res = await fetch(`/api/schedules?fromPortId=${state.from}&toPortId=${state.to}`);
        const data = await res.json();
        if (!data.IsSuccess || !data.Data || !Array.isArray(data.Data) || data.Data.length === 0) {
          state.error = typeof data.Data === "string" ? data.Data : "No results found for this port pair.";
        } else {
          state.results = data;
        }
      } catch (e) {
        state.error = "Failed to connect. Please try again.";
      }
      state.loading = false;
      render();
    }

    // Close dropdowns when clicking outside
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".port-field")) {
        if (state.fromOpen || state.toOpen) {
          state.fromOpen = false;
          state.toOpen = false;
          render();
        }
      }
    });

    render();
  </script>
</body>
</html>
