<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Next Sailings — Schedule Search</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--blue:#0284c7;--blue-bg:#f0f9ff;--blue-border:#bae6fd;--orange:#f59e0b;--orange-bg:#fffbeb;--orange-border:#fde68a;--radius:12px;--green:#16a34a;--msc:#d97706;--msc-bg:#fffbeb;--msc-border:#fde68a;--cma:#e4002b;--cma-bg:#fff1f2;--cma-border:#fecdd3;--maersk:#42b0d5;--maersk-bg:#ecfbff;--maersk-border:#bae6fd;--hmm:#003a70;--hmm-bg:#eef2ff;--hmm-border:#c7d2fe}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg) 0%,#e2e8f0 100%);color:var(--text);min-height:100vh}
    .container{max-width:980px;margin:0 auto;padding:28px 20px}
    header{text-align:center;margin-bottom:28px}
    header h1{font-size:28px;font-weight:700;letter-spacing:-0.02em}
    header p{font-size:13px;color:var(--text3);margin-top:4px}
    .search-box{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:24px}
    .search-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
    .port-field{flex:1;min-width:200px;position:relative}
    .port-field label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
    .port-btn{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;color:var(--text3);transition:border-color .2s}
    .port-btn.selected{color:var(--text);font-weight:600}
    .port-btn:hover{border-color:var(--blue)}
    .port-btn .arrow{font-size:9px;transition:transform .2s}
    .port-btn .arrow.open{transform:rotate(180deg)}
    .dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.15);z-index:1000;max-height:340px;display:flex;flex-direction:column;overflow:hidden}
    .dropdown-search{padding:10px 12px;border-bottom:1px solid #f1f5f9}
    .dropdown-search input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;direction:ltr;text-align:left}
    .dropdown-search input:focus{border-color:var(--blue)}
    .dropdown-list{overflow-y:auto;max-height:280px}
    .dropdown-group{padding:7px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:#f8fafc;position:sticky;top:0}
    .dropdown-item{width:100%;padding:9px 14px;background:transparent;border:none;border-left:3px solid transparent;font-size:14px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;color:var(--text);transition:background .1s}
    .dropdown-item:hover{background:#f8fafc}
    .dropdown-item.active{background:var(--blue-bg);border-left-color:var(--blue);font-weight:600}
    .dropdown-item .code{font-size:11px;color:var(--text3);font-family:monospace}
    .search-arrow{display:flex;align-items:center;padding-bottom:4px;font-size:20px;color:#cbd5e1}
    .search-btn{padding:12px 30px;background:linear-gradient(135deg,#0284c7,#0369a1);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s}
    .search-btn:disabled{background:#cbd5e1;cursor:not-allowed}
    .clear-search{padding:12px 16px;background:var(--card);border:1.5px solid #ef4444;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#ef4444;white-space:nowrap}
    .clear-search:hover{background:#fef2f2}
    .carrier-row{display:flex;gap:6px;padding-top:12px;border-top:1px solid #f1f5f9;margin-top:14px;width:100%}
    .carrier-btn{padding:10px 20px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;flex:1;transition:all .15s;background:var(--card);color:var(--text2)}
    .carrier-btn:hover{border-color:var(--blue);background:#f8fafc}
    .carrier-btn.msc-active{border-color:var(--msc);background:var(--msc-bg);color:var(--msc)}
    .carrier-btn.cma-active{border-color:var(--cma);background:var(--cma-bg);color:var(--cma)}
    .carrier-btn.maersk-active{border-color:var(--maersk);background:var(--maersk-bg);color:var(--maersk)}
    .carrier-btn.hmm-active{border-color:var(--hmm);background:var(--hmm-bg);color:var(--hmm)}
    .error{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;color:#991b1b;font-size:14px}
    .filters{margin-bottom:14px}
    .filter-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
    .filter-label{font-size:12px;color:var(--text3);font-weight:600;margin-right:4px}
    .fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
    .fbtn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .fbtn.clear{border-color:#ef4444;color:#ef4444}.fbtn.clear:hover{background:#fef2f2}
    .fdot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .fdot.direct{background:var(--blue)}.fdot.ts{background:var(--orange)}
    .filter-legend{margin-top:8px;font-size:12px;color:var(--text3)}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .tbtn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
    .tbtn.green{border-color:var(--green);background:#f0fdf4;color:var(--green)}.tbtn.green:hover{background:var(--green);color:#fff}
    .tbtn.red{border-color:#ef4444;background:#fef2f2;color:#ef4444}.tbtn.red:hover{background:#ef4444;color:#fff}
    .saved-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px}
    .results{display:flex;flex-direction:column;gap:12px}
    .card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s}
    .card.expanded{box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .card.saved-card{border-left:3px solid var(--green)}
    .card-header{padding:18px 22px;cursor:pointer;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}
    .card-header:hover{background:#fafbfc}
    .card-left{display:flex;align-items:center;gap:14px;min-width:200px}
    .card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .card-icon.direct{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
    .card-icon.ts{background:linear-gradient(135deg,#fef3c7,#fde68a)}
    .card-vessel{font-size:16px;font-weight:700;color:var(--text)}
    .card-meta{font-size:12px;color:var(--text3);margin-top:2px}
    .carrier-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;margin-right:4px}
    .carrier-tag.msc{background:#fef3c7;color:#92400e}
    .carrier-tag.cma{background:#fecdd3;color:#9f1239}
    .carrier-tag.maersk{background:var(--maersk-bg);color:#0369a1}
    .carrier-tag.hmm{background:var(--hmm-bg);color:var(--hmm)}
    .card-right{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
    .date-col{text-align:center}
    .date-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em}
    .date-val{font-size:15px;font-weight:600;color:var(--text);margin-top:1px}
    .tt-badge{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700}
    .tt-badge.direct{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue)}
    .tt-badge.ts{background:var(--orange-bg);border:1px solid var(--orange-border);color:#d97706}
    .ts-tag{padding:4px 10px;border-radius:6px;background:#fef3c7;font-size:12px;font-weight:600;color:#92400e}
    .save-cb{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
    .expand-arrow{font-size:11px;color:var(--text3);transition:transform .2s}
    .expand-arrow.open{transform:rotate(180deg)}
    .card-body{border-top:1px solid #f1f5f9;padding:20px 24px;background:#fafbfc}
    .leg{margin-bottom:16px}.leg:last-child{margin-bottom:0}
    .leg-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .leg-title.first{color:var(--blue)}.leg-title.connecting{color:#d97706}.leg-title.arrival{color:var(--green)}
    .leg-vessel{font-size:15px;font-weight:600;color:var(--text);display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
    .leg-voyage{font-size:12px;color:var(--text3);font-family:monospace}
    .leg-service-tag{font-size:12px;padding:2px 8px;background:#f1f5f9;border-radius:4px;color:var(--text2)}
    .leg-route{font-size:14px;color:var(--text2);margin-bottom:4px}
    .leg-dates{font-size:13px;color:var(--text3)}
    .port-calls{margin-top:10px;margin-left:14px;border-left:2px solid var(--border);padding-left:16px}
    .port-call{font-size:13px;color:var(--text3);margin-bottom:5px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
    .port-call .dot{color:#cbd5e1;font-size:8px}
    .port-call .pc-name{font-weight:600;color:var(--text2)}
    .port-call .pc-code{font-family:monospace;font-size:11px;color:var(--text3)}
    .port-call .pc-date{font-size:12px;color:var(--text3)}
    .co2{margin-top:12px;font-size:12px;color:var(--text3)}
    .show-more{text-align:center;margin-top:16px}
    .show-more button{padding:10px 28px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;font-family:inherit}
    .timestamp{margin-top:18px;text-align:center;font-size:11px;color:var(--text3)}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
    .empty-state .icon{font-size:52px;margin-bottom:14px}
    .empty-state .title{font-size:17px;font-weight:500}
    .empty-state .sub{font-size:14px;margin-top:5px}
    .loading{text-align:center;padding:50px 20px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pm-float{position:fixed;bottom:16px;right:16px;z-index:900}
    .pm-toggle{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .pm-toggle:hover{background:#f8fafc}
    .pm-panel{position:fixed;bottom:60px;right:16px;width:340px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:16px;z-index:901;display:none}
    .pm-panel.open{display:block}
    .pm-panel h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
    .pm-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .pm-row input,.pm-row select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;outline:none;direction:ltr;text-align:left}
    .pm-row input:focus{border-color:var(--blue)}

    /* === Meus Filtros (saved batch filters) === */
    .mf-float{position:fixed;bottom:16px;right:60px;z-index:900}
    .mf-toggle{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .mf-toggle:hover{background:#f8fafc}
    .mf-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
    .mf-backdrop.open{display:flex}
    .mf-modal{background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
    .mf-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .mf-header h2{font-size:18px;font-weight:700;color:var(--text)}
    .mf-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);padding:4px 8px}
    .mf-close:hover{color:var(--text)}
    .mf-body{padding:18px 22px;overflow-y:auto;flex:1}
    .mf-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .mf-btn{padding:9px 18px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--card);color:var(--text2);transition:all .15s}
    .mf-btn:hover{border-color:var(--blue);background:#f8fafc}
    .mf-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
    .mf-btn.primary:hover{background:#0369a1;border-color:#0369a1}
    .mf-btn.green{background:var(--green);color:#fff;border-color:var(--green)}
    .mf-btn.green:hover{background:#15803d}
    .mf-btn.red{border-color:#ef4444;color:#ef4444}
    .mf-btn.red:hover{background:#fef2f2}
    .mf-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
    .mf-list{display:flex;flex-direction:column;gap:10px}
    .mf-item{border:1px solid var(--border);border-radius:12px;padding:14px 16px}
    .mf-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
    .mf-item-name{font-size:15px;font-weight:700;color:var(--text)}
    .mf-item-count{font-size:12px;color:var(--text3)}
    .mf-item-actions{display:flex;gap:6px}
    .mf-item-routes{font-size:12px;color:var(--text2);line-height:1.6}
    .mf-item-route{padding:3px 0;display:flex;gap:6px;align-items:center}
    .mf-route-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700}
    .mf-route-tag.msc{background:var(--msc-bg);color:var(--msc)}
    .mf-route-tag.cma{background:var(--cma-bg);color:var(--cma)}
    .mf-route-tag.maersk{background:var(--maersk-bg);color:#0369a1}
    .mf-route-tag.hmm{background:var(--hmm-bg);color:var(--hmm)}
    .mf-field{margin-bottom:12px}
    .mf-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .mf-field input,.mf-field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none}
    .mf-field input:focus,.mf-field select:focus{border-color:var(--blue)}
    .mf-route-form{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;background:#f8fafc}
    .mf-route-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 80px auto;gap:8px;align-items:end}
    .mf-route-grid label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;display:block}
    .mf-route-grid select,.mf-route-grid input{padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;outline:none;width:100%}
    .mf-rm-route{padding:6px 8px;background:var(--card);border:1.5px solid #ef4444;border-radius:6px;color:#ef4444;cursor:pointer;font-size:14px;font-family:inherit}
    .mf-rm-route:hover{background:#fef2f2}
    .mf-add-route{width:100%;padding:10px;background:var(--card);border:1.5px dashed var(--border);border-radius:10px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    .mf-add-route:hover{border-color:var(--blue);color:var(--blue);background:#f8fafc}
    .mf-progress{padding:16px}
    .mf-progress-item{padding:8px 0;font-size:13px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #f1f5f9}
    .mf-progress-item:last-child{border-bottom:none}
    .mf-progress-icon{font-size:16px;flex-shrink:0;width:20px}
    .mf-progress-text{flex:1}
    .mf-progress-result{font-size:11px;color:var(--text3)}

    @media(max-width:640px){.mf-route-grid{grid-template-columns:1fr 1fr;gap:6px}.mf-route-grid>*:last-child{grid-column:1/-1;justify-self:start}}
    .pm-add{padding:6px 12px;border:none;border-radius:6px;background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .cma-detail{font-size:13px;color:var(--text2);line-height:1.6}
    .cma-detail strong{color:var(--text)}
    @media(max-width:640px){.search-row{flex-direction:column}.search-arrow{display:none}.port-field{min-width:100%}.search-btn{width:100%}.card-header{padding:14px 16px}.card-body{padding:16px 18px}.pm-panel{width:calc(100% - 32px);right:16px}.carrier-row{flex-direction:column}}
  </style>
</head>
<body>
<div class="container" id="app"></div>
<div class="mf-float">
  <button class="mf-toggle" onclick="openMyFilters()" title="Meus Filtros">📋</button>
</div>
<div class="pm-float">
  <button class="pm-toggle" onclick="togglePM()" title="Manage ports">⚙️</button>
  <div class="pm-panel" id="pmPanel">
    <h3>⚙️ Add Custom Port</h3>
    <div class="pm-row">
      <input id="pm-name" placeholder="Name" style="flex:1;min-width:80px"/>
      <input id="pm-id" placeholder="MSC ID" type="number" style="width:60px"/>
      <input id="pm-code" placeholder="LOCODE" maxlength="5" style="width:70px"/>
    </div>
    <div class="pm-row">
      <select id="pm-region" style="flex:1"><option>China</option><option>East Asia</option><option>Southeast Asia</option><option>South Asia</option><option>Middle East</option><option>Brasil</option><option>South America</option><option>Europe</option><option>Africa</option></select>
      <button class="pm-add" onclick="addPort()">+ Add</button>
    </div>
  </div>
</div>

<!-- Meus Filtros: modal backdrop (hidden by default, controlled by openMyFilters/closeMyFilters) -->
<div class="mf-backdrop" id="mfBackdrop" onclick="if(event.target===this)closeMyFilters()">
  <div class="mf-modal" id="mfModal"></div>
</div>

<script>
const BUILTIN_PORTS=[

{id:9001,name:"Wenzhou",code:"CNWNZ"},{id:9002,name:"Taicang",code:"CNTAC"},{id:9003,name:"Nanjing",code:"CNNJG"},{id:9004,name:"Zhanjiang",code:"CNZJG"},{id:9005,name:"Quanzhou",code:"CNQZJ"},{id:9006,name:"Jiangmen",code:"CNJMN"},{id:9007,name:"Zhongshan",code:"CNZSN"}
]},

const WORKER="https://msc-proxy.cacatu00007.workers.dev";
window._customPorts=[];
function loadCP(){return window._customPorts}
function getPorts(){
  const cp=loadCP();if(!cp.length)return BUILTIN_PORTS;
  const groups=BUILTIN_PORTS.map(g=>({...g,ports:g.ports.map(p=>({...p}))}));
  cp.forEach(p=>{
    // Check if a port with the same LOCODE already exists (merge MSC ID)
    let merged=false;
    for(const g of groups){
      const existing=g.ports.find(x=>x.code===p.code);
      if(existing){existing.id=p.id;if(p.name)existing.name=p.name;merged=true;break}
    }
    if(!merged){
      // Check by ID too (backward compat)
      const gByRegion=groups.find(x=>x.region===p.region);
      if(gByRegion){if(!gByRegion.ports.some(x=>x.id===p.id))gByRegion.ports.push(p)}
      else groups.push({region:p.region||"Other",ports:[p]});
    }
  });
  return groups;
}
function allPorts(){return getPorts().flatMap(g=>g.ports)}
async function fetchCustomPorts(){try{const r=await fetch(WORKER+"/ports");window._customPorts=await r.json();render()}catch(e){}}
function loadSaved(){try{return JSON.parse(localStorage.getItem("savedSailings")||"[]")}catch(e){return[]}}
function saveSavedLS(s){localStorage.setItem("savedSailings",JSON.stringify(s))}
function isSaved(key){return loadSaved().some(s=>s._key===key)}
function sailKey(route,item){const l=route.RouteScheduleLegDetails||[];const f=l[0]||{};return`MSC_${f.Vessel?.VesselName||""}_${f.DepartureVoyageNo||""}_${route.EstimatedDepartureDate||""}_${route.EstimatedArrivalDate||""}`}
function cmaKey(s){return`CMA_${s.vessel}_${s.voyageRef}_${s.departureDate}_${s.arrivalDate}`}

    const{route,item}=window._routes[idx];
    const legs=route.RouteScheduleLegDetails||[];const f=legs[0]||{};const last=legs[legs.length-1]||{};
    const isDirect=legs.length===1&&f.SingleLegOnly;
    const tsLeg=legs.length>1?legs.slice(1).find(l=>l.DeparturePortName):null;
    const allPC=legs.flatMap(l=>(l.PortCalls||[]).map(p=>({name:p.PortName,code:p.PortCode,arr:p.EstimatedArrivalDate,dep:p.EstimatedDepartureDate,arrH:p.EstimatedArrivalHour,depH:p.EstimatedDepartureHour})));
    saved.push({_key:key,carrier:"MSC",vessel:f.Vessel?.VesselName||route.VesselName||"TBN",voyage:f.DepartureVoyageNo||"",
      service:f.MaritimeServiceName||item.Key.MaritimeServiceName||"",
      origin:item.PortOfLoad||"",originCode:item.PortOfLoadUnCode||"",
      destination:item.PortOfDischarge||"",destinationCode:item.PortOfDischargeUnCode||"",
      etd:route.EstimatedDepartureDate,eta:route.EstimatedArrivalDate||last.EstimatedArrivalTime,
      isDirect,transitTime:route.TotalTransitTime||"",co2:route.CO2FootPrint||"",
      tsPort:tsLeg?.DeparturePortName||"",tsPortCode:tsLeg?.DeparturePortUNCode||"",

      tsEtd:tsLeg?.EstimatedDepartureTime||"",tsEta:tsLeg?.EstimatedArrivalTime||"",

}

// Port manager
function togglePM(){document.getElementById("pmPanel").classList.toggle("open")}
async function addPort(){
  const name=document.getElementById("pm-name").value.trim();
  const id=parseInt(document.getElementById("pm-id").value.trim());
  const code=document.getElementById("pm-code").value.trim().toUpperCase();
  const region=document.getElementById("pm-region").value;
  if(!name||!id||!code)return alert("Fill name, MSC ID and LOCODE.");
  // Allow if same LOCODE (updating MSC ID), block if same ID but different LOCODE
  const existingById=allPorts().find(p=>p.id===id);
  if(existingById&&existingById.code!==code)return alert("MSC ID "+id+" already used by "+existingById.name+" ("+existingById.code+").");
  const existingByCode=allPorts().find(p=>p.code===code);
  const isUpdate=!!existingByCode;
  const pwd=prompt(isUpdate?`Update MSC ID for ${existingByCode.name} (${code})?\nEnter password:`:"Enter password:");
  if(!pwd)return;
  try{
    const r=await fetch(WORKER+"/ports",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,id,code,region,password:pwd})});
    const d=await r.json();
    if(d.error)return alert(d.error);
    window._customPorts=d.ports;
    document.getElementById("pm-name").value="";document.getElementById("pm-id").value="";document.getElementById("pm-code").value="";
    render();alert(isUpdate?`${name} (${code}) — MSC ID updated to ${id}!`:`${name} added to ${region}!`);
    document.getElementById("pmPanel").classList.remove("open");
  }catch(e){alert("Failed to save.")}
}

const MPT=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function fd(d){if(!d)return"—";const t=new Date(d);if(isNaN(t))return String(d);return`${String(t.getDate()).padStart(2,"0")}/${M[t.getMonth()]}/${t.getFullYear()}`}
function fdt(d){if(!d)return"—";const t=new Date(d);if(isNaN(t))return String(d);return`${String(t.getDate()).padStart(2,"0")}/${M[t.getMonth()]}/${t.getFullYear()} ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`}
function parseAnyDate(d){
  if(!d)return null;let t=new Date(d);if(!isNaN(t))return t;
  const s=String(d).replace(/(\d+)(st|nd|rd|th)/,"$1");
  t=new Date(s);if(!isNaN(t))return t;
  const m2=s.match(/(\d+)\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i);
  if(m2)return new Date(`${m2[2]} ${m2[1]}, ${m2[3]}`);
  return null;
}
function fdpt(d){if(!d)return"";const t=parseAnyDate(d);if(!t)return"";return`${t.getDate()}-${MPT[t.getMonth()]}.`}
function tt(a,b){if(!a||!b)return"—";return Math.round((new Date(b)-new Date(a))/864e5)}
function allSvcs(data){const m=new Map();for(const i of data){const s=i.Key.MaritimeServiceName,dr=i.Key.IsDirectRoute;if(!m.has(s))m.set(s,{name:s,direct:dr,count:0});m.get(s).count+=i.Routes.length;for(const r of i.Routes)for(const l of(r.RouteScheduleLegDetails||[]))if(l.MaritimeServiceName&&!m.has(l.MaritimeServiceName))m.set(l.MaritimeServiceName,{name:l.MaritimeServiceName,direct:false,count:0})};return[...m.values()].sort((a,b)=>a.name.localeCompare(b.name))}
function matchSvc(item,route,f){if(f==="ALL")return true;if(item.Key.MaritimeServiceName===f)return true;for(const l of(route.RouteScheduleLegDetails||[]))if(l.MaritimeServiceName===f)return true;return false}

// === EXCEL EXPORT ===
// Layout matches SCHEDULE_DE_NAVIOS.xlsx template:
//   - DIRECT sailings on left (columns B..G), TRANSSHIPMENT on right (columns J..R)
//   - Within each side: grouped by CARRIER → then by SERVICE
//   - Each group has a black "DIRECT"/"TRANSSHIPMENT" banner, then a yellow
//     "CARRIERS / SERVICES" row, then a blue header row, then data rows.
//   - Dates in Portuguese short format: "21-mar.", "5-abr.", "14-mai."
//   - Inside a group, sailings sorted by ETD ascending (earliest first).
async function exportExcel(){
  const saved=loadSaved();if(!saved.length)return alert("No saved sailings.");
  const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet("NEXT VESSELS");
  const blue="FF215E99",yellow="FFFFFF00",black="FF000000",white="FFFFFFFF";
  const fontHdr={name:"Arial",size:11,bold:true,color:{argb:white}};
  const fontHdrBlack={name:"Arial",size:11,bold:true,color:{argb:black}};
  const fontData={name:"Arial",size:11};
  const fontDataBold={name:"Arial",size:11,bold:true};
  const fillBlue={type:"pattern",pattern:"solid",fgColor:{argb:blue}};
  const fillYellow={type:"pattern",pattern:"solid",fgColor:{argb:yellow}};
  const fillBlack={type:"pattern",pattern:"solid",fgColor:{argb:black}};
  const center={horizontal:"center",vertical:"middle"};
  const left={horizontal:"left",vertical:"middle"};
  const border={style:"thin",color:{argb:"FF999999"}};
  const allBorder={top:border,left:border,bottom:border,right:border};

  // --- 1. Group sailings: side (DIRECT/TRANSSHIPMENT) → carrier → service ---
  function groupSailings(side){
    const items=saved.filter(s=>side==="DIRECT"?s.isDirect:!s.isDirect);
    // Group by carrier first
    const byCarrier=new Map();
    for(const s of items){
      const car=s.carrier||"MSC";
      if(!byCarrier.has(car))byCarrier.set(car,new Map());
      const svcMap=byCarrier.get(car);
      const svc=s.service||"(no service)";
      if(!svcMap.has(svc))svcMap.set(svc,[]);
      svcMap.get(svc).push(s);
    }
    // Build flat list of {carrier, service, items[]} groups, sort items by ETD
    const groups=[];
    for(const[carrier,svcMap]of byCarrier){
      for(const[service,sailings]of svcMap){
        sailings.sort((a,b)=>{
          const da=parseAnyDate(a.etd),db=parseAnyDate(b.etd);
          if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
          return da-db;
        });
        groups.push({carrier,service,items:sailings});
      }
    }
    return groups;
  }

  // --- 2. Resolve ETD/ETA port columns for a group ---
  // Use up to 2 origin-country ports (ETD) + up to 2 destination-country ports (ETA).
  // Column order = chronological by date (port hit first goes first).
  function getPortColsForGroup(items){
    const etdMap=new Map(),etaMap=new Map();
    items.forEach(s=>{
      if(s.originCode&&!etdMap.has(s.originCode))etdMap.set(s.originCode,s.origin);
      if(s.destinationCode&&!etaMap.has(s.destinationCode))etaMap.set(s.destinationCode,s.destination);
    });
    const oPres=new Set([...etdMap.keys()].map(c=>c.substring(0,2)));
    const dPres=new Set([...etaMap.keys()].map(c=>c.substring(0,2)));
    items.forEach(s=>{
      (s.portCalls||[]).forEach(pc=>{
        if(!pc.code)return;const pre=pc.code.substring(0,2);
        if(oPres.has(pre)&&!etdMap.has(pc.code)&&etdMap.size<2)etdMap.set(pc.code,pc.name);
        if(dPres.has(pre)&&!etaMap.has(pc.code)&&etaMap.size<2)etaMap.set(pc.code,pc.name);
      });
    });
    function sortByDate(entries,type){
      return entries.sort((a,b)=>{
        let da=null,db=null;
        for(const s of items){
          const va=findPCDate(s,a[0],type),vb=findPCDate(s,b[0],type);
          if(va&&!da){const p=parseAnyDate(va);if(p)da=p}
          if(vb&&!db){const p=parseAnyDate(vb);if(p)db=p}
          if(da&&db)break;
        }
        if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;
      });
    }
    return{etdPorts:sortByDate([...etdMap.entries()].slice(0,2),"etd"),etaPorts:sortByDate([...etaMap.entries()].slice(0,2),"eta")};
  }

  function findPCDate(s,code,type){
    if(type==="etd"&&s.originCode===code)return s.etd;
    if(type==="eta"&&s.destinationCode===code)return s.eta;
    const pc=(s.portCalls||[]).find(p=>p.code===code);
    if(pc)return type==="etd"?(pc.dep||pc.arr||""):(pc.arr||pc.dep||"");
    const allP=allPorts();const portInfo=allP.find(p=>p.code===code);
    if(portInfo){
      const pcByName=(s.portCalls||[]).find(p=>p.name&&p.name.toLowerCase().includes(portInfo.name.toLowerCase()));
      if(pcByName)return type==="etd"?(pcByName.dep||pcByName.arr||""):(pcByName.arr||pcByName.dep||"");
    }
    return"";
  }

  // --- 3. Title + structure ---
  ws.getCell("A1").value="NEXT VESSELS";
  ws.getCell("A1").font={name:"Arial",size:14,bold:true};

  // DIRECT side starts at column 2 (B), TRANSSHIPMENT at column 10 (J).
  const DIRECT_START_COL=2;
  const TRANS_START_COL=10;
  // Each group has 6 columns: VESSEL + up to 2 ETD + up to 2 ETA = up to 5.
  // We render one block at a time and walk a pointer down the rows for each side.

  const directGroups=groupSailings("DIRECT");
  const transGroups=groupSailings("TRANSSHIPMENT");

  // Render one group block starting at (startRow, startCol). Returns next row.
  function renderGroup(group,startRow,startCol,bannerLabel){
    const{etdPorts,etaPorts}=getPortColsForGroup(group.items);
    // Total cols = 1 (VESSEL) + etd + eta. Min 4 to look balanced.
    const dataCols=1+etdPorts.length+etaPorts.length;
    const totalCols=Math.max(dataCols,5);
    const lastCol=startCol+totalCols-1;
    let r=startRow;

    // BLACK BANNER: DIRECT or TRANSSHIPMENT
    ws.mergeCells(r,startCol,r,lastCol);
    const bc=ws.getCell(r,startCol);
    bc.value=bannerLabel;bc.font={name:"Arial",size:12,bold:true,color:{argb:white}};
    bc.fill=fillBlack;bc.alignment=center;bc.border=allBorder;
    for(let c=startCol;c<=lastCol;c++)ws.getCell(r,c).fill=fillBlack;
    r++;

    // YELLOW BANNER: CARRIERS / SERVICES + service description
    const cs=ws.getCell(r,startCol);
    cs.value="CARRIERS / SERVICES";cs.font=fontHdr;cs.fill=fillBlue;cs.alignment=center;cs.border=allBorder;
    if(lastCol>startCol)ws.mergeCells(r,startCol+1,r,lastCol);
    const sv=ws.getCell(r,startCol+1);
    sv.value=`${group.carrier} (${group.service})`;
    sv.font=fontDataBold;sv.fill=fillYellow;sv.alignment=center;sv.border=allBorder;
    for(let c=startCol+1;c<=lastCol;c++){ws.getCell(r,c).fill=fillYellow;ws.getCell(r,c).border=allBorder}
    r++;

    // BLUE HEADER ROW: VESSEL | ETD ports... | ETA ports...
    let col=startCol;
    const vh=ws.getCell(r,col);vh.value="VESSEL";vh.font=fontHdr;vh.fill=fillBlue;vh.alignment=center;vh.border=allBorder;col++;
    etdPorts.forEach(([code,name])=>{
      const h=ws.getCell(r,col);h.value=`ETD ${name}`;h.font=fontHdr;h.fill=fillBlue;h.alignment=center;h.border=allBorder;col++;
    });
    etaPorts.forEach(([code,name])=>{
      const h=ws.getCell(r,col);h.value=`ETA ${name}`;h.font=fontHdr;h.fill=fillBlue;h.alignment=center;h.border=allBorder;col++;
    });
    // Fill any leftover columns to keep banner width consistent
    while(col<=lastCol){
      const h=ws.getCell(r,col);h.fill=fillBlue;h.border=allBorder;col++;
    }
    r++;

    // DATA ROWS
    group.items.forEach(s=>{
      let c=startCol;
      const vc=ws.getCell(r,c);
      vc.value=s.voyage?`${s.vessel} / ${s.voyage}`:s.vessel;
      vc.font=fontData;vc.alignment=left;vc.border=allBorder;c++;
      etdPorts.forEach(([code])=>{
        const dc=ws.getCell(r,c);dc.value=fdpt(findPCDate(s,code,"etd"));
        dc.font=fontData;dc.alignment=center;dc.border=allBorder;c++;
      });
      etaPorts.forEach(([code])=>{
        const dc=ws.getCell(r,c);dc.value=fdpt(findPCDate(s,code,"eta"));
        dc.font=fontData;dc.alignment=center;dc.border=allBorder;c++;
      });
      while(c<=lastCol){const dc=ws.getCell(r,c);dc.border=allBorder;c++}
      r++;
    });

    return r+1; // blank line between groups
  }

  // Walk both sides in parallel from row 3
  let directRow=3,transRow=3;
  for(const g of directGroups)directRow=renderGroup(g,directRow,DIRECT_START_COL,"DIRECT");
  for(const g of transGroups)transRow=renderGroup(g,transRow,TRANS_START_COL,"TRANSSHIPMENT");

  // --- 4. Column widths ---
  ws.getColumn(1).width=4;     // padding A
  ws.getColumn(2).width=35;    // VESSEL DIRECT
  for(let c=3;c<=7;c++)ws.getColumn(c).width=18; // dates DIRECT
  ws.getColumn(8).width=4;     // gap
  ws.getColumn(9).width=4;     // gap
  ws.getColumn(10).width=35;   // VESSEL TRANS
  for(let c=11;c<=18;c++)ws.getColumn(c).width=18; // dates TRANS

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`NEXT_VESSELS_${new Date().toISOString().split("T")[0]}.xlsx`;a.click();URL.revokeObjectURL(url);
}

// === MAIN RENDER ===
function render(){
  const f=fp(S.from),t=fp(S.to);const saved=loadSaved();
  const isMSC=S.carrier==="MSC",isCMA=S.carrier==="CMA",isMAERSK=S.carrier==="MAERSK",isHMM=S.carrier==="HMM";
  const carrierName=isMSC?"MSC":isCMA?"CMA CGM":isMAERSK?"Maersk":"HMM";
  h=`<header><h1>⚓ Next Sailings</h1><p>${carrierName} Schedule Search</p></header>`;

  // Search box
  h+=`<div class="search-box"><div class="search-row"><div class="port-field"><label><span>🚢</span> Origin</label><button class="port-btn ${f?'selected':''}" onclick="S.fo=!S.fo;S.to2=false;render()"><span>${f?`${esc(f.name)} (${esc(f.code)})`:"Select port..."}</span><span class="arrow ${S.fo?'open':''}">▼</span></button>${S.fo?renderDD("from"):""}</div><div class="search-arrow">→</div><div class="port-field"><label><span>📍</span> Destination</label><button class="port-btn ${t?'selected':''}" onclick="S.to2=!S.to2;S.fo=false;render()"><span>${t?`${esc(t.name)} (${esc(t.code)})`:"Select port..."}</span><span class="arrow ${S.to2?'open':''}">▼</span></button>${S.to2?renderDD("to"):""}</div><button class="search-btn" ${!S.from||!S.to||S.loading?'disabled':''} onclick="doSearch()">${S.loading?"Searching...":"Search"}</button>${S.res||S.cmaRes||S.maerskRes||S.hmmRes||S.from||S.to?`<button class="clear-search" onclick="S.from=null;S.to=null;S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null;S.err=null;S.sf='ALL';render()">✕ Clear</button>`:""}</div>`;

  // Carrier toggle
  h+=`<div class="carrier-row"><button class="carrier-btn ${isMSC?'msc-active':''}" onclick="S.carrier='MSC';S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null;S.err=null;S.sf='ALL';S.mx=5;render()">🟡 MSC</button><button class="carrier-btn ${isCMA?'cma-active':''}" onclick="S.carrier='CMA';S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null;S.err=null;S.sf='ALL';S.mx=5;render()">🔴 CMA CGM</button><button class="carrier-btn ${isMAERSK?'maersk-active':''}" onclick="S.carrier='MAERSK';S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null;S.err=null;S.sf='ALL';S.mx=5;render()">🔵 Maersk</button><button class="carrier-btn ${isHMM?'hmm-active':''}" onclick="S.carrier='HMM';S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null;S.err=null;S.sf='ALL';S.mx=5;render()">🔷 HMM</button></div></div>`;

  // Saved bar
  if(saved.length){h+=`<div class="saved-bar"><span style="font-size:14px;font-weight:600;color:var(--green)">📋 ${saved.length} saved</span><button class="tbtn green" onclick="exportExcel()">📥 Export .xlsx</button><button class="tbtn red" onclick="if(confirm('Clear all saved?')){saveSavedLS([]);render()}">🗑️ Clear</button></div>`}

  if(S.err)h+=`<div class="error">${esc(S.err)}</div>`;
  if(S.loading)h+=`<div class="loading"><div class="spinner"></div><div class="loading-text">Searching ${carrierName} schedules...</div></div>`;

  // === MSC RESULTS ===
  if(isMSC&&S.res&&!S.loading){
    const data=S.res.Data,svcs=allSvcs(data);
    const all=[];window._routes=[];
    for(const i of data)for(const r of i.Routes)if(matchSvc(i,r,S.sf))all.push({route:r,item:i});
    all.sort((a,b)=>new Date(a.route.EstimatedDepartureDate)-new Date(b.route.EstimatedDepartureDate));
    window._routes=all;
    const disp=all.slice(0,S.mx),total=data.flatMap(d=>d.Routes).length;

// === SEARCH ===
async function doSearch(){
  if(!S.from||!S.to)return;
  S.loading=true;S.err=null;S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null;S.sf="ALL";S.mx=5;render();
  const f=fp(S.from),t=fp(S.to);

  try{
    if(S.carrier==="MSC"){
      const r=await fetch(WORKER+`/?fromPortId=${S.from}&toPortId=${S.to}`);
      const d=await r.json();
      if(!d.IsSuccess||!d.Data||!Array.isArray(d.Data)||d.Data.length===0) S.err=typeof d.Data==="string"?d.Data:"No results found.";
      else S.res=d;
    }else if(S.carrier==="CMA"){
      // === CMA CGM via Railway proxy (IPRoyal residential) ===
      if(!f||!t){S.err="Port data not found.";S.loading=false;render();return}
      const params=new URLSearchParams({pol:f.code,pod:t.code,polName:f.name,podName:t.name,weeks:"5"});
      const r=await fetch(`/api/cma?${params}`);
      const d=await r.json();
      if(d.error) S.err=d.error;
      else if(!d.sailings||d.sailings.length===0) S.err="No CMA CGM sailings found for this route.";
      else S.cmaRes=d;
    }else if(S.carrier==="MAERSK"){
      // === MAERSK via public JSON API (consumer-key, no cookies) ===
      if(!f||!t){S.err="Port data not found.";S.loading=false;render();return}
      const params=new URLSearchParams({pol:f.code,pod:t.code,polName:f.name,podName:t.name,weeks:"5"});
      const r=await fetch(`/api/maersk?${params}`);
      const d=await r.json();
      if(d.error) S.err=d.error;
      else if(!d.sailings||d.sailings.length===0) S.err="No Maersk sailings found for this route.";
      else S.maerskRes=d;
    }else if(S.carrier==="HMM"){
      // === HMM via 2-step cookie+CSRF flow ===
      if(!f||!t){S.err="Port data not found.";S.loading=false;render();return}
      const params=new URLSearchParams({pol:f.code,pod:t.code,polName:f.name,podName:t.name,weeks:"2"});
      const r=await fetch(`/api/hmm?${params}`);
      const d=await r.json();
      if(d.error) S.err=d.error;
      else if(!d.sailings||d.sailings.length===0) S.err="No HMM sailings found for this route.";
      else S.hmmRes=d;
    }
  }catch(e){
    console.error(e);
    S.err=e.message||"Failed to connect. Try again.";
  }
  S.loading=false;render();
}

// =====================================================================
// === MEUS FILTROS — saved batch searches that export consolidated Excel
// =====================================================================
// Storage: localStorage only (per user's choice). Schema:
//   localStorage['myFilters'] = [
//     {
//       id: "1776531...",
//       name: "Semanal ECSA Ásia",
//       createdAt: 1776531000000,
//       routes: [
//         {carrier:"MSC", pol:"CNSHA", pod:"BRNVT", polName:"Shanghai", podName:"Navegantes", maxResults:5, polId:444, podId:999},
//         ...
//       ]
//     }, ...
//   ]
// polId/podId are MSC-specific (needed for fromPortId/toPortId). Other carriers use UN/LOCODEs.

const MF_PASSWORD = "1234";
const MF_DELAY_MS = 2500;  // anti-ban delay between sequential batch requests

function mfLoad(){
  try { return JSON.parse(localStorage.getItem("myFilters") || "[]"); }
  catch(e) { return []; }
}
function mfSave(list){ localStorage.setItem("myFilters", JSON.stringify(list)); }

// Modal state
const MF = { view: "list", draft: null, progress: null };

function openMyFilters(){
  MF.view = "list"; MF.draft = null; MF.progress = null;
  document.getElementById("mfBackdrop").classList.add("open");
  mfRender();
}
function closeMyFilters(){
  if (MF.view === "progress" && MF.progress && !MF.progress.done) {
    if (!confirm("An export is running. Close anyway? Partial results will be lost.")) return;
  }
  document.getElementById("mfBackdrop").classList.remove("open");
  MF.view = "list"; MF.draft = null; MF.progress = null;
}

function mfRender(){
  const modal = document.getElementById("mfModal");
  if (MF.view === "list") modal.innerHTML = mfRenderList();
  else if (MF.view === "create") modal.innerHTML = mfRenderCreate();
  else if (MF.view === "progress") modal.innerHTML = mfRenderProgress();
}

// --- VIEW: list ---
function mfRenderList(){
  const filters = mfLoad();
  const body = filters.length === 0
    ? `<div class="mf-empty">Nenhum filtro salvo ainda.<br><br>Crie um filtro com as rotas e carriers que você consulta toda semana — depois é só 1 clique pra exportar o Excel.</div>`
    : `<div class="mf-list">${filters.map(f => mfRenderItem(f)).join("")}</div>`;
  return `
    <div class="mf-header">
      <h2>📋 Meus Filtros</h2>
      <button class="mf-close" onclick="closeMyFilters()">✕</button>
    </div>
    <div class="mf-body">${body}</div>
    <div class="mf-footer">
      <button class="mf-btn primary" onclick="mfStartCreate()">+ Novo Filtro</button>
    </div>
  `;
}

function mfRenderItem(f){
  const routesHtml = f.routes.map(r => {
    const tag = `<span class="mf-route-tag ${r.carrier.toLowerCase()}">${esc(r.carrier)}</span>`;
    return `<div class="mf-item-route">${tag} ${esc(r.polName)} (${esc(r.pol)}) → ${esc(r.podName)} (${esc(r.pod)}) · <strong>${r.maxResults}</strong> saídas</div>`;
  }).join("");
  return `
    <div class="mf-item">
      <div class="mf-item-header">
        <div>
          <div class="mf-item-name">${esc(f.name)}</div>
          <div class="mf-item-count">${f.routes.length} rota${f.routes.length!==1?"s":""}</div>
        </div>
        <div class="mf-item-actions">
          <button class="mf-btn green" onclick="mfStartExport('${esc(f.id)}')">📥 Exportar</button>
          <button class="mf-btn red" onclick="mfDelete('${esc(f.id)}')">🗑️</button>
        </div>
      </div>
      <div class="mf-item-routes">${routesHtml}</div>
    </div>
  `;
}

function mfDelete(id){
  const pwd = prompt("Senha pra deletar o filtro:");
  if (pwd !== MF_PASSWORD) { if (pwd !== null) alert("Senha incorreta."); return; }
  const list = mfLoad().filter(f => f.id !== id);
  mfSave(list);
  mfRender();
}

// --- VIEW: create ---
function mfStartCreate(){

}

}

    return `<option value="">— select port —</option>${opts}`;

    <div class="mf-route-form">
      <div class="mf-route-grid">
        <div>
          <label>Carrier</label>
          <select onchange="mfUpdateRoute(${i},'carrier',this.value)">
            <option value="MSC" ${r.carrier==="MSC"?"selected":""}>🟡 MSC</option>
            <option value="CMA" ${r.carrier==="CMA"?"selected":""}>🔴 CMA CGM</option>
            <option value="MAERSK" ${r.carrier==="MAERSK"?"selected":""}>🔵 Maersk</option>

          <label>Origem</label>
          <select onchange="mfUpdatePort(${i},'pol',this)">${portOptions(r.pol)}</select>
        </div>
        <div>
          <label>Destino</label>
          <select onchange="mfUpdatePort(${i},'pod',this)">${portOptions(r.pod)}</select>
        </div>
        <div>
          <label>Saídas</label>
          <select onchange="mfUpdateRoute(${i},'maxResults',parseInt(this.value,10))">
            ${[1,2,3,5,7,10].map(n => `<option value="${n}" ${r.maxResults===n?"selected":""}>${n}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          ${d.routes.length > 1 ? `<button class="mf-rm-route" onclick="mfRemoveRoute(${i})" title="Remove">🗑️</button>` : ""}
        </div>
      </div>
    </div>
  `).join("");

  return `
    <div class="mf-header">
      <h2>➕ Novo Filtro</h2>
      <button class="mf-close" onclick="mfBackToList()">✕</button>

      <div class="mf-field">
        <label>Nome do Filtro</label>
        <input id="mf-name" type="text" placeholder="ex: Semanal ECSA Ásia" value="${esc(d.name)}" oninput="MF.draft.name=this.value"/>
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Rotas</div>
      ${routesHtml}
      <button class="mf-add-route" onclick="mfAddRoute()">+ Adicionar outra rota</button>

function mfBackToList(){ MF.view = "list"; MF.draft = null; mfRender(); }
function mfAddRoute(){ MF.draft.routes.push(mfEmptyRoute()); mfRender(); }
function mfRemoveRoute(i){ MF.draft.routes.splice(i, 1); mfRender(); }
function mfUpdateRoute(i, field, value){ MF.draft.routes[i][field] = value; }

function mfUpdatePort(i, which, selectEl){
  const opt = selectEl.options[selectEl.selectedIndex];
  const code = opt.value;
  const name = opt.getAttribute("data-name") || "";
  const idStr = opt.getAttribute("data-id") || "";
  const id = idStr ? parseInt(idStr, 10) : null;
  if (which === "pol") { MF.draft.routes[i].pol = code; MF.draft.routes[i].polName = name; MF.draft.routes[i].polId = id; }
  else { MF.draft.routes[i].pod = code; MF.draft.routes[i].podName = name; MF.draft.routes[i].podId = id; }
}

function mfSaveFilter(){
  const d = MF.draft;
  if (!d.name.trim()) { alert("Dá um nome pro filtro."); return; }
  for (let i = 0; i < d.routes.length; i++) {
    const r = d.routes[i];
    if (!r.pol || !r.pod) { alert(`Rota ${i+1}: selecione origem e destino.`); return; }
    if (r.pol === r.pod) { alert(`Rota ${i+1}: origem e destino precisam ser diferentes.`); return; }
    if (r.carrier === "MSC" && (!r.polId || !r.podId)) {
      alert(`Rota ${i+1}: MSC precisa que as portas tenham MSC ID (cadastre no ⚙️ primeiro).`); return;
    }
  }
  const pwd = prompt("Senha pra salvar o filtro:");
  if (pwd !== MF_PASSWORD) { if (pwd !== null) alert("Senha incorreta."); return; }

  const list = mfLoad();
  list.push({
    id: String(Date.now()) + Math.random().toString(36).substring(2, 6),
    name: d.name.trim(),
    createdAt: Date.now(),
    routes: d.routes.map(r => ({...r})),
  });
  mfSave(list);
  MF.view = "list"; MF.draft = null;
  mfRender();
}

// --- VIEW: progress ---
function mfRenderProgress(){
  const p = MF.progress;
  const rows = p.filter.routes.map((r, i) => {
    const res = p.results[i];
    let icon, text, detail;
    if (!res) { icon = "⏳"; text = "Aguardando..."; detail = ""; }
    else if (res.status === "running") { icon = "🔄"; text = "Buscando..."; detail = ""; }
    else if (res.status === "waiting") { icon = "⏲️"; text = "Aguardando " + (MF_DELAY_MS/1000) + "s (delay anti-ban)..."; detail = ""; }
    else if (res.status === "ok") { icon = "✅"; text = "Concluído"; detail = `${res.count} saída${res.count!==1?"s":""}`; }
    else { icon = "❌"; text = "Falhou"; detail = res.error || "erro desconhecido"; }
    return `
      <div class="mf-progress-item">
        <span class="mf-progress-icon">${icon}</span>
        <div class="mf-progress-text">
          <div><span class="mf-route-tag ${r.carrier.toLowerCase()}">${esc(r.carrier)}</span> ${esc(r.polName)} → ${esc(r.podName)} (${r.maxResults} saídas)</div>
          <div class="mf-progress-result">${esc(text)}${detail?` · ${esc(detail)}`:""}</div>
        </div>
      </div>
    `;
  }).join("");
  const footer = p.done
    ? `<button class="mf-btn" onclick="mfBackToList()">Voltar</button><button class="mf-btn green" onclick="mfGenerateExcel()">📥 Gerar Excel</button>`
    : `<button class="mf-btn" disabled>Aguarde...</button>`;
  return `
    <div class="mf-header">
      <h2>📥 Exportando: ${esc(p.filter.name)}</h2>
      <button class="mf-close" onclick="closeMyFilters()">✕</button>
    </div>
    <div class="mf-body">
      <div class="mf-progress">${rows}</div>
    </div>
    <div class="mf-footer">${footer}</div>
  `;
}

async function mfStartExport(filterId){
  const filter = mfLoad().find(f => f.id === filterId);
  if (!filter) { alert("Filtro não encontrado."); return; }

  MF.view = "progress";
  MF.progress = { filter, results: filter.routes.map(() => null), currentIdx: -1, done: false };
  mfRender();

  for (let i = 0; i < filter.routes.length; i++) {
    MF.progress.currentIdx = i;
    MF.progress.results[i] = { status: "running" };
    mfRender();
    try {
      const res = await mfSearchOne(filter.routes[i]);
      MF.progress.results[i] = { status: "ok", count: res.sailings.length, sailings: res.sailings };
    } catch (err) {
      console.error("[MF] route", i, "failed:", err);
      MF.progress.results[i] = { status: "error", error: err.message || String(err), sailings: [] };
    }
    mfRender();
    if (i < filter.routes.length - 1) {
      MF.progress.results[i+1] = { status: "waiting" };
      mfRender();
      await new Promise(r => setTimeout(r, MF_DELAY_MS));
    }
  }
  MF.progress.done = true;
  mfRender();
}

async function mfSearchOne(route){
  const { carrier, pol, pod, polName, podName, polId, podId, maxResults } = route;
  if (carrier === "MSC") {
    const r = await fetch(WORKER + `/?fromPortId=${polId}&toPortId=${podId}`);
    const d = await r.json();
    if (!d.IsSuccess || !Array.isArray(d.Data) || d.Data.length === 0) {
      throw new Error(typeof d.Data === "string" ? d.Data : "No MSC results");
    }
    const all = [];
    for (const item of d.Data) for (const rt of (item.Routes || [])) all.push({ route: rt, item });
    all.sort((a,b) => new Date(a.route.EstimatedDepartureDate) - new Date(b.route.EstimatedDepartureDate));
    const slice = all.slice(0, maxResults);
    return { sailings: slice.map(x => mfNormalizeMsc(x.route, x.item, pol, pod, polName, podName)) };
  }
  if (carrier === "CMA" || carrier === "MAERSK" || carrier === "HMM") {
    const path = carrier === "CMA" ? "cma" : carrier === "MAERSK" ? "maersk" : "hmm";
    const weeks = carrier === "HMM" ? "2" : "5";
    const params = new URLSearchParams({ pol, pod, polName, podName, weeks });
    const r = await fetch(`/api/${path}?${params}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (!Array.isArray(d.sailings) || d.sailings.length === 0) throw new Error(`No ${carrier} sailings`);
    return { sailings: d.sailings.slice(0, maxResults) };
  }
  throw new Error("Unknown carrier: " + carrier);
}

function mfNormalizeMsc(route, item, pol, pod, polName, podName){
  const legs = route.RouteScheduleLegDetails || [];
  const f = legs[0] || {}; const last = legs[legs.length-1] || {};
  const isDirect = legs.length === 1 && f.SingleLegOnly;
  const tsLeg = legs.length > 1 ? legs.slice(1).find(l => l.DeparturePortName) : null;
  const allPC = legs.flatMap(l => (l.PortCalls || []).map(p => ({
    name: p.PortName, code: p.PortCode,
    arr: p.EstimatedArrivalDate, dep: p.EstimatedDepartureDate,
    arrH: p.EstimatedArrivalHour, depH: p.EstimatedDepartureHour,
  })));
  return {
    carrier: "MSC",
    vessel: f.Vessel?.VesselName || route.VesselName || "TBN",
    voyage: f.DepartureVoyageNo || "",
    service: f.MaritimeServiceName || item.Key.MaritimeServiceName || "",
    origin: item.PortOfLoad || polName, originCode: item.PortOfLoadUnCode || pol,
    destination: item.PortOfDischarge || podName, destinationCode: item.PortOfDischargeUnCode || pod,
    etd: route.EstimatedDepartureDate,
    eta: route.EstimatedArrivalDate || last.EstimatedArrivalTime,
    isDirect, transitTime: route.TotalTransitTime || "", co2: route.CO2FootPrint || "",
    tsPort: tsLeg?.DeparturePortName || "", tsPortCode: tsLeg?.DeparturePortUNCode || "",
    tsVessel: tsLeg?.Vessel?.VesselName || "", tsService: tsLeg?.MaritimeServiceName || "",
    tsEtd: tsLeg?.EstimatedDepartureTime || "", tsEta: tsLeg?.EstimatedArrivalTime || "",
    portCalls: allPC,
  };
}

// Reuse the existing exportExcel() by temporarily replacing the "saved" list.
// This inherits ALL the complex DIRECT-left/T/S-right + carrier grouping logic
// that's already proven in production — no reimplementation needed.
async function mfGenerateExcel(){
  const p = MF.progress;
  if (!p || !p.done) return;

  const allSavings = [];
  for (let i = 0; i < p.filter.routes.length; i++) {
    const r = p.results[i];
    if (!r || r.status !== "ok" || !r.sailings || !r.sailings.length) continue;
    const route = p.filter.routes[i];
    for (const s of r.sailings) {
      if (s.carrier === "MSC") {
        allSavings.push({ _key: `MSC_${s.vessel}_${s.voyage}_${s.etd}`, ...s });
      } else {
        allSavings.push({
          _key: `${s.carrier}_${s.vessel}_${s.voyageRef}_${s.departureDate}`,
          carrier: s.carrier,
          vessel: s.vessel,
          voyage: s.voyageRef || "",
          service: s.serviceCode || s.service || "",
          origin: s.origin || route.polName,
          originCode: s.originCode || route.pol,
          destination: s.destination || route.podName,
          destinationCode: s.destinationCode || route.pod,
          etd: s.departureDate,
          eta: s.arrivalDate,
          isDirect: !!s.isDirect,
          transitTime: (s.transitTime || 0) + "d",
          co2: s.co2 || "",
          tsPort: "", tsPortCode: "",
          tsVessel: "", tsService: "",
          tsEtd: "", tsEta: "",
          portCalls: [],
        });
      }
    }
  }

  if (allSavings.length === 0) { alert("Nenhuma rota retornou resultado. Excel não gerado."); return; }

  const prevSaved = localStorage.getItem("savedSailings");
  try {
    localStorage.setItem("savedSailings", JSON.stringify(allSavings));
    await exportExcel();
  } finally {
    if (prevSaved === null) localStorage.removeItem("savedSailings");
    else localStorage.setItem("savedSailings", prevSaved);
  }
}
