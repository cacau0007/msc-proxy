// === SEARCH ===
async function doSearch(){
  if(!S.from||!S.to)return;
  S.loading=true;S.err=null;S.sf="ALL";S.mx=5;
  // Only clear the result for the carrier we're about to query — keep prior
  // results for other carriers so user can flip between tabs without losing
  // already-fetched data. Same route or new route, the tab being searched
  // overwrites itself; others stay until the user clicks Clear or runs ALL.
  if(S.carrier==="MSC"){S.res=null}
  else if(S.carrier==="CMA"){S.cmaRes=null}
  else if(S.carrier==="MAERSK"){S.maerskRes=null}
  else if(S.carrier==="HMM"){S.hmmRes=null}
  else if(S.carrier==="ALL"){S.res=null;S.cmaRes=null;S.maerskRes=null;S.hmmRes=null}
  render();
  const f=fp(S.from),t=fp(S.to);

  // Fetcher for each individual carrier — returns { ok, data, err }.
  // Used both directly (single-tab search) and in parallel (ALL mode).
  const fetchMSC=async()=>{
    try{
      const r=await fetch(WORKER+`/?fromPortId=${S.from}&toPortId=${S.to}`);
      const d=await r.json();
      if(!d.IsSuccess||!d.Data||!Array.isArray(d.Data)||d.Data.length===0) return{err:typeof d.Data==="string"?d.Data:"No results."};
      return{data:d};
    }catch(e){return{err:e.message||"MSC failed"}}
  };
  const fetchCMA=async()=>{
    if(!f||!t)return{err:"Port data not found."};
    try{
      const params=new URLSearchParams({pol:f.code,pod:t.code,polName:f.name,podName:t.name,weeks:"5"});
      const r=await fetch(`/api/cma?${params}`);
      const d=await r.json();
      if(d.error)return{err:d.error};
      if(!d.sailings||d.sailings.length===0)return{err:"No CMA sailings."};
      return{data:d};
    }catch(e){return{err:e.message||"CMA failed"}}
  };
  const fetchMAERSK=async()=>{
    if(!f||!t)return{err:"Port data not found."};
    try{
      const params=new URLSearchParams({pol:f.code,pod:t.code,polName:f.name,podName:t.name,weeks:"5"});
      const r=await fetch(`/api/maersk?${params}`);
      const d=await r.json();
      if(d.error)return{err:d.error};
      if(!d.sailings||d.sailings.length===0)return{err:"No Maersk sailings."};
      return{data:d};
    }catch(e){return{err:e.message||"Maersk failed"}}
  };
  const fetchHMM=async()=>{
    if(!f||!t)return{err:"Port data not found."};
    try{
      const params=new URLSearchParams({pol:f.code,pod:t.code,polName:f.name,podName:t.name,weeks:"2"});
      const r=await fetch(`/api/hmm?${params}`);
      const d=await r.json();
      if(d.error)return{err:d.error};
      if(!d.sailings||d.sailings.length===0)return{err:"No HMM sailings."};
      return{data:d};
    }catch(e){return{err:e.message||"HMM failed"}}
  };

  try{
    if(S.carrier==="MSC"){
      const r=await fetchMSC();
      if(r.err)S.err=r.err;else S.res=r.data;
    }else if(S.carrier==="CMA"){
      const r=await fetchCMA();
      if(r.err)S.err=r.err;else S.cmaRes=r.data;
    }else if(S.carrier==="MAERSK"){
      const r=await fetchMAERSK();
      if(r.err)S.err=r.err;else S.maerskRes=r.data;
    }else if(S.carrier==="HMM"){
      const r=await fetchHMM();
      if(r.err)S.err=r.err;else S.hmmRes=r.data;
    }else if(S.carrier==="ALL"){
      // Fire all four in parallel — each one populates its own state slot
      // so the per-carrier tabs stay populated and the unified ALL view
      // can read from every slot to build a chronological merged list.
      const[m,c,k,h]=await Promise.all([fetchMSC(),fetchCMA(),fetchMAERSK(),fetchHMM()]);
      if(!m.err)S.res=m.data;
      if(!c.err)S.cmaRes=c.data;
      if(!k.err)S.maerskRes=k.data;
      if(!h.err)S.hmmRes=h.data;
      // Only complain if EVERY carrier failed — partial results are useful
      const allFailed=m.err&&c.err&&k.err&&h.err;
      if(allFailed)S.err="No sailings found in any carrier.";
    }
  }catch(e){
    console.error(e);
    S.err=e.message||"Failed to connect. Try again.";
  }
  S.loading=false;render();
}

// =====================================================================
// === MY FILTERS — saved batch searches that export consolidated Excel
// =====================================================================
// Storage: localStorage only (per user's choice). Schema:
//   localStorage['myFilters'] = [
//     {
//       id: "1776531...",
//       name: "Semanal ECSA Ásia",
//       createdAt: 1776531000000,
//       routes: [
//         {carrier:"MSC", pol:"CNSHA", pod:"BRNVT", polName:"Shanghai", podName:"Navegantes", maxResults:5, polId:444, podId:999},
//         ...
//       ]
//     }, ...
//   ]
// polId/podId are MSC-specific (needed for fromPortId/toPortId). Other carriers use UN/LOCODEs.

const MF_PASSWORD = "1234";
const MF_DELAY_MS = 2500;  // anti-ban delay between sequential batch requests

// Service options per carrier. Empty string "" means "all" (no filter).
// The value is what gets stored in route.service and matched substring-wise
// against sailing.service/serviceCode. Show technical codes (user preference).
// === JOINT SERVICES — Asia↔ECSA ===
// Each "sling" is a slot of vessels shared by multiple carriers; each carrier
// gives its own commercial name to that loop. When showing a sailing, we tell
// the user which OTHER carriers run the same physical loop so they can
// cross-check capacity, cut-offs, and alternative routings.
//
// Source: planilha Joint_Services_-_Asia.xlsx (Feb 2026 update). Carrier codes
// in this table are the commercial trade abbreviations as used in our app:
//   MSC, CMA (CMA CGM), MAERSK, HMM, plus reference-only names that don't
//   have their own search tab here (EMC=Evergreen, PIL=PIL, YML=Yang Ming,
//   OOCL, COSCO, ZIM, HPL=Hapag-Lloyd, ONE).
//
// Per-member format: { c: "CARRIER", s: "COMMERCIAL_NAME", a: ["CODE1","CODE2"] }
//   - `s`: the trade name shown on the carrier's public site (ASAS, ASAS2, IPANEMA…)
//   - `a`: optional list of internal codes the carrier's API/booking returns
//          alongside (or instead of) the commercial name — Maersk's API uses
//          codes like X4A, X4B, 412, 425 even though the trade is ASAS/ASAS2.
//          The matcher checks both the commercial name AND each alias.
//
// Maersk alias mapping (verified from carrier site):
//   X4A / NEOASAS  → ASAS2 (sling 8 with CMA SEAS3)
//   X4B            → also ASAS2 trade (alternate Brazil leg)
//   425 / AE15     → ASAS  (sling 2 with ZIM/HPL/ONE)
//   412            → ASAS  (also confirmed on AE2/AE7 trade)
// === JOINT SERVICES — Asia↔ECSA ===
// Source: planilha Joint_Services_-_Asia.xlsx (Feb 2026 update) + cross-checks
// from carrier announcements (web). Each "sling" is a slot of vessels shared
// by multiple carriers; each carrier markets it under its own commercial name.
//
// Per-member format: { c: "CARRIER", s: "COMMERCIAL_NAME", a: ["CODE1", ...] }
//   - `s`: trade name on the carrier's public site (ASAS, ASAS2, IPANEMA…)
//   - `a`: optional list of internal codes/aliases the carrier's API/booking
//          might return instead of the trade name. Maersk in particular
//          frequently surfaces internal codes (X4A, NEOASAS, 412, 425, AE15).
//
// Maersk verified mapping (from maersk.com/news + maersk.com/local-information):
//   X4A / NEOASAS    → ASAS  (sling 2 — Gemini era: Maersk + Hapag-Lloyd; pre-Gemini was ZIM/HPL/ONE per the spreadsheet)
//   X4B              → ASAS2 (sling 8 — joint with CMA SEAS3, confirmed in CMA/Maersk announcement)
//   412 / AE2 / AE7  → ASAS  (legacy AE2/AE7 trade renamed under ASAS post-Gemini)
//   425 / AE15       → ASAS  (alternate code seen on bookings)
const JOINT_SLINGS = [
  { sling: 1, members: [{c:"EMC",s:"ESA"},{c:"PIL",s:"SA2"},{c:"CMA",s:"SEAS"},{c:"YML",s:"SA3"},{c:"OOCL",s:"TLA1"},{c:"COSCO",s:"ESA"}] },
  { sling: 2, members: [{c:"MAERSK",s:"ASAS",a:["X4A","NEOASAS","412","AE2","AE7","425","AE15"]},{c:"ZIM",s:"ASE"},{c:"HPL",s:"ASE"},{c:"ONE",s:"SX2"}] },
  { sling: 3, members: [{c:"ONE",s:"SX1"},{c:"MSC",s:"IPANEMA"},{c:"HPL",s:"AS2"}] },
  { sling: 4, members: [{c:"CMA",s:"SEAS2"},{c:"COSCO",s:"ESA2"},{c:"OOCL",s:"TLA2"},{c:"EMC",s:"ESA3"},{c:"PIL",s:"SSA"},{c:"YML",s:"SA5"}] },
  { sling: 5, members: [{c:"HMM",s:"FL2"},{c:"ONE",s:"SX2"},{c:"YML",s:"SSX"}] },
  { sling: 6, members: [{c:"MSC",s:"CARIOCA"}] },
  { sling: 7, members: [{c:"HMM",s:"FIL"}] },
  { sling: 8, members: [{c:"CMA",s:"SEAS3"},{c:"MAERSK",s:"ASAS2",a:["X4B","X4"]}] },
  { sling: 9, members: [{c:"ONE",s:"SX3"}] },
];

// Normalize service name for matching: uppercase, strip spaces.
// "SEAS 3" / "seas3" / "SEAS3" all become "SEAS3".
function normSvcName(s){ return String(s||"").toUpperCase().replace(/\s+/g,""); }

// Build flat index. Each carrier|service entry registers the commercial name
// AND every alias as separate keys, all pointing to the same partner list.
// So a Maersk sailing returning serviceCode "X4A" or service "NEOASAS" both
// resolve to the SLING 2 (ASAS) partners.
const JOINT_INDEX = (() => {
  const idx = {};
  for (const slot of JOINT_SLINGS) {
    for (const m of slot.members) {
      const partners = slot.members.filter(x => !(x.c === m.c && normSvcName(x.s) === normSvcName(m.s)));
      const allKeys = [m.s, ...(m.a || [])];
      for (const k of allKeys) {
        const fullKey = `${m.c.toUpperCase()}|${normSvcName(k)}`;
        if (!idx[fullKey]) idx[fullKey] = partners;
      }
    }
  }
  return idx;
})();

// Reverse alias index: { "MAERSK|X4A": "ASAS", "MAERSK|NEOASAS": "ASAS", ... }
// Used to display the commercial trade name even when the API returned a code.
const JOINT_ALIAS_TO_NAME = (() => {
  const idx = {};
  for (const slot of JOINT_SLINGS) {
    for (const m of slot.members) {
      const car = m.c.toUpperCase();
      // Alias → commercial name
      for (const a of (m.a || [])) {
        idx[`${car}|${normSvcName(a)}`] = m.s;
      }
      // Trade name maps to itself (for consistency)
      idx[`${car}|${normSvcName(m.s)}`] = m.s;
    }
  }
  return idx;
})();

// Look up the commercial trade name for a (carrier, raw service string) pair.
// Returns the rawService unchanged if no alias mapping exists.
function getCommercialServiceName(carrier, rawService){
  if (!carrier || !rawService) return rawService || "";
  const car = String(carrier).toUpperCase();
  const norm = normSvcName(rawService);
  // 1. Exact alias/name match
  if (JOINT_ALIAS_TO_NAME[`${car}|${norm}`]) return JOINT_ALIAS_TO_NAME[`${car}|${norm}`];
  // 2. Substring match (longest first), e.g. "IPANEMASERVICE" → "IPANEMA"
  const carKeys = Object.keys(JOINT_ALIAS_TO_NAME)
    .filter(k => k.startsWith(car + "|"))
    .sort((a, b) => b.split("|")[1].length - a.split("|")[1].length);
  for (const k of carKeys) {
    const keySvc = k.split("|")[1];
    if (norm.includes(keySvc) || keySvc.includes(norm)) return JOINT_ALIAS_TO_NAME[k];
  }
  return rawService;
}

// Find joint partners — accepts up to 3 candidate strings (e.g. service name,
// service code, raw key from API), tries each one. Useful because Maersk
// sailings carry both `service` ("NEOASAS") and `serviceCode` ("X4A") and
// either can match the joint table.
function findJointPartners(carrier, ...candidates){
  if (!carrier) return [];
  const car = String(carrier).toUpperCase();
  const queries = candidates
    .map(c => normSvcName(c))
    .filter(Boolean);
  if (!queries.length) return [];
  // 1. Direct exact lookup for each candidate
  for (const q of queries) {
    if (JOINT_INDEX[`${car}|${q}`]) return JOINT_INDEX[`${car}|${q}`];
  }
  // 2. Substring fallback (longest-key-first to favor SEAS3 over SEAS, ASAS2
  // over ASAS). For each candidate, try matching against all carrier keys.
  const carKeys = Object.keys(JOINT_INDEX)
    .filter(k => k.startsWith(car + "|"))
    .sort((a, b) => b.split("|")[1].length - a.split("|")[1].length);
  for (const q of queries) {
    for (const k of carKeys) {
      const keySvc = k.split("|")[1];
      if (q.includes(keySvc) || keySvc.includes(q)) return JOINT_INDEX[k];
    }
  }
  return [];
}

// Render the joint badge HTML. Accepts up to 3 candidate service strings
// (service name + service code + alt) so Maersk's "NEOASAS"/"X4A" both
// resolve. Returns "" if no partners found.
function renderJointBadge(carrier, ...candidates){
  const partners = findJointPartners(carrier, ...candidates);
  if (!partners.length) return "";
  const niceName = {MSC:"MSC",CMA:"CMA",MAERSK:"Maersk",HMM:"HMM",EMC:"Evergreen",PIL:"PIL",YML:"Yang Ming",OOCL:"OOCL",COSCO:"COSCO",ZIM:"ZIM",HPL:"Hapag",ONE:"ONE"};
  const list = partners.map(p => `<span class="joint-pill">${esc(niceName[p.c]||p.c)}<span class="joint-svc">${esc(p.s)}</span></span>`).join("");
  return `<div class="joint-badge"><span class="joint-label">🔗 JOINT</span>${list}</div>`;
}

const SERVICE_OPTIONS = {
  MSC:    [{v:"", l:"All"}, {v:"Ipanema", l:"Ipanema"}, {v:"Carioca", l:"Carioca"}, {v:"Santana", l:"Santana"}, {v:"Jade", l:"Jade"}],
  CMA:    [{v:"", l:"All"}, {v:"SEAS", l:"SEAS"}, {v:"SEAS2", l:"SEAS2"}, {v:"SEAS3", l:"SEAS3"}, {v:"FAL|SIRIUS", l:"FAL+SIRIUS"}],
  MAERSK: [{v:"", l:"All"}, {v:"ASAS", l:"ASAS"}, {v:"ASAS2", l:"ASAS2"}],
  HMM:    [{v:"", l:"All"}],
};

// Does a sailing's service match the requested filter? Substring match,
// case-insensitive, against both service name and serviceCode. Empty query
// = matches everything.
// Build alias index per carrier from JOINT_SLINGS so a filter typed as the
// commercial trade name (ASAS2, IPANEMA, SEAS3, FL2) also matches sailings
// where the API returned an internal code (X4B, IPANEMA SERVICE, X4A...).
function expandServiceAliases(carrier, token){
  if (!carrier || !token) return [String(token||"").toLowerCase()];
  const car = String(carrier).toUpperCase();
  const tok = normSvcName(token);
  const out = new Set([tok.toLowerCase()]);
  // Only EXACT match against trade name or alias — otherwise filtering "ASAS"
  // would also expand "ASAS2" since ASAS is a substring of ASAS2.
  for (const slot of JOINT_SLINGS) {
    for (const m of slot.members) {
      if (m.c.toUpperCase() !== car) continue;
      const allKeys = [m.s, ...(m.a || [])].map(k => normSvcName(k));
      if (allKeys.includes(tok)) {
        for (const k of allKeys) out.add(k.toLowerCase());
      }
    }
  }
  return [...out];
}

function mfServiceMatches(sailing, query) {
  if (!query) return true;
  const q = String(query).trim();
  if (!q) return true;
  const carrier = sailing.carrier || "";
  const svc = String(sailing.service || "").trim().toLowerCase();
  const code = String(sailing.serviceCode || "").trim().toLowerCase();
  // Query can be "AE2|AE7" → any token matches.
  // For each user-typed token, expand to all known aliases for this carrier
  // (so "ASAS2" also matches "X4B", "IPANEMA" matches "IPANEMA SERVICE", etc).
  const userTokens = q.split("|").map(t => t.trim()).filter(Boolean);
  const allTokens = [];
  for (const t of userTokens) {
    for (const alias of expandServiceAliases(carrier, t)) allTokens.push(alias);
  }
  return allTokens.some(tok => {
    if (svc === tok || code === tok) return true;
    // Also try normalized comparison (no spaces) so "SEAS2" matches "SEAS 2"
    const tokNorm = tok.replace(/\s+/g, "");
    const svcNorm = svc.replace(/\s+/g, "");
    const codeNorm = code.replace(/\s+/g, "");
    if (svcNorm === tokNorm || codeNorm === tokNorm) return true;
    const esc = tok.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp(`(^|\\s|[/,;+-])${esc}(\\s|$|[/,;+-])`, "i");
    const hay = svc + " | " + code;
    const m = re.exec(hay);
    if (!m) return false;
    const afterIdx = m.index + m[1].length + tok.length;
    const afterCtx = hay.slice(afterIdx, afterIdx + 3);
    if (/^\s*\d/.test(afterCtx)) return false;
    return true;
  });
}

function mfLoad(){
  try { return JSON.parse(localStorage.getItem("myFilters") || "[]"); }
  catch(e) { return []; }
}
function mfSave(list){ localStorage.setItem("myFilters", JSON.stringify(list)); }

// Modal state
//   view: "list" | "create" | "progress"
//   draft: current form being edited (create view)
//   progress: execution state (progress view)
//   openPort: "i-which" where i=route idx and which='pol'|'pod' (null if no dropdown open)
//   portSearch: text being typed in the open dropdown's search input
const MF = { view: "list", draft: null, progress: null, openPort: null, portSearch: "" };

function openMyFilters(){
  MF.view = "list"; MF.draft = null; MF.progress = null; MF.openPort = null; MF.portSearch = "";
  document.getElementById("mfBackdrop").classList.add("open");
  loadFiltersFromBackend();
  mfRender();
}
function closeMyFilters(){
  if (MF.view === "progress" && MF.progress && !MF.progress.done) {
    if (!confirm("An export is running. Close anyway? Partial results will be lost.")) return;
  }
  document.getElementById("mfBackdrop").classList.remove("open");
  MF.view = "list"; MF.draft = null; MF.progress = null; MF.openPort = null; MF.portSearch = "";
}

// Sync filters from backend (persistent across redeploys/devices).
// Uses localStorage as a fast-read cache — we show the cached list instantly
// on open, then refresh from backend. If backend fails (e.g. old server without
// endpoint yet), we fall back to whatever localStorage has.
async function loadFiltersFromBackend(){
  try {
    const r = await fetch("/api/filters");
    if (!r.ok) throw new Error("GET /api/filters failed: " + r.status);
    const list = await r.json();
    if (!Array.isArray(list)) throw new Error("Bad response shape");
    localStorage.setItem("myFilters", JSON.stringify(list));
    if (MF.view === "list") mfRender();  // refresh the list in place
  } catch (e) {
    console.warn("[MF] Backend fetch failed, using localStorage fallback:", e.message);
  }
}

function mfRender(){
  const modal = document.getElementById("mfModal");
  if (MF.view === "list") modal.innerHTML = mfRenderList();
  else if (MF.view === "create") modal.innerHTML = mfRenderCreate();
  else if (MF.view === "progress") modal.innerHTML = mfRenderProgress();
}

// === Export / Import filters as JSON code ===
// Filters live in localStorage which is per-domain and can be wiped by browser
// settings or domain changes. Export gives the user a portable string they
// can paste back later (or send to a colleague). Format: base64-encoded JSON
// of {v:1, filters:[...]} so the user can spot a malformed paste fast.

function mfFilterToCode(filtersList){
  const payload = { v: 1, filters: filtersList };
  // btoa needs ASCII; JSON.stringify can yield Unicode (port names like "São")
  // so we encode UTF-8 first.
  const json = JSON.stringify(payload);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return "ALLOG-FLT-" + b64;
}

function mfCodeToFilters(code){
  if (!code || typeof code !== "string") throw new Error("Código vazio");
  const trimmed = code.trim().replace(/^ALLOG-FLT-/, "");
  if (!trimmed) throw new Error("Código inválido");
  let json;
  try { json = decodeURIComponent(escape(atob(trimmed))); }
  catch(e) { throw new Error("Código corrompido (não é base64 válido)"); }
  let parsed;
  try { parsed = JSON.parse(json); }
  catch(e) { throw new Error("Código corrompido (JSON inválido)"); }
  if (!parsed || !Array.isArray(parsed.filters)) throw new Error("Estrutura inválida (esperava {filters:[...]})");
  return parsed.filters;
}

function mfExportAll(){
  const list = mfLoad();
  if (!list.length) { alert("No filters to export."); return; }
  const code = mfFilterToCode(list);
  mfShowExportDialog(code, `${list.length} filter(s)`);
}

function mfCopyExport(){
  const ta = document.getElementById("mf-export-code");
  if (!ta) return;
  ta.select(); ta.setSelectionRange(0, ta.value.length);
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(ta.value).then(()=>{
        const btn = event && event.target;
        if (btn) { const old = btn.innerHTML; btn.innerHTML = "✓ Copiado!"; setTimeout(()=>{btn.innerHTML = old}, 1500); }
      });
    } else {
      document.execCommand("copy");
      alert("Copiado!");
    }
  } catch(e) {
    alert("Não consegui copiar automaticamente. Selecione o texto e use Ctrl+C.");
  }
}

async function mfDoImport(){
  const ta = document.getElementById("mf-import-code");
  const msg = document.getElementById("mf-import-msg");
  if (!ta) return;
  let imported;
  try { imported = mfCodeToFilters(ta.value); }
  catch(e) { msg.innerHTML = `<span style="color:var(--cma)">❌ ${esc(e.message)}</span>`; return; }
  if (!imported.length) { msg.innerHTML = `<span style="color:var(--cma)">❌ No filters in code</span>`; return; }

  const pwd = prompt("Password to save on server (so filters survive deploys):");
  if (pwd === null) return;  // user cancelled

  const existing = mfLoad();
  const existingNames = new Set(existing.map(f => f.name));
  // De-duplicate names: "Foo" → "Foo (importado)" → "Foo (importado 2)"
  const adopted = imported.map(f => {
    let name = f.name || "Sem nome";
    if (existingNames.has(name)) {
      let n = 1, candidate;
      do { candidate = n === 1 ? `${name} (importado)` : `${name} (importado ${n})`; n++; }
      while (existingNames.has(candidate));
      name = candidate;
    }
    existingNames.add(name);
    // Always assign a fresh ID server-side; backend will sanitize anyway
    return { ...f, id: String(Date.now()) + Math.random().toString(36).slice(2, 7), name, createdAt: Date.now() };
  });

  // Save each one to the backend so they survive deploys. Sequential to avoid
  // race conditions in the JSON file write.
  msg.innerHTML = `<span style="color:var(--text2)">Saving ${adopted.length} filter(s)...</span>`;
  let ok = 0, failed = [];
  for (const f of adopted) {
    try {
      const r = await fetch("/api/filters", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pwd, filter: f }),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        failed.push(`${f.name}: ${err.error || `HTTP ${r.status}`}`);
      } else {
        ok++;
      }
    } catch (e) {
      failed.push(`${f.name}: ${e.message}`);
    }
  }
  await loadFiltersFromBackend();
  if (failed.length) {
    msg.innerHTML = `<span style="color:var(--orange)">⚠️ ${ok} salvos, ${failed.length} falharam: ${esc(failed[0])}</span>`;
  } else {
    msg.innerHTML = `<span style="color:var(--green)">✅ ${ok} filter(s) imported and saved on server</span>`;
    setTimeout(()=>mfRender(), 1000);
  }
}

function mfRenderItem(f){
  const routesHtml = f.routes.map(r => {
    const tag = `<span class="mf-route-tag ${r.carrier.toLowerCase()}">${esc(r.carrier)}</span>`;
    return `<div class="mf-item-route">${tag} ${esc(r.polName)} (${esc(r.pol)}) → ${esc(r.podName)} (${esc(r.pod)}) · <strong>${r.maxResults}</strong> sailings</div>`;
  }).join("");
  return `
    <div class="mf-item">
      <div class="mf-item-header">
        <div>
          <div class="mf-item-name">${esc(f.name)}</div>
          <div class="mf-item-count">${f.routes.length} rota${f.routes.length!==1?"s":""}</div>
        </div>
        <div class="mf-item-actions">
          <button class="mf-btn green" onclick="mfStartExport('${esc(f.id)}')">📥 Export</button>
          <button class="mf-btn" onclick="mfExportOne('${esc(f.id)}')" title="Copy code to re-import later">📤</button>
          <button class="mf-btn" onclick="mfStartEdit('${esc(f.id)}')" title="Edit">✏️</button>
          <button class="mf-btn red" onclick="mfDelete('${esc(f.id)}')">🗑️</button>
        </div>
      </div>
      <div class="mf-item-routes">${routesHtml}</div>
    </div>
  `;
}

async function mfDelete(id){
  const pwd = prompt("Password to delete filter:");
  if (pwd !== MF_PASSWORD) { if (pwd !== null) alert("Senha incorreta."); return; }
  try {
    const r = await fetch(`/api/filters/${encodeURIComponent(id)}?password=${encodeURIComponent(pwd)}`, {
      method: "DELETE",
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    await loadFiltersFromBackend();
  } catch (e) {
    alert("Falha ao deletar no servidor: " + e.message);
    return;
  }
  mfRender();
}

function mfStartCreate(){
  MF.view = "create";
  MF.draft = { name: "", routes: [mfEmptyRoute()] };
  MF.openPort = null; MF.portSearch = "";
  mfRender();
}

// Edit an existing filter — loads it into MF.draft preserving the id so
// that mfSaveFilter's POST replaces (rather than creates) on the backend.
function mfStartEdit(id){
  const filter = mfLoad().find(f => f.id === id);
  if (!filter) { alert("Filter not found."); return; }
  // Deep clone so edits don't mutate the stored list until we save
  MF.view = "create";
  MF.draft = {
    id: filter.id,
    name: filter.name,
    createdAt: filter.createdAt,
    routes: filter.routes.map(r => ({...r})),
  };
  MF.openPort = null; MF.portSearch = "";
  mfRender();
}

            <option value="HMM" ${r.carrier==="HMM"?"selected":""}>🔷 HMM</option>

        <div class="mf-port">

        </div>
        <div class="mf-port">
          <label>Destino</label>
          ${mfRenderPortField(i, "pod", r)}
        </div>
        <div>
          <label>Sailings</label>
          <select onchange="mfUpdateRoute(${i},'maxResults',parseInt(this.value,10))">
            ${[1,2,3,5,7,10].map(n => `<option value="${n}" ${r.maxResults===n?"selected":""}>${n}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          ${d.routes.length > 1 ? `<button class="mf-rm-route" onclick="mfRemoveRoute(${i})" title="Remove">🗑️</button>` : ""}
        </div>
      </div>
      <div class="mf-route-extra">
        <div>
          <label>Service</label>
          <select onchange="mfUpdateRoute(${i},'service',this.value)">
            ${(SERVICE_OPTIONS[r.carrier] || SERVICE_OPTIONS.HMM).map(opt =>

            ).join("")}

        <label class="mf-ts-toggle ${r.showAllTs?'on':''}" onclick="mfUpdateRoute(${i},'showAllTs',${!r.showAllTs});mfRender()">

  return `
    <div class="mf-header">
      <h2>${d.id ? "✏️ Edit Filter" : "➕ New Filter"}</h2>

}

// Render a searchable port picker (button + dropdown). The dropdown opens
// only when the user clicks the button, and only for the active port field
// identified by MF.openPort === "i-which".
function mfRenderPortField(routeIdx, which, route){
  const selectedCode = which === "pol" ? route.pol : route.pod;
  const selectedName = which === "pol" ? route.polName : route.podName;
  const fieldId = `${routeIdx}-${which}`;
  const isOpen = MF.openPort === fieldId;
  const label = selectedCode
    ? `<span class="mf-port-label">${esc(selectedName)} (${esc(selectedCode)})</span>`
    : `<span class="mf-port-label">Select port...</span>`;
  const btn = `<button class="mf-port-btn ${selectedCode?'selected':''}" onclick="mfTogglePortDropdown('${fieldId}')">${label}<span class="mf-port-arrow ${isOpen?'open':''}">▼</span></button>`;
  const dd = isOpen ? mfRenderPortDropdown(routeIdx, which, selectedCode) : "";
  return btn + dd;
}

// Render the open dropdown: search input + grouped port list filtered by search
function mfRenderPortDropdown(routeIdx, which, selectedCode){
  const search = (MF.portSearch || "").trim().toLowerCase();
  const groups = getPorts().map(g => ({
    ...g,
    ports: g.ports.filter(p => {
      if (!search) return true;
      const hay = `${p.name} ${p.code}`.toLowerCase();
      return hay.includes(search);
    }),
  })).filter(g => g.ports.length > 0);
  const listHtml = groups.length === 0
    ? `<div class="mf-port-group" style="text-align:center;color:var(--text3)">No matches</div>`
    : groups.map(g => `
        <div class="mf-port-group">${esc(g.region)}</div>
        ${g.ports.map(p => `
          <button class="mf-port-item ${p.code===selectedCode?'active':''}" onclick="mfSelectPortFromDropdown(${routeIdx},'${which}','${esc(p.code)}','${esc(p.name)}',${p.id||'null'})">
            <span>${esc(p.name)}</span>
            <span class="code">${esc(p.code)}</span>
          </button>
        `).join("")}
      `).join("");
  return `
    <div class="mf-port-dd" onclick="event.stopPropagation()">
      <div class="mf-port-search">
        <input id="mf-port-search-input" placeholder="Search port..." value="${esc(MF.portSearch||"")}" oninput="mfPortSearch(this.value)" autofocus/>
      </div>
      <div class="mf-port-list">${listHtml}</div>
    </div>
  `;
}

function mfTogglePortDropdown(fieldId){
  // Event bubble guard: stop propagation so the document click listener
  // doesn't immediately close the dropdown we just opened.
  if (event) event.stopPropagation();
  if (MF.openPort === fieldId) {
    MF.openPort = null;
    MF.portSearch = "";
  } else {
    MF.openPort = fieldId;
    MF.portSearch = "";
  }
  mfRender();
  // Focus the search input after render
  setTimeout(() => {
    const input = document.getElementById("mf-port-search-input");
    if (input) input.focus();
  }, 0);
}

function mfPortSearch(value){
  MF.portSearch = value;
  // Only re-render the list, NOT the whole modal — otherwise we lose input focus
  // and cursor position. Update the list DOM directly.
  const listContainer = document.querySelector(".mf-port-dd .mf-port-list");
  if (!listContainer || !MF.openPort) return;
  const [idxStr, which] = MF.openPort.split("-");
  const routeIdx = parseInt(idxStr, 10);
  const route = MF.draft.routes[routeIdx];
  if (!route) return;
  const selectedCode = which === "pol" ? route.pol : route.pod;
  const search = (value || "").trim().toLowerCase();
  const groups = getPorts().map(g => ({
    ...g,
    ports: g.ports.filter(p => {
      if (!search) return true;
      return `${p.name} ${p.code}`.toLowerCase().includes(search);
    }),
  })).filter(g => g.ports.length > 0);
  listContainer.innerHTML = groups.length === 0
    ? `<div class="mf-port-group" style="text-align:center;color:var(--text3)">No matches</div>`
    : groups.map(g => `
        <div class="mf-port-group">${esc(g.region)}</div>
        ${g.ports.map(p => `
          <button class="mf-port-item ${p.code===selectedCode?'active':''}" onclick="mfSelectPortFromDropdown(${routeIdx},'${which}','${esc(p.code)}','${esc(p.name)}',${p.id||'null'})">
            <span>${esc(p.name)}</span>
            <span class="code">${esc(p.code)}</span>
          </button>
        `).join("")}
      `).join("");
}

function mfSelectPortFromDropdown(routeIdx, which, code, name, idOrNull){
  const id = (idOrNull === null || idOrNull === "null") ? null : parseInt(idOrNull, 10);
  const route = MF.draft.routes[routeIdx];
  if (which === "pol") { route.pol = code; route.polName = name; route.polId = id; }
  else { route.pod = code; route.podName = name; route.podId = id; }
  MF.openPort = null; MF.portSearch = "";
  mfRender();
}

function mfBackToList(){ MF.view = "list"; MF.draft = null; MF.openPort = null; MF.portSearch = ""; mfRender(); }
function mfAddRoute(){ MF.draft.routes.push(mfEmptyRoute()); mfRender(); }
function mfRemoveRoute(i){ MF.draft.routes.splice(i, 1); mfRender(); }
function mfUpdateRoute(i, field, value){
  MF.draft.routes[i][field] = value;
  // When carrier changes, the list of valid services changes too — reset
  // service to "" (All) and re-render so the dropdown refreshes.
  // showAllTs toggle also needs re-render to flip its visual state.
  if (field === "carrier") {
    MF.draft.routes[i].service = "";
    mfRender();
  }
}

function mfUpdatePort(i, which, selectEl){
  const opt = selectEl.options[selectEl.selectedIndex];
  const code = opt.value;
  const name = opt.getAttribute("data-name") || "";
  const idStr = opt.getAttribute("data-id") || "";
  const id = idStr ? parseInt(idStr, 10) : null;
  if (which === "pol") { MF.draft.routes[i].pol = code; MF.draft.routes[i].polName = name; MF.draft.routes[i].polId = id; }
  else { MF.draft.routes[i].pod = code; MF.draft.routes[i].podName = name; MF.draft.routes[i].podId = id; }
}

async function mfSaveFilter(){
  const d = MF.draft;
  if (!d.name.trim()) { alert("Give the filter a name."); return; }
  for (let i = 0; i < d.routes.length; i++) {
    const r = d.routes[i];
    if (!r.pol || !r.pod) { alert(`Rota ${i+1}: selecione origem e destino.`); return; }
    if (r.pol === r.pod) { alert(`Rota ${i+1}: origem e destino precisam ser diferentes.`); return; }
    if (r.carrier === "MSC" && (!r.polId || !r.podId)) {
      alert(`Rota ${i+1}: MSC precisa que as portas tenham MSC ID (cadastre no ⚙️ primeiro).`); return;
    }
  }
  const pwd = prompt("Password to save filter:");
  if (pwd !== MF_PASSWORD) { if (pwd !== null) alert("Senha incorreta."); return; }

  // If this is an edit (d.id exists), reuse the id + createdAt so the backend
  // replaces rather than creates. For new filters, generate both.
  const filter = {
    id: d.id || (String(Date.now()) + Math.random().toString(36).substring(2, 6)),
    name: d.name.trim(),
    createdAt: d.createdAt || Date.now(),
    routes: d.routes.map(r => ({...r})),
  };

  // Persist to backend FIRST — if that fails, we don't want stale localStorage.
  // Backend write is the source of truth; localStorage is just a fast-read cache.
  try {
    const r = await fetch("/api/filters", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pwd, filter }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    // Backend may have sanitized/assigned id — use whatever it returned
    const savedFilter = data.filter || filter;
    // Refresh local cache from the authoritative backend list
    await loadFiltersFromBackend();
  } catch (e) {
    alert("Failed to save on server: " + e.message + "\n\nCheck your connection or if the server is up to date with filter endpoints.");
    return;
  }

  MF.view = "list"; MF.draft = null; MF.openPort = null; MF.portSearch = "";
  mfRender();
}

// --- VIEW: progress ---
function mfRenderProgress(){
  const p = MF.progress;
  const rows = p.filter.routes.map((r, i) => {
    const res = p.results[i];
    let icon, text, detail, warning = "";
    if (!res) { icon = "⏳"; text = "Aguardando..."; detail = ""; }
    else if (res.status === "running") { icon = "🔄"; text = "Buscando..."; detail = ""; }
    else if (res.status === "waiting") { icon = "⏲️"; text = "Aguardando " + (MF_DELAY_MS/1000) + "s (delay anti-ban)..."; detail = ""; }
    else if (res.status === "ok") {
      icon = "✅"; text = "Done"; detail = `${res.count} sailing${res.count!==1?"s":""}`;
      // Warn if the service filter matched zero (we fell back to showing all)
      if (res.serviceNoMatch && res.serviceFilter) {
        icon = "ℹ️";
        warning = `<div style="font-size:11px;color:#92400e;margin-top:3px">⚠️ No sailing with service "${esc(res.serviceFilter)}" — showing next general sailings (${res.totalAvailable} found total).</div>`;
      } else if (res.serviceFilter) {
        detail += ` · filtrado por "${res.serviceFilter}" (${res.totalAvailable} total)`;
      }
    }
    else { icon = "❌"; text = "Falhou"; detail = res.error || "erro desconhecido"; }

    // Build the route description line, showing service + TS toggle when active
    const svcTag = r.service ? ` · <code style="background:var(--blue-bg);padding:1px 4px;border-radius:3px;font-size:10px">${esc(r.service)}</code>` : "";
    const tsTag = r.showAllTs ? ` <span style="font-size:10px;color:var(--green)">+ transhipments</span>` : "";

    return `
      <div class="mf-progress-item">
        <span class="mf-progress-icon">${icon}</span>
        <div class="mf-progress-text">
          <div><span class="mf-route-tag ${r.carrier.toLowerCase()}">${esc(r.carrier)}</span> ${esc(r.polName)} → ${esc(r.podName)} (${r.maxResults} sailings)${svcTag}${tsTag}</div>
          <div class="mf-progress-result">${esc(text)}${detail?` · ${esc(detail)}`:""}</div>
          ${warning}
        </div>
      </div>
    `;
  }).join("");
  const footer = p.done
    ? `<button class="mf-btn" onclick="mfBackToList()">Voltar</button><button class="mf-btn green" onclick="mfGenerateExcel()">📥 Gerar Excel</button>`
    : `<button class="mf-btn" disabled>Aguarde...</button>`;
  return `
    <div class="mf-header">
      <h2>📥 Exportando: ${esc(p.filter.name)}</h2>
      <button class="mf-close" onclick="closeMyFilters()">✕</button>
    </div>
    <div class="mf-body">
      <div class="mf-progress">${rows}</div>
    </div>
    <div class="mf-footer">${footer}</div>
  `;
}

async function mfStartExport(filterId){
  const filter = mfLoad().find(f => f.id === filterId);
  if (!filter) { alert("Filter not found."); return; }

  MF.view = "progress";
  MF.progress = { filter, results: filter.routes.map(() => null), currentIdx: -1, done: false };
  mfRender();

  for (let i = 0; i < filter.routes.length; i++) {
    const route = filter.routes[i];
    MF.progress.currentIdx = i;
    MF.progress.results[i] = { status: "running" };
    mfRender();
    try {
      // Fetch ALL sailings first (no maxResults slice yet). Then apply the
      // service filter client-side — this way we can tell the user when
      // their filter matched nothing vs when the API returned nothing.
      const res = await mfSearchOne(route);
      const all = res.sailings;
      let filtered;
      let noMatch = false;
      if (route.service) {
        const matched = all.filter(s => mfServiceMatches(s, route.service));
        if (matched.length > 0) {
          filtered = matched.slice(0, route.maxResults);
        } else {
          // Service filter matched zero — fall back to showing ALL schedules
          // (up to maxResults), but flag it so the UI can warn the user.
          filtered = all.slice(0, route.maxResults);
          noMatch = true;
        }
      } else {
        filtered = all.slice(0, route.maxResults);
      }
      MF.progress.results[i] = {
        status: "ok",
        count: filtered.length,
        totalAvailable: all.length,
        serviceFilter: route.service || "",
        serviceNoMatch: noMatch,
        sailings: filtered,
      };
    } catch (err) {
      console.error("[MF] route", i, "failed:", err);
      MF.progress.results[i] = { status: "error", error: err.message || String(err), sailings: [] };
    }
    mfRender();
    if (i < filter.routes.length - 1) {
      MF.progress.results[i+1] = { status: "waiting" };
      mfRender();
      await new Promise(r => setTimeout(r, MF_DELAY_MS));
    }
  }
  MF.progress.done = true;
  mfRender();
}

// Fetch ALL sailings for a route. Does NOT apply service filter or maxResults
// slice — that happens in mfStartExport after the fetch succeeds.
async function mfSearchOne(route){
  const { carrier, pol, pod, polName, podName, polId, podId } = route;
  if (carrier === "MSC") {
    const r = await fetch(WORKER + `/?fromPortId=${polId}&toPortId=${podId}`);
    const d = await r.json();
    if (!d.IsSuccess || !Array.isArray(d.Data) || d.Data.length === 0) {
      throw new Error(typeof d.Data === "string" ? d.Data : "No MSC results");
    }
    const all = [];
    for (const item of d.Data) for (const rt of (item.Routes || [])) all.push({ route: rt, item });
    all.sort((a,b) => new Date(a.route.EstimatedDepartureDate) - new Date(b.route.EstimatedDepartureDate));
    return { sailings: all.map(x => mfNormalizeMsc(x.route, x.item, pol, pod, polName, podName)) };
  }
  if (carrier === "CMA" || carrier === "MAERSK" || carrier === "HMM") {
    const path = carrier === "CMA" ? "cma" : carrier === "MAERSK" ? "maersk" : "hmm";
    const weeks = carrier === "HMM" ? "2" : "5";
    const params = new URLSearchParams({ pol, pod, polName, podName, weeks });
    const r = await fetch(`/api/${path}?${params}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (!Array.isArray(d.sailings) || d.sailings.length === 0) throw new Error(`No ${carrier} sailings`);
    return { sailings: d.sailings };
  }
  throw new Error("Unknown carrier: " + carrier);
}

function mfNormalizeMsc(route, item, pol, pod, polName, podName){
  const legs = route.RouteScheduleLegDetails || [];
  const f = legs[0] || {}; const last = legs[legs.length-1] || {};
  const isDirect = legs.length === 1 && f.SingleLegOnly;
  const tsLeg = legs.length > 1 ? legs.slice(1).find(l => l.DeparturePortName) : null;
  const allPC = legs.flatMap(l => (l.PortCalls || []).map(p => ({
    name: p.PortName, code: p.PortCode,
    arr: p.EstimatedArrivalDate, dep: p.EstimatedDepartureDate,
    arrH: p.EstimatedArrivalHour, depH: p.EstimatedDepartureHour,
  })));
  return {
    carrier: "MSC",
    vessel: f.Vessel?.VesselName || route.VesselName || "TBN",
    voyage: f.DepartureVoyageNo || "",
    service: f.MaritimeServiceName || item.Key.MaritimeServiceName || "",
    origin: item.PortOfLoad || polName, originCode: item.PortOfLoadUnCode || pol,
    destination: item.PortOfDischarge || podName, destinationCode: item.PortOfDischargeUnCode || pod,
    etd: route.EstimatedDepartureDate,
    eta: route.EstimatedArrivalDate || last.EstimatedArrivalTime,
    isDirect, transitTime: route.TotalTransitTime || "", co2: route.CO2FootPrint || "",
    // Primary MSC cut-off — auto-detected (see firstMscCutoff helper)
    portCutoff: firstMscCutoff(f, route, item).value,
    tsPort: tsLeg?.DeparturePortName || "", tsPortCode: tsLeg?.DeparturePortUNCode || "",
    tsVessel: tsLeg?.Vessel?.VesselName || "", tsService: tsLeg?.MaritimeServiceName || "",
    tsEtd: tsLeg?.EstimatedDepartureTime || "", tsEta: tsLeg?.EstimatedArrivalTime || "",
    portCalls: allPC,
  };
}

// Reuse the existing exportExcel() by temporarily replacing the "saved" list.
// This inherits ALL the complex DIRECT-left/T/S-right + carrier grouping logic
// that's already proven in production — no reimplementation needed.
async function mfGenerateExcel(){
  const p = MF.progress;
  if (!p || !p.done) return;

  const allSavings = [];
  for (let i = 0; i < p.filter.routes.length; i++) {
    const r = p.results[i];
    if (!r || r.status !== "ok" || !r.sailings || !r.sailings.length) continue;
    const route = p.filter.routes[i];
    const showAllTs = !!route.showAllTs;
    for (const s of r.sailings) {
      if (s.carrier === "MSC") {
        // MSC saving — already has portCutoff + portCalls from mfNormalizeMsc.
        // Just tag it with showAllTs so exportExcel() can choose the layout.
        allSavings.push({ _key: `MSC_${s.vessel}_${s.voyage}_${s.etd}`, ...s, showAllTs });
      } else {
        allSavings.push({
          _key: `${s.carrier}_${s.vessel}_${s.voyageRef}_${s.departureDate}`,
          carrier: s.carrier,
          vessel: s.vessel,
          voyage: s.voyageRef || "",
          service: s.serviceCode || s.service || "",
          origin: s.origin || route.polName,
          originCode: s.originCode || route.pol,
          destination: s.destination || route.podName,
          destinationCode: s.destinationCode || route.pod,
          etd: s.departureDate,
          eta: s.arrivalDate,
          isDirect: !!s.isDirect,
          transitTime: (s.transitTime || 0) + "d",
          co2: s.co2 || "",
          // portCutoff is available on CMA (primary parser + v2) and HMM/Maersk normalizers
          portCutoff: s.portCutoff || "",
          tsPort: "", tsPortCode: "",
          tsVessel: "", tsService: "",
          tsEtd: "", tsEta: "",
          // portCalls carries the chronology of intermediate ports for expand
          // mode Excel export. CMA v2 populates POL+TS+POD; Maersk builds
          // full per-leg list; HMM leaves empty.
          portCalls: Array.isArray(s.portCalls) ? s.portCalls : [],
          showAllTs,
        });
      }
    }
  }

  if (allSavings.length === 0) { alert("No route returned results. Excel not generated."); return; }

  const prevSaved = localStorage.getItem("savedSailings");
  try {
    localStorage.setItem("savedSailings", JSON.stringify(allSavings));
    await exportExcel();
  } finally {
    if (prevSaved === null) localStorage.removeItem("savedSailings");
    else localStorage.setItem("savedSailings", prevSaved);
  }
}

  const subTabs = `
    <div class="pm-sub">
      <button class="pm-sub-btn ${CK.tab==="cma"?"active":""}" onclick="pmSwitchCk('cma')">${dot(cmaOk)} CMA</button>
      <button class="pm-sub-btn ${CK.tab==="hmm"?"active":""}" onclick="pmSwitchCk('hmm')">${dot(hmmOk)} HMM</button>
      <button class="pm-sub-btn ${CK.tab==="maersk"?"active":""}" onclick="pmSwitchCk('maersk')">${dot(mrkOk)} Maersk</button>
    </div>
  `;

  let body;
  if (!s) body = `<div class="pm-ck-info">Carregando...</div>`;
  else if (s._error) body = `<div class="pm-ck-info" style="color:#991b1b">Erro: ${esc(s._error)}</div>`;
  else if (CK.tab === "cma") body = pmRenderCmaPanel(s.cma);
  else if (CK.tab === "hmm") body = pmRenderHmmPanel(s.hmm);
  else body = pmRenderMaerskPanel(s.maersk);

  const fb = CK.feedback
    ? `<div class="pm-ck-feedback ${CK.feedback.type}">${esc(CK.feedback.msg)}</div>`
    : "";
  host.innerHTML = subTabs + body + fb;
}

function pmSwitchCk(which){
  CK.tab = which;
  CK.feedback = null;  // clear feedback when switching
  pmRenderCookies();
}

function pmRenderCmaPanel(cma){
  const configured = cma.configured
    ? `<strong style="color:var(--green)">✓ Configurado</strong> · ${cma.length} chars${cma.preview?` · datadome prefix: <code>${esc(cma.preview)}...</code>`:""}`
    : `<strong style="color:#991b1b">✗ Não configurado</strong>`;
  return `
    <div class="pm-ck-info">Status: ${configured}</div>
    <label class="pm-ck-label">Novos cookies CMA</label>
    <div class="pm-ck-info">Cole a string completa do header <code>cookie:</code> do cURL (DevTools → Network → routing-finder → Copy as cURL → copia só o que vem depois de <code>-b '...'</code>). Deve conter <code>datadome=...; XSRF-TOKEN=...; .AspNetCore.Session=...; Human_Search=...</code></div>
    <textarea class="pm-ck-textarea" id="ck-cma-cookies" placeholder="datadome=xxx; XSRF-TOKEN=xxx; .AspNetCore.Session=xxx; Human_Search=xxx" oninput="CK.drafts.cmaCookies=this.value">${esc(CK.drafts.cmaCookies)}</textarea>
    <div class="pm-ck-row">
      <span class="pm-ck-meta">${CK.drafts.cmaCookies.length} chars digitados</span>
      <button class="pm-ck-save" onclick="pmSaveCookies('cma')">💾 Save</button>
    </div>
  `;
}

function pmRenderHmmPanel(hmm){
  const configured = (hmm.cookiesConfigured && hmm.csrfConfigured)
    ? `<strong style="color:var(--green)">✓ Configurado</strong> · cookies: ${hmm.cookiesLength} chars · csrf: ${hmm.csrfLength} chars`
    : `<strong style="color:#991b1b">✗ Incompleto</strong> (precisa dos DOIS: cookies + csrf)`;
  return `
    <div class="pm-ck-info">Status: ${configured}</div>
    <label class="pm-ck-label">Cookies HMM</label>
    <div class="pm-ck-info">Cole a string completa do header <code>cookie:</code>. Deve conter <code>WMONID</code>, <code>JSESSIONID</code>, <code>ak_bmsc</code>, <code>bm_sz</code>, <code>_abck</code>, etc.</div>
    <textarea class="pm-ck-textarea" id="ck-hmm-cookies" placeholder="WMONID=xxx; JSESSIONID=xxx; ak_bmsc=xxx; ..." oninput="CK.drafts.hmmCookies=this.value">${esc(CK.drafts.hmmCookies)}</textarea>
    <label class="pm-ck-label">CSRF Token HMM</label>
    <div class="pm-ck-info">Valor do header <code>x-csrf-token</code> (formato UUID, ~36 chars).</div>
    <textarea class="pm-ck-textarea" id="ck-hmm-csrf" style="min-height:50px" placeholder="db152960-e367-43ec-9db8-f3e4a9aefefb" oninput="CK.drafts.hmmCsrf=this.value">${esc(CK.drafts.hmmCsrf)}</textarea>
    <div class="pm-ck-row">
      <span class="pm-ck-meta">cookies: ${CK.drafts.hmmCookies.length} · csrf: ${CK.drafts.hmmCsrf.length}</span>
      <button class="pm-ck-save" onclick="pmSaveCookies('hmm')">💾 Save</button>
    </div>
  `;
}

function pmRenderMaerskPanel(mrk){
  const configured = mrk.configured
    ? `<strong style="color:var(--green)">✓ Configurado</strong> · ${mrk.length} chars`
    : `<strong style="color:#991b1b">✗ Não configurado</strong>`;
  return `
    <div class="pm-ck-info">Status: ${configured}</div>
    <label class="pm-ck-label">Akamai BM Telemetry</label>
    <div class="pm-ck-info">Valor do header <code>akamai-bm-telemetry</code> capturado de uma sessão real do site do Maersk. É uma string comprida (~4500 chars).</div>
    <textarea class="pm-ck-textarea" id="ck-mrk-tel" style="min-height:100px" placeholder="a,xxxxxxx..." oninput="CK.drafts.maerskTel=this.value">${esc(CK.drafts.maerskTel)}</textarea>
    <div class="pm-ck-row">
      <span class="pm-ck-meta">${CK.drafts.maerskTel.length} chars digitados</span>
      <button class="pm-ck-save" onclick="pmSaveCookies('maersk')">💾 Save</button>
    </div>
  `;
}

async function pmSaveCookies(carrier){
  const pwd = prompt("Senha:");
  if (pwd === null) return;
  if (pwd !== "1234") { alert("Senha incorreta."); return; }

  let payload = { password: pwd, carrier };
  if (carrier === "cma") {
    if (!CK.drafts.cmaCookies.trim()) { alert("Cookies CMA vazios."); return; }
    payload.cookies = CK.drafts.cmaCookies;
  } else if (carrier === "hmm") {
    if (!CK.drafts.hmmCookies.trim() || !CK.drafts.hmmCsrf.trim()) {
      alert("HMM precisa dos DOIS: cookies + csrf token."); return;
    }
    payload.cookies = CK.drafts.hmmCookies;
    payload.csrfToken = CK.drafts.hmmCsrf;
  } else if (carrier === "maersk") {
    if (!CK.drafts.maerskTel.trim()) { alert("Telemetry Maersk vazia."); return; }
    payload.cookies = CK.drafts.maerskTel;
  }

  try {
    const r = await fetch("/api/cookies", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    // Success: clear the draft for this carrier, show feedback, refresh status
    if (carrier === "cma") CK.drafts.cmaCookies = "";
    if (carrier === "hmm") { CK.drafts.hmmCookies = ""; CK.drafts.hmmCsrf = ""; }
    if (carrier === "maersk") CK.drafts.maerskTel = "";
    CK.feedback = { type: "ok", msg: `✅ ${carrier.toUpperCase()} atualizado com sucesso.` };
    await pmOpenCookies();  // re-fetch status
    setTimeout(() => { CK.feedback = null; pmRenderCookies(); }, 4000);
  } catch (e) {
    CK.feedback = { type: "err", msg: `❌ Erro: ${e.message}` };
    pmRenderCookies();
  }
}

render();
fetchCustomPorts();
