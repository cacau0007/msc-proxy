<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Schedules — Allog</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--blue:#0284c7;--blue-bg:#f0f9ff;--blue-border:#bae6fd;--orange:#f59e0b;--orange-bg:#fffbeb;--orange-border:#fde68a;--radius:12px;--green:#16a34a;--msc:#d97706;--msc-bg:#fffbeb;--msc-border:#fde68a;--cma:#e4002b;--cma-bg:#fff1f2;--cma-border:#fecdd3;--maersk:#42b0d5;--maersk-bg:#ecfbff;--maersk-border:#bae6fd;--hmm:#003a70;--hmm-bg:#eef2ff;--hmm-border:#c7d2fe;--bg-grad-end:#e2e8f0;--hover:#f8fafc;--stripe:#fafbfc;--section:#f8fafc}

    /* Dark mode — toggled by adding .dark to <body>. Overrides only the
       semantic variables; carrier accent colors stay the same but their
       -bg variants get darker/more saturated to work against a dark card. */
    body.dark{
      --bg:#0b1220;--card:#161f32;--border:#2a3245;--text:#f1f5f9;--text2:#cbd5e1;--text3:#9ca8be;
      --blue:#38bdf8;--blue-bg:#0f2435;--blue-border:#1e4660;
      --orange:#fbbf24;--orange-bg:#2a2011;--orange-border:#3f2e15;
      --green:#4ade80;
      --msc-bg:#2a2011;--msc-border:#3f2e15;
      --cma-bg:#2e1215;--cma-border:#5c1f22;
      --maersk-bg:#0f2435;--maersk-border:#1e4660;
      --hmm-bg:#111931;--hmm-border:#1f2d55;
      --bg-grad-end:#0a111e;--hover:#1a2336;--stripe:#141d2e;--section:#141d2e;
    }
    /* Hardcoded backgrounds that need dark variants — kept short by targeting
       the specific rules where #f8fafc / #fafbfc / #fef2f2 were used inline. */
    body.dark .carrier-btn:hover{background:var(--hover)}
    body.dark .tbtn.red:hover{background:#3a1515;color:#fecaca}
    body.dark .tbtn.green{background:#0f2818;color:#6ee7a0}
    body.dark .dropdown-group,body.dark .mf-port-group,body.dark .pm-sub-btn{background:var(--section);color:#cbd5e1}
    body.dark .mf-route-form{background:var(--section)}
    body.dark .pm-ck-textarea{background:var(--card);color:var(--text)}
    body.dark .mf-btn:hover{background:var(--hover)}
    body.dark .mf-btn.red:hover{background:#3a1515}
    body.dark .mf-add-route:hover{background:var(--hover)}
    body.dark .mf-port-item:hover,body.dark .dropdown-item:hover{background:var(--hover)}
    body.dark .pm-panel,body.dark .mf-modal,body.dark .dropdown,body.dark .mf-port-dd{background:var(--card)}
    body.dark .dropdown-item,body.dark .mf-port-item{color:var(--text)}
    body.dark .dropdown-item .code,body.dark .mf-port-item .code{color:#cbd5e1}
    body.dark .dropdown-item.active{background:#1a3a55;color:#7dd3fc;border-left-color:var(--blue)}
    body.dark input,body.dark select,body.dark textarea{background:var(--card);color:var(--text)}
    body.dark input::placeholder,body.dark textarea::placeholder{color:var(--text3)}
    body.dark .mf-backdrop{background:rgba(0,0,0,.6)}
    body.dark .pm-ck-feedback.ok{background:#0f2818;color:#6ee7a0}
    body.dark .pm-ck-feedback.err{background:#3a1515;color:#fca5a5}
    /* Card body and child elements — force readable colors against dark card */
    body.dark .card-header:hover{background:var(--hover)}
    body.dark .leg-service-tag{background:var(--hover);color:var(--text)}
    body.dark .card-body,body.dark .leg-dates,body.dark .leg-route,body.dark .pc-date,body.dark .pc-name,body.dark .card-meta{color:#cbd5e1}
    body.dark .pc-code,body.dark .leg-voyage{color:#9ca8be}
    body.dark .leg-vessel{color:var(--text)}
    body.dark .cma-detail{color:#cbd5e1}
    body.dark .cma-detail strong{color:var(--text)}
    body.dark .port-call .dot{color:var(--blue)}
    body.dark .filter-legend{color:#9ca8be}
    body.dark .toolbar span{color:#cbd5e1}

    /* Theme toggle button — top-right floating */
    .theme-toggle{position:fixed;top:16px;right:16px;z-index:902;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:all .15s}
    .theme-toggle:hover{transform:scale(1.08)}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-grad-end) 100%);color:var(--text);min-height:100vh}
    .container{max-width:980px;margin:0 auto;padding:28px 20px}
    header{text-align:center;margin-bottom:28px}
    header h1{font-size:28px;font-weight:700;letter-spacing:-0.02em}
    header p{font-size:13px;color:var(--text3);margin-top:4px}
    .search-box{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:24px}
    .search-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
    .port-field{flex:1;min-width:200px;position:relative}
    .port-field label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
    .port-btn{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;color:var(--text3);transition:border-color .2s}
    .port-btn.selected{color:var(--text);font-weight:600}
    .port-btn:hover{border-color:var(--blue)}
    .port-btn .arrow{font-size:9px;transition:transform .2s}
    .port-btn .arrow.open{transform:rotate(180deg)}
    .dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.15);z-index:1000;max-height:340px;display:flex;flex-direction:column;overflow:hidden}
    .dropdown-search{padding:10px 12px;border-bottom:1px solid #f1f5f9}
    .dropdown-search input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;direction:ltr;text-align:left}
    .dropdown-search input:focus{border-color:var(--blue)}
    .dropdown-list{overflow-y:auto;max-height:280px}
    .dropdown-group{padding:7px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1e293b;background:#f1f5f9;position:sticky;top:0}
    .dropdown-item{width:100%;padding:9px 14px;background:transparent;border:none;border-left:3px solid transparent;font-size:14px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;color:#0f172a;transition:background .1s}
    .dropdown-item:hover{background:#f8fafc}
    .dropdown-item.active{background:var(--blue-bg);border-left-color:var(--blue);font-weight:600;color:#0c4a6e}
    .dropdown-item .code{font-size:11px;color:#475569;font-family:monospace;font-weight:500}
    .search-arrow{display:flex;align-items:center;padding-bottom:4px;font-size:20px;color:#cbd5e1}
    .search-btn{padding:12px 30px;background:linear-gradient(135deg,#0284c7,#0369a1);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s}
    .search-btn:disabled{background:#cbd5e1;cursor:not-allowed}
    .clear-search{padding:12px 16px;background:var(--card);border:1.5px solid #ef4444;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#ef4444;white-space:nowrap}
    .clear-search:hover{background:#fef2f2}
    .carrier-row{display:flex;gap:6px;padding-top:12px;border-top:1px solid #f1f5f9;margin-top:14px;width:100%}
    /* === Top page navigation === */
    .page-nav{display:flex;gap:8px;margin-bottom:16px;padding:6px;background:var(--card);border:1px solid var(--border);border-radius:14px;width:fit-content;margin-left:auto;margin-right:auto}
    .page-nav-btn{padding:9px 18px;background:transparent;border:none;border-radius:10px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
    .page-nav-btn:hover{background:var(--hover);color:var(--text)}
    .page-nav-btn.active{background:var(--blue);color:#fff}
    body.dark .page-nav-btn.active{background:var(--blue);color:#0b1220}
    /* === Tracking page === */
    .track-subtabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .track-subtab{padding:10px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
    .track-subtab:hover{border-color:var(--blue);color:var(--blue)}
    .track-subtab.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .track-search-box{padding:18px 20px}
    .track-input-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .track-input{flex:1;min-width:240px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;font-family:'Courier New',monospace;letter-spacing:.05em;background:var(--card);color:var(--text);outline:none;transition:border-color .15s}
    .track-input:focus{border-color:var(--blue)}
    .track-hint{font-size:12px;color:var(--text3);margin-top:8px;text-align:center}
    .track-status{padding:3px 9px;background:var(--blue-bg);color:var(--blue);border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .track-err{padding:14px 18px;margin:14px 0;background:#fef2f2;border:1.5px solid #fecaca;border-radius:10px;color:#991b1b}
    body.dark .track-err{background:#3a1515;border-color:#5c1f22;color:#fca5a5}
    .track-err-sub{font-size:13px;margin-top:4px;opacity:.85}
    .track-diag{margin-top:14px;padding:10px 14px;background:var(--section);border:1px dashed var(--border);border-radius:10px;font-size:13px}
    .track-diag summary{cursor:pointer;font-weight:600;color:var(--text2);user-select:none}
    .track-diag-row{padding:4px 0 4px 18px;color:var(--text3)}
    /* Track result expanded card */
    .track-section{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .track-section:last-child{border-bottom:none}
    .track-section h4{margin:0 0 10px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
    .track-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 18px;font-size:13.5px;color:var(--text)}
    .track-grid strong{color:var(--text2);font-weight:600;margin-right:4px}
    body.dark .track-grid{color:#e6eaf2}
    body.dark .track-grid strong{color:#cbd5e1}
    .leg-terminal{font-size:11px;color:var(--text3);font-family:monospace;padding:1px 5px;background:var(--section);border-radius:4px;margin-left:4px}
    .leg-meta{font-size:11.5px;color:var(--text3);margin-top:3px}
    .track-pc-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
    .track-pc-table th{text-align:left;padding:8px 10px;background:var(--section);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);border-bottom:2px solid var(--border)}
    .track-pc-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
    body.dark .track-pc-table td{color:#e6eaf2}
    .track-pc-table .track-code{font-size:10.5px;color:var(--text3);font-family:monospace;background:var(--section);padding:1px 5px;border-radius:4px;margin-left:4px}
    .track-events{display:flex;flex-direction:column;gap:8px;border-left:2px solid var(--blue);padding-left:14px;margin-top:6px}
    .track-event{position:relative}
    .track-event::before{content:"";position:absolute;left:-19px;top:5px;width:8px;height:8px;background:var(--blue);border-radius:50%;border:2px solid var(--card)}
    .track-event-date{font-size:11.5px;color:var(--text3);font-family:monospace}
    .track-event-desc{font-size:13px;color:var(--text);line-height:1.45}
    body.dark .track-event-desc{color:#e6eaf2}
    .track-fetched{font-size:11px;color:var(--text3);text-align:right;margin-top:8px;font-style:italic}
    .track-pill{display:inline-block;padding:3px 9px;background:var(--section);border:1px solid var(--border);border-radius:14px;font-family:monospace;font-size:11.5px;color:var(--text);font-weight:500}
    .carrier-btn{padding:10px 20px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;flex:1;transition:all .15s;background:var(--card);color:var(--text2)}
    .carrier-btn:hover{border-color:var(--blue);background:#f8fafc}
    .carrier-btn.msc-active{border-color:var(--msc);background:var(--msc-bg);color:var(--msc)}
    .carrier-btn.cma-active{border-color:var(--cma);background:var(--cma-bg);color:var(--cma)}
    .carrier-btn.maersk-active{border-color:var(--maersk);background:var(--maersk-bg);color:var(--maersk)}
    .carrier-btn.hmm-active{border-color:var(--hmm);background:var(--hmm-bg);color:var(--hmm)}
    .carrier-btn.all-active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .error{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;color:#991b1b;font-size:14px}
    .filters{margin-bottom:14px}
    .filter-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
    .filter-label{font-size:12px;color:var(--text3);font-weight:600;margin-right:4px}
    .fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
    .fbtn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .fbtn.clear{border-color:#ef4444;color:#ef4444}.fbtn.clear:hover{background:#fef2f2}
    .fdot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .fdot.direct{background:var(--blue)}.fdot.ts{background:var(--orange)}
    .filter-legend{margin-top:8px;font-size:12px;color:var(--text3)}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .tbtn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
    .tbtn.green{border-color:var(--green);background:#f0fdf4;color:var(--green)}.tbtn.green:hover{background:var(--green);color:#fff}
    .tbtn.red{border-color:#ef4444;background:#fef2f2;color:#ef4444}.tbtn.red:hover{background:#ef4444;color:#fff}
    .saved-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px}
    .results{display:flex;flex-direction:column;gap:12px}
    .card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s}
    .card.expanded{box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .card.saved-card{border-left:3px solid var(--green)}
    .card-header{padding:18px 22px;cursor:pointer;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}
    .card-header:hover{background:#fafbfc}
    .card-left{display:flex;align-items:center;gap:14px;min-width:200px}
    .card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .card-icon.direct{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
    .card-icon.ts{background:linear-gradient(135deg,#fef3c7,#fde68a)}
    .card-vessel{font-size:16px;font-weight:700;color:var(--text)}
    .card-meta{font-size:12px;color:var(--text3);margin-top:2px}
    .carrier-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;margin-right:4px}
    .carrier-tag.msc{background:#fef3c7;color:#92400e}
    .carrier-tag.cma{background:#fecdd3;color:#9f1239}
    .carrier-tag.maersk{background:var(--maersk-bg);color:#0369a1}
    .carrier-tag.hmm{background:var(--hmm-bg);color:var(--hmm)}
    .card-right{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
    .date-col{text-align:center}
    .date-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em}
    .date-val{font-size:15px;font-weight:600;color:var(--text);margin-top:1px}
    .tt-badge{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700}
    .tt-badge.direct{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue)}
    .tt-badge.ts{background:var(--orange-bg);border:1px solid var(--orange-border);color:#d97706}
    .ts-tag{padding:4px 10px;border-radius:6px;background:#fef3c7;font-size:12px;font-weight:600;color:#92400e}
    .save-cb{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
    .expand-arrow{font-size:11px;color:var(--text3);transition:transform .2s}
    .expand-arrow.open{transform:rotate(180deg)}
    .card-body{border-top:1px solid var(--border);padding:20px 24px;background:var(--bg-grad-end,#fafbfc)}
    .leg{margin-bottom:16px}.leg:last-child{margin-bottom:0}
    .leg-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .leg-title.first{color:var(--blue)}.leg-title.connecting{color:#d97706}.leg-title.arrival{color:var(--green)}
    .leg-vessel{font-size:15px;font-weight:600;color:var(--text);display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
    .leg-voyage{font-size:12px;color:var(--text3);font-family:monospace}
    .leg-service-tag{font-size:12px;padding:2px 8px;background:#f1f5f9;border-radius:4px;color:var(--text2)}
    .leg-route{font-size:14px;color:var(--text2);margin-bottom:4px}
    .leg-dates{font-size:13px;color:var(--text3)}
    .port-calls{margin-top:10px;margin-left:14px;border-left:2px solid var(--border);padding-left:16px}
    .port-call{font-size:13px;color:var(--text3);margin-bottom:5px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
    .port-call .dot{color:#cbd5e1;font-size:8px}
    .port-call .pc-name{font-weight:600;color:var(--text2)}
    .port-call .pc-code{font-family:monospace;font-size:11px;color:var(--text3)}
    .port-call .pc-date{font-size:12px;color:var(--text3)}
    .co2{margin-top:12px;font-size:12px;color:var(--text3)}
    .show-more{text-align:center;margin-top:16px}
    .show-more button{padding:10px 28px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;font-family:inherit}
    .timestamp{margin-top:18px;text-align:center;font-size:11px;color:var(--text3)}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
    .empty-state .icon{font-size:52px;margin-bottom:14px}
    .empty-state .title{font-size:17px;font-weight:500}
    .empty-state .sub{font-size:14px;margin-top:5px}
    .loading{text-align:center;padding:50px 20px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pm-float{position:fixed;bottom:16px;right:16px;z-index:900}
    .pm-toggle{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .pm-toggle:hover{background:#f8fafc}
    .pm-panel{position:fixed;bottom:60px;right:16px;width:380px;max-height:75vh;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:16px;z-index:901;display:none}
    .pm-panel.open{display:block}
    .pm-panel h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}

    /* Tab strip inside pm-panel (Portos / Cookies) */
    .pm-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:-4px -4px 12px -4px;padding:0 4px}
    .pm-tab{padding:8px 10px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);font-family:inherit;transition:all .15s}
    .pm-tab:hover{color:var(--text)}

<script>
// =====================================================================
// === THEME — light / dark toggle. Default follows OS preference,
//     with explicit user choice stored in localStorage overriding it.
// =====================================================================
const THEME_KEY = "theme";  // "light" | "dark" | absent (= follow OS)

function getOsTheme(){
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function getCurrentTheme(){
  const stored = localStorage.getItem(THEME_KEY);
  if (stored === "light" || stored === "dark") return stored;
  return getOsTheme();
}
function applyTheme(t){
  document.body.classList.toggle("dark", t === "dark");
  const btn = document.getElementById("themeToggle");
  if (btn) btn.textContent = (t === "dark") ? "🌙" : "☀️";
}
function toggleTheme(){
  const current = getCurrentTheme();
  const next = current === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}

// Apply on load — and react to OS theme changes if user hasn't picked explicitly
(function initTheme(){
  applyTheme(getCurrentTheme());
  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      // Only auto-update if user didn't set an explicit preference
      if (!localStorage.getItem(THEME_KEY)) applyTheme(getOsTheme());
    });
  }
})();

function getPorts(){
  const cp=loadCP();if(!cp.length)return BUILTIN_PORTS;
  const groups=BUILTIN_PORTS.map(g=>({...g,ports:g.ports.map(p=>({...p}))}));
  cp.forEach(p=>{
    // Check if a port with the same LOCODE already exists (merge MSC ID)
    let merged=false;
    for(const g of groups){
      const existing=g.ports.find(x=>x.code===p.code);
      if(existing){existing.id=p.id;if(p.name)existing.name=p.name;merged=true;break}
    }
    if(!merged){
      // Check by ID too (backward compat)
      const gByRegion=groups.find(x=>x.region===p.region);
      if(gByRegion){if(!gByRegion.ports.some(x=>x.id===p.id))gByRegion.ports.push(p)}
      else groups.push({region:p.region||"Other",ports:[p]});
    }
  });

}

// Walk an MSC API object (first leg, route, or item) recursively and find
// ANY field whose name contains "cut" (case-insensitive) with a truthy
// scalar value. Returns {key, value} or null. This is robust to MSC changing
// the exact field name across regions AND robust to the field being nested
// inside sub-objects (Vessel, PortCalls, etc).
function findMscCutoff(obj, _depth){
  _depth = _depth || 0;
  if (_depth > 6) return null;
  if (!obj || typeof obj !== "object") return null;
  // First pass: check direct keys at this level. Accept cut-off OR cutoff.
  // Prefer keys with "sailing" or "port" in them (main cut-off on MSC).
  let fallback = null;
  for (const k of Object.keys(obj)) {
    const v = obj[k];
    if (/cut.?off/i.test(k) && v && (typeof v === "string" || typeof v === "number")) {
      if (/sailing|port|main|primary/i.test(k)) return { key: k, value: v };
      if (!fallback) fallback = { key: k, value: v };
    }
  }
  if (fallback) return fallback;
  // Second pass: recurse into nested objects/arrays
  for (const k of Object.keys(obj)) {
    const v = obj[k];
    if (v && typeof v === "object") {
      if (Array.isArray(v)) {
        for (const item of v) {
          const found = findMscCutoff(item, _depth + 1);
          if (found) return found;
        }
      } else {
        const found = findMscCutoff(v, _depth + 1);
        if (found) return found;
      }
    }
  }
  return null;
}
function firstMscCutoff(leg, route, item){
  // Search full leg object (not just RouteScheduleLegDetails[0]) + route + item.
  // Fall back through all three so we catch whatever the API shape uses.
  return findMscCutoff(leg) || findMscCutoff(route) || findMscCutoff(item) || {key:"", value:""};
}

// Debug helper: walks an MSC route+item recursively and lists ALL fields
// whose name contains "cut", "date", or "time" — useful to find the exact
// field name the MSC API uses for port cut-off in different regions.
// Triggered by 🐛 button in the MSC card. Result is logged to console AND
// shown in alert so the user can copy/paste it back.
window.dbgMsc = function(idx) {
  const entry = window._routes && window._routes[idx];
  if (!entry) { alert("Route not found at idx " + idx); return; }
  const findings = [];
  function walk(obj, path) {
    if (!obj || typeof obj !== "object") return;
    if (path.length > 50) return;  // sanity
    for (const k of Object.keys(obj)) {
      const v = obj[k];
      const fullPath = path + "." + k;
      if (typeof v === "string" || typeof v === "number") {
        if (/cut|date|time/i.test(k) && v !== "" && v != null) {
          findings.push({ path: fullPath, value: String(v).slice(0, 40) });
        }
      } else if (v && typeof v === "object") {
        walk(v, fullPath);
      }
    }
  }
  walk(entry.route, "route");
  walk(entry.item, "item");
  const txt = findings.map(f => `${f.path} = ${f.value}`).join("\n");
  console.log("=== MSC Debug dump ===");
  console.log("route:", entry.route);
  console.log("item:", entry.item);
  console.log("findings:", findings);
  alert("MSC fields (date/time/cut):\n\n" + txt + "\n\n(also in console)");
};

// Maersk save toggle
function toggleSaveMaersk(key,idx){
  let saved=loadSaved();
  if(saved.some(s=>s._key===key)){saved=saved.filter(s=>s._key!==key)}
  else{
    const s=window._maerskRoutes[idx];
    // For transshipment routes, surface the connecting leg info (2nd leg onwards)
    const tsLeg=(s.legs||[]).length>1?s.legs[1]:null;
    // Build portCalls: prefer backend value, else build from legs (which the
    // card already shows successfully). Use polCode/podCode if populated,
    // otherwise fall back to the facility codes the card displays (CNNPOMT,
    // MAPTMTM, etc.) — better to have port codes visible in Excel than nothing.
    let pcalls = Array.isArray(s.portCalls) ? s.portCalls : [];
    if ((!pcalls || pcalls.length < 2) && Array.isArray(s.legs) && s.legs.length) {
      const built = [];
      const seen = new Map();
      const pushOrMerge = (code, name, arr, dep) => {
        if (!code && !name) return;
        const k = code || name;
        const i = seen.get(k);
        if (i == null) { built.push({ code: code||"", name: name||code||"", arr: arr||"", dep: dep||"" }); seen.set(k, built.length-1); }
        else { const e = built[i]; if (arr && !e.arr) e.arr = arr; if (dep && !e.dep) e.dep = dep; }
      };
      s.legs.forEach(l => {
        // Prefer unLocode-like codes; use facility code if that's all we have
        const polC = l.polCode || l.polFacility || "";
        const polN = l.polName || l.polFacility || "";
        const podC = l.podCode || l.podFacility || "";
        const podN = l.podName || l.podFacility || "";
        pushOrMerge(polC, polN, "", l.etd||"");
        pushOrMerge(podC, podN, l.eta||"", "");
      });
      pcalls = built;
    }
    saved.push({_key:key,carrier:"MAERSK",vessel:s.vessel,voyage:s.voyageRef,
      service:s.serviceCode||s.service,origin:s.origin,originCode:s.originCode,
      destination:s.destination,destinationCode:s.destinationCode,
      etd:s.departureDateTime||s.departureDate,eta:s.arrivalDateTime||s.arrivalDate,
      isDirect:s.isDirect,transitTime:s.transitTime+"d",co2:"",
      tsPort:tsLeg?tsLeg.polFacility:"",tsPortCode:tsLeg?tsLeg.polFacility:"",
      tsVessel:tsLeg?tsLeg.vessel:"",tsService:tsLeg?(tsLeg.serviceCode||tsLeg.service):"",
      tsEtd:tsLeg?tsLeg.etd:"",tsEta:tsLeg?tsLeg.eta:"",
      portCalls: pcalls,
      // Store legs too so export can rebuild portCalls if something went wrong
      legs: Array.isArray(s.legs) ? s.legs : [],
      showAllTs:false});
  }
  saveSavedLS(saved);render();
}

function fd(d){if(!d)return"—";const t=new Date(d);if(isNaN(t))return String(d);return`${String(t.getDate()).padStart(2,"0")}/${M[t.getMonth()]}/${t.getFullYear()}`}

function parseAnyDate(d){
  if(!d)return null;let t=new Date(d);if(!isNaN(t))return t;
  const s=String(d).replace(/(\d+)(st|nd|rd|th)/,"$1");
  t=new Date(s);if(!isNaN(t))return t;
  const m2=s.match(/(\d+)\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i);
  if(m2)return new Date(`${m2[2]} ${m2[1]}, ${m2[3]}`);
  // CMA format: "Monday, 08-JUN-2026" or "08-JUN-2026"
  const m3=s.match(/(\d{1,2})-(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)-(\d{4})/i);
  if(m3)return new Date(`${m3[2]} ${m3[1]}, ${m3[3]}`);
  return null;
}

    if(l.PortCalls&&l.PortCalls.length>0){pc=`<div class="port-calls">${l.PortCalls.map(p=>{let di="";if(p.EstimatedArrivalDate)di+=`ETA ${esc(p.EstimatedArrivalDate)}${p.EstimatedArrivalHour?" "+esc(p.EstimatedArrivalHour):""}`;if(p.EstimatedDepartureDate)di+=` → ETD ${esc(p.EstimatedDepartureDate)}${p.EstimatedDepartureHour?" "+esc(p.EstimatedDepartureHour):""}`;return`<div class="port-call"><span class="dot">●</span><span class="pc-name">${esc(p.PortName)}</span><span class="pc-code">(${esc(p.PortCode)})</span><span class="pc-date">${di}</span></div>`}).join("")}</div>`}
    return`<div class="leg">${title}${vl}${pc}</div>`;
  }).join("");

  return`<div class="card ${saved?'saved-card':''}" id="${id}"><div class="card-header" onclick="tog('${id}')"><div class="card-left"><input type="checkbox" class="save-cb" ${saved?'checked':''} onclick="event.stopPropagation();toggleSave('${esc(key)}',${idx})" title="${saved?'Remove':'Save'}"/><div class="card-icon ${isDirect?'direct':'ts'}">${isDirect?'🚢':'⛴️'}</div><div><div class="card-vessel"><span class="carrier-tag msc">MSC</span>${esc(vessel)}</div><div class="card-meta">${esc(voyage)} · ${esc(service)}</div></div></div><div class="card-right"><div class="date-col"><div class="date-label">ETD</div><div class="date-val">${fd(etd)}</div></div><span class="card-arrow-icon">→</span><div class="date-col"><div class="date-label">ETA</div><div class="date-val">${fd(eta)}</div></div><span class="tt-badge ${isDirect?'direct':'ts'}">${days}d</span>${!isDirect&&tsLeg?`<span class="ts-tag">T/S ${esc(tsLeg.DeparturePortName)}</span>`:""}<button onclick="event.stopPropagation();dbgMsc(${idx})" title="Debug MSC fields" style="background:transparent;border:none;cursor:pointer;font-size:12px;opacity:.4;padding:2px 6px">🐛</button><span class="expand-arrow" id="a-${id}">▼</span></div></div><div class="card-body" id="b-${id}" style="display:none">${lhtml}${renderJointBadge("MSC",service)}${portCutoff?`<div class="co2" style="background:#fff1f2;color:#9f1239"><strong>${esc(portCutoffLabel||"Cut-off")}:</strong> ${esc(portCutoff)}</div>`:""}${route.CO2FootPrint?`<div class="co2">CO₂: ${esc(route.CO2FootPrint)}</div>`:""}</div></div>`;
}

// === EXCEL EXPORT ===
// Layout matches SCHEDULE_DE_NAVIOS.xlsx template:
//   - DIRECT sailings on left (columns B..G), TRANSSHIPMENT on right (columns J..R)
//   - Within each side: grouped by CARRIER → then by SERVICE
//   - Each group has a black "DIRECT"/"TRANSSHIPMENT" banner, then a yellow
//     "CARRIERS / SERVICES" row, then a blue header row, then data rows.
//   - Dates in Portuguese short format: "21-mar.", "5-abr.", "14-mai."
//   - Inside a group, sailings sorted by ETD ascending (earliest first).
async function exportExcel(forceAllTs){
  const saved=loadSaved();if(!saved.length)return alert("No saved sailings.");
  // Safety net: reconstruct portCalls from legs[] if missing/short (happens
  // when saves are older than the portCalls propagation, or backend didn't
  // return it). This ensures TS routes always have intermediate ports in Excel.
  saved.forEach(s => {
    const needsRebuild = !Array.isArray(s.portCalls) || s.portCalls.length < 2;
    if (needsRebuild && Array.isArray(s.legs) && s.legs.length) {
      const built = [];
      const seen = new Map();
      const pushOrMerge = (code, name, arr, dep) => {
        if (!code && !name) return;
        const k = code || name;
        const i = seen.get(k);
        if (i == null) { built.push({ code: code||"", name: name||code||"", arr: arr||"", dep: dep||"" }); seen.set(k, built.length-1); }
        else { const e = built[i]; if (arr && !e.arr) e.arr = arr; if (dep && !e.dep) e.dep = dep; }
      };
      s.legs.forEach(l => {
        const polC = l.polCode || l.polFacility || "";
        const polN = l.polName || l.polFacility || "";
        const podC = l.podCode || l.podFacility || "";
        const podN = l.podName || l.podFacility || "";
        pushOrMerge(polC, polN, "", l.etd||"");
        pushOrMerge(podC, podN, l.eta||"", "");
      });
      if (built.length >= 2) s.portCalls = built;
    }
    // Last-resort fallback: build a 3-entry portCalls from the tsPort/tsEtd/tsEta
    // fields that have always been saved for Maersk/CMA TS sailings. This works
    // even for saves made years ago, as long as the route was TS.
    const stillEmpty = !Array.isArray(s.portCalls) || s.portCalls.length < 2;
    if (stillEmpty && !s.isDirect && s.tsPort) {
      s.portCalls = [
        { code: s.originCode||"", name: s.origin||"", arr: "", dep: s.etd||"" },
        { code: s.tsPortCode||s.tsPort||"", name: s.tsPort||"", arr: s.tsEta||"", dep: s.tsEtd||"" },
        { code: s.destinationCode||"", name: s.destination||"", arr: s.eta||"", dep: "" },
      ];
    }
  });
  // DEBUG: log saved sailings structure so we can see what's actually exported
  console.log("=== EXPORT DEBUG: saved sailings ===");
  saved.forEach((s, i) => {
    console.log(`[${i}] ${s.carrier} ${s.vessel} ${s.voyage||""} | isDirect=${s.isDirect} | showAllTs=${s.showAllTs} | portCalls.length=${(s.portCalls||[]).length}`);
    if ((s.portCalls||[]).length) {
      console.log(`     portCalls:`, JSON.stringify(s.portCalls));
    }
  });
  const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet("NEXT VESSELS");
  const blue="FF215E99",yellow="FFFFFF00",black="FF000000",white="FFFFFFFF";
  const fontHdr={name:"Arial",size:11,bold:true,color:{argb:white}};
  const fontHdrBlack={name:"Arial",size:11,bold:true,color:{argb:black}};
  const fontData={name:"Arial",size:11};
  const fontDataBold={name:"Arial",size:11,bold:true};
  const fillBlue={type:"pattern",pattern:"solid",fgColor:{argb:blue}};
  const fillYellow={type:"pattern",pattern:"solid",fgColor:{argb:yellow}};
  const fillBlack={type:"pattern",pattern:"solid",fgColor:{argb:black}};
  const center={horizontal:"center",vertical:"middle"};
  const left={horizontal:"left",vertical:"middle"};
  const border={style:"thin",color:{argb:"FF999999"}};
  const allBorder={top:border,left:border,bottom:border,right:border};

  // --- 1. Group sailings: side (DIRECT/TRANSSHIPMENT) → carrier → service ---
  function groupSailings(side){
    const items=saved.filter(s=>side==="DIRECT"?s.isDirect:!s.isDirect);
    // Group by carrier + service + route (POL→POD). This way, when the user
    // saves multiple rotas with the same service (e.g. Ningbo→Salvador AND
    // Shanghai→Salvador, both on AE2/412), each route gets its own separate
    // table instead of being merged into a single confusing block.
    const byKey=new Map();
    for(const s of items){
      const car=s.carrier||"MSC";
      const svc=s.service||"(no service)";
      const pol=s.originCode||s.origin||"";
      const pod=s.destinationCode||s.destination||"";
      const key=`${car}|${svc}|${pol}→${pod}`;
      if(!byKey.has(key)){
        byKey.set(key,{carrier:car,service:svc,pol,pod,polName:s.origin||"",podName:s.destination||"",items:[]});
      }
      byKey.get(key).items.push(s);
    }
    // Build flat list of groups, sort items inside each by ETD
    const groups=[];
    for(const[,g]of byKey){
      g.items.sort((a,b)=>{
        const da=parseAnyDate(a.etd),db=parseAnyDate(b.etd);
        if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
        return da-db;
      });
      groups.push(g);
    }
    return groups;
  }

  // --- 2. Resolve ETD/ETA port columns for a group ---
  // Use up to 2 origin-country ports (ETD) + up to 2 destination-country ports (ETA).
  // Column order = chronological by date (port hit first goes first).
  function getPortColsForGroup(items, expand){
    // In EXPAND mode, build a single cronological sequence of ALL ports across
    // all items in the group, applying the user's rules:
    //   • ETD for foreign ports (non-BR)
    //   • ETA for Brazilian ports (BR prefix)
    //   • Never show the same port twice
    //   • Vessel changes (T/S) are ignored — we track only ports+dates
    // Returns { etdPorts, etaPorts } where items are [code, name, dateForSort].
    // The sort key is the earliest observed date for that port across items.
    if (expand) {
      // Map keyed by portKey → {name, earliestDate, type:"etd"|"eta"}
      // portKey = portCode if present, else "name:<NAME>" (covers CMA TS
      // ports which come without UN/LOCODE from our HTML parser).
      const portMap = new Map();
      const isBr = (code, name) => {
        if (typeof code === "string" && code.toUpperCase().startsWith("BR")) return true;
        // Name-based heuristic for Brazilian ports when code is missing
        if (name && /brazil|brasil/i.test(name)) return true;
        const BR_NAMES = /\b(santos|itapoa|itapo[áa]|navegantes|paranagu[áa]|itaja[íi]|rio grande|suape|pecem|pec[ée]m|salvador|manaus|vila do conde|vit[óo]ria|itagua[íi]|rio de janeiro|buenos aires)\b/i;
        return name && BR_NAMES.test(name) && !/argentin|urugua|paragua|chile|peru|colomb/i.test(name);
      };

      function consider(code, name, date){
        // Use code as key when available; otherwise synthesize from name
        const key = code ? code : (name ? ("NAME:" + name.toUpperCase().trim()) : "");
        if (!key) return;
        const type = isBr(code, name) ? "eta" : "etd";
        const parsed = date ? parseAnyDate(date) : null;
        const existing = portMap.get(key);
        if (!existing) {
          portMap.set(key, { code: code || "", name: name || code || "", date: parsed, raw: date || "", type });
        } else {
          if (parsed && (!existing.date || parsed < existing.date)) {
            existing.date = parsed;
            existing.raw = date;
          }
          if (!existing.name && name) existing.name = name;
          if (!existing.code && code) existing.code = code;
        }
      }

      // Seed with POL (as ETD) and POD (as ETA) for each item
      items.forEach(s => {
        if (s.originCode || s.origin) consider(s.originCode, s.origin, s.etd);
        if (s.destinationCode || s.destination) consider(s.destinationCode, s.destination, s.eta);
        // Then walk the portCalls for intermediate stops
        (s.portCalls || []).forEach(pc => {
          if (!pc.code && !pc.name) return;
          const code = pc.code || "";
          const name = pc.name || "";
          const dateForType = isBr(code, name) ? (pc.arr || pc.dep) : (pc.dep || pc.arr);
          consider(code, name, dateForType);
        });
      });

      // Sort chronologically and split by type
      const entries = [...portMap.values()].map(info => ({
        code: info.code, name: info.name, date: info.date, type: info.type,
      }));
      entries.sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return a.date - b.date;
      });
      const etdPorts = entries.filter(e => e.type === "etd").map(e => [e.code || e.name, e.name]);
      const etaPorts = entries.filter(e => e.type === "eta").map(e => [e.code || e.name, e.name]);
      return { etdPorts, etaPorts, expanded: true };
    }

    // Legacy mode: up to 2 ETD + 2 ETA, same logic as before (unchanged)
    const etdMap=new Map(),etaMap=new Map();
    items.forEach(s=>{
      if(s.originCode&&!etdMap.has(s.originCode))etdMap.set(s.originCode,s.origin);
      if(s.destinationCode&&!etaMap.has(s.destinationCode))etaMap.set(s.destinationCode,s.destination);
    });
    const oPres=new Set([...etdMap.keys()].map(c=>c.substring(0,2)));
    const dPres=new Set([...etaMap.keys()].map(c=>c.substring(0,2)));
    // Collect POL/POD codes + facility codes from each sailing — any port call
    // that matches one of these is the POL or POD itself and should NOT be
    // added as an extra column in legacy mode (the compact layout shows only
    // POL + POD; intermediate ports belong to expand mode).
    const polPodCodes = new Set();
    items.forEach(s => {
      if (s.originCode) polPodCodes.add(s.originCode);
      if (s.destinationCode) polPodCodes.add(s.destinationCode);
      // First and last portCalls entry are the POL/POD themselves — add their
      // codes so their facility-code equivalents (e.g. CNNPOMT for CNNGB) are
      // recognized and skipped below.
      const pcs = s.portCalls || [];
      if (pcs.length > 0 && pcs[0].code) polPodCodes.add(pcs[0].code);
      if (pcs.length > 0 && pcs[pcs.length-1].code) polPodCodes.add(pcs[pcs.length-1].code);
    });
    items.forEach(s=>{
      const pcs = s.portCalls || [];
      pcs.forEach((pc, idx) => {
        if(!pc.code)return;
        // Skip the first and last portCall entries (those ARE the POL/POD)
        if (idx === 0 || idx === pcs.length - 1) return;
        // Skip anything whose code matches a known POL/POD (covers the case where
        // portCalls for one sailing has a facility code that coincides with the
        // POL of another sailing in the group).
        if (polPodCodes.has(pc.code)) return;
        const pre=pc.code.substring(0,2);
        if(oPres.has(pre)&&!etdMap.has(pc.code)&&etdMap.size<2)etdMap.set(pc.code,pc.name);
        if(dPres.has(pre)&&!etaMap.has(pc.code)&&etaMap.size<2)etaMap.set(pc.code,pc.name);
      });
    });
    function sortByDate(entries,type){
      return entries.sort((a,b)=>{
        let da=null,db=null;
        for(const s of items){
          const va=findPCDate(s,a[0],type),vb=findPCDate(s,b[0],type);
          if(va&&!da){const p=parseAnyDate(va);if(p)da=p}
          if(vb&&!db){const p=parseAnyDate(vb);if(p)db=p}
          if(da&&db)break;
        }
        if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;
      });
    }
    return{etdPorts:sortByDate([...etdMap.entries()].slice(0,2),"etd"),etaPorts:sortByDate([...etaMap.entries()].slice(0,2),"eta")};
  }

  function findPCDate(s,code,type){
    // Direct match against origin/destination codes
    if(type==="etd"&&s.originCode===code)return s.etd;
    if(type==="eta"&&s.destinationCode===code)return s.eta;
    // Match against portCalls by code
    const pc=(s.portCalls||[]).find(p=>p.code===code);
    if(pc)return type==="etd"?(pc.dep||pc.arr||""):(pc.arr||pc.dep||"");
    // In expand mode we may pass a port NAME (not code) when the code is missing
    // — try matching against origin/destination by name or portCalls by name.
    const codeLower = String(code||"").toLowerCase();
    if (codeLower) {
      if (type==="etd" && s.origin && s.origin.toLowerCase()===codeLower) return s.etd;
      if (type==="eta" && s.destination && s.destination.toLowerCase()===codeLower) return s.eta;
      const pcByName = (s.portCalls||[]).find(p=>p.name && p.name.toLowerCase()===codeLower);
      if(pcByName)return type==="etd"?(pcByName.dep||pcByName.arr||""):(pcByName.arr||pcByName.dep||"");
    }
    // Fall back to fuzzy name lookup via port catalog
    const allP=allPorts();const portInfo=allP.find(p=>p.code===code);
    if(portInfo){
      const pcByName=(s.portCalls||[]).find(p=>p.name&&p.name.toLowerCase().includes(portInfo.name.toLowerCase()));
      if(pcByName)return type==="etd"?(pcByName.dep||pcByName.arr||""):(pcByName.arr||pcByName.dep||"");
    }
    return"";
  }

  // --- 3. Title + structure ---
  ws.getCell("A1").value="NEXT VESSELS";
  ws.getCell("A1").font={name:"Arial",size:14,bold:true};

  // DIRECT side starts at column 2 (B), TRANSSHIPMENT at column 10 (J).
  const DIRECT_START_COL=2;
  const TRANS_START_COL=10;
  // Each group has 6 columns: VESSEL + up to 2 ETD + up to 2 ETA = up to 5.
  // We render one block at a time and walk a pointer down the rows for each side.

  const directGroups=groupSailings("DIRECT");
  const transGroups=groupSailings("TRANSSHIPMENT");

  // Render one group block starting at (startRow, startCol). Returns next row.
  // When `expand` is true, shows ALL ports in the voyage chronologically
  // (ETD for foreign ports, ETA for Brazilian ports) instead of the compact
  // 2+2 layout.
  function renderGroup(group,startRow,startCol,bannerLabel,expand){
    const{etdPorts,etaPorts}=getPortColsForGroup(group.items, expand);
    // Total cols = 1 (VESSEL) + etd + eta. Min 4 to look balanced.
    const dataCols=1+etdPorts.length+etaPorts.length;
    const totalCols=Math.max(dataCols,5);
    const lastCol=startCol+totalCols-1;
    let r=startRow;

    // BLACK BANNER: DIRECT or TRANSSHIPMENT
    ws.mergeCells(r,startCol,r,lastCol);
    const bc=ws.getCell(r,startCol);
    bc.value=bannerLabel;bc.font={name:"Arial",size:12,bold:true,color:{argb:white}};
    bc.fill=fillBlack;bc.alignment=center;bc.border=allBorder;
    for(let c=startCol;c<=lastCol;c++)ws.getCell(r,c).fill=fillBlack;
    r++;

    // YELLOW BANNER: CARRIERS / SERVICES + service description
    const cs=ws.getCell(r,startCol);
    cs.value="CARRIERS / SERVICES";cs.font=fontHdr;cs.fill=fillBlue;cs.alignment=center;cs.border=allBorder;
    if(lastCol>startCol)ws.mergeCells(r,startCol+1,r,lastCol);
    const sv=ws.getCell(r,startCol+1);
    sv.value=`${group.carrier} (${group.service})`;
    sv.font=fontDataBold;sv.fill=fillYellow;sv.alignment=center;sv.border=allBorder;
    for(let c=startCol+1;c<=lastCol;c++){ws.getCell(r,c).fill=fillYellow;ws.getCell(r,c).border=allBorder}
    r++;

    // BLUE HEADER ROW: VESSEL | ETD ports... | ETA ports...
    let col=startCol;
    const vh=ws.getCell(r,col);vh.value="VESSEL";vh.font=fontHdr;vh.fill=fillBlue;vh.alignment=center;vh.border=allBorder;col++;
    etdPorts.forEach(([code,name])=>{
      const h=ws.getCell(r,col);h.value=`ETD ${name}`;h.font=fontHdr;h.fill=fillBlue;h.alignment=center;h.border=allBorder;col++;
    });
    etaPorts.forEach(([code,name])=>{
      const h=ws.getCell(r,col);h.value=`ETA ${name}`;h.font=fontHdr;h.fill=fillBlue;h.alignment=center;h.border=allBorder;col++;
    });
    // Fill any leftover columns to keep banner width consistent
    while(col<=lastCol){
      const h=ws.getCell(r,col);h.fill=fillBlue;h.border=allBorder;col++;
    }
    r++;

    // DATA ROWS
    group.items.forEach(s=>{
      let c=startCol;
      const vc=ws.getCell(r,c);
      vc.value=s.voyage?`${s.vessel} / ${s.voyage}`:s.vessel;
      vc.font=fontData;vc.alignment=left;vc.border=allBorder;c++;
      etdPorts.forEach(([code])=>{
        const dc=ws.getCell(r,c);dc.value=fdpt(findPCDate(s,code,"etd"));
        dc.font=fontData;dc.alignment=center;dc.border=allBorder;c++;
      });
      etaPorts.forEach(([code])=>{
        const dc=ws.getCell(r,c);dc.value=fdpt(findPCDate(s,code,"eta"));
        dc.font=fontData;dc.alignment=center;dc.border=allBorder;c++;
      });
      while(c<=lastCol){const dc=ws.getCell(r,c);dc.border=allBorder;c++}
      r++;
    });

    return r+1; // blank line between groups
  }

  // Walk both sides in parallel from row 3.
  // A group is rendered "expanded" (chronological, all ports) when:
  //   • forceAllTs is on (global toggle), OR
  //   • any sailing in that group has showAllTs=true (per-sailing toggle)
  // Otherwise uses the legacy compact layout (POL + POD only).
  const groupExpands = (g) => {
    if (forceAllTs) return true;
    if (g.items.some(s => s.showAllTs)) return true;
    return false;
  };
  const anyExpand = directGroups.some(groupExpands) || transGroups.some(groupExpands);
  // In expand mode, push TRANSSHIPMENT further right to avoid collision
  // with a wide expanded DIRECT block (which can reach 10-15 columns easily).
  const TRANS_COL_FINAL = anyExpand ? 22 : TRANS_START_COL;
  let directRow=3,transRow=3;
  for(const g of directGroups)directRow=renderGroup(g,directRow,DIRECT_START_COL,"DIRECT",groupExpands(g));
  for(const g of transGroups)transRow=renderGroup(g,transRow,TRANS_COL_FINAL,"TRANSSHIPMENT",groupExpands(g));

  // --- 4. Column widths ---
  ws.getColumn(1).width=4;     // padding A
  ws.getColumn(2).width=35;    // VESSEL DIRECT (may be at col 22 in expand mode too; widen both sides defensively)
  for(let c=3;c<=50;c++)ws.getColumn(c).width=18; // dates — extended range for expanded mode
  if (anyExpand) {
    ws.getColumn(TRANS_COL_FINAL).width = 35;  // VESSEL TRANS in expand mode
  } else {
    ws.getColumn(8).width=4;    ws.getColumn(9).width=4;    // gaps in compact mode
    ws.getColumn(10).width=35;  // VESSEL TRANS in compact mode
  }

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`NEXT_VESSELS_${new Date().toISOString().split("T")[0]}.xlsx`;a.click();URL.revokeObjectURL(url);
}

function setPage(p) {
  S.page = p;
  S.err = null;
  // Reset tracking state when leaving the tab so old results don't flash
  if (p !== "tracking") { S.trackErr = null; }
  render();
}

function setTrackType(t) {
  S.trackType = t;
  S.trackInput = "";
  S.trackErr = null;
  S.trackResults = null;
  S.trackExpanded = {};
  render();
  // Re-focus input after re-render
  setTimeout(() => {
    const el = document.getElementById("track-input");
    if (el) el.focus();
  }, 30);
}

async function doTrackSearch() {
  const ref = (S.trackInput || "").trim();
  if (!ref) return;
  S.trackLoading = true;
  S.trackErr = null;
  S.trackResults = null;
  S.trackExpanded = {};
  render();
  try {
    const r = await fetch(`/api/track/${S.trackType}?ref=${encodeURIComponent(ref)}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    S.trackResults = data;
    if (data.successCount === 0) {
      // None of the configured carriers matched. Tell user but still show the
      // "carriers not configured" list so they know what's pending vs failed.
      S.trackErr = "No carrier returned a match for this reference.";
    }
  } catch (e) {
    console.error("[track]", e);
    S.trackErr = e.message || "Tracking failed";
  }
  S.trackLoading = false;
  render();
}

function toggleTrackCard(carrier) {
  S.trackExpanded[carrier] = !S.trackExpanded[carrier];
  render();
}

// Format a date — accepts ISO strings or anything parseAnyDate handles.
// Returns short readable form for headers ("26/Apr/2026") or full date+time
// for details ("26/Apr/2026 13:00").
function fmtDateShort(d) {
  if (!d) return "—";
  return fd(d);
}
function fmtDateLong(d) {
  if (!d) return "—";
  const t = parseAnyDate(d);
  if (!t) return String(d);
  const dd = String(t.getDate()).padStart(2, "0");
  const mm = M[t.getMonth()];
  const yyyy = t.getFullYear();
  const HH = String(t.getHours()).padStart(2, "0");
  const MM = String(t.getMinutes()).padStart(2, "0");
  return `${dd}/${mm}/${yyyy} ${HH}:${MM}`;
}

function renderTrackingPage() {
  const TYPES = [
    { id: "booking", label: "Booking", icon: "📦", placeholder: "Booking number (e.g. SNT1234567, NAM0123456...)" },
    { id: "mbl",     label: "MBL",     icon: "📄", placeholder: "Master B/L number" },
    { id: "cntr",    label: "Container", icon: "🧊", placeholder: "Container number (e.g. MSCU1234567)" },
  ];
  const cur = TYPES.find(t => t.id === S.trackType) || TYPES[0];

  let out = `<header><h1>🔍 Tracking</h1><p>Universal booking, MBL & container lookup across all carriers</p></header>`;

  // Sub-tabs for type
  out += `<div class="track-subtabs">`;
  for (const t of TYPES) {
    const active = S.trackType === t.id;
    out += `<button class="track-subtab ${active?'active':''}" onclick="setTrackType('${t.id}')">${t.icon} ${t.label}</button>`;
  }
  out += `</div>`;

  // Search input
  // The button's disabled state is updated directly on each keystroke (no
  // full re-render) so we don't lose cursor position. Track is also enabled
  // from the start — doTrackSearch validates the input and ignores empty.
  out += `<div class="search-box track-search-box"><div class="track-input-row">
    <input id="track-input" type="text" class="track-input" value="${esc(S.trackInput||"")}"
      placeholder="${esc(cur.placeholder)}"
      oninput="S.trackInput=this.value;document.getElementById('track-btn').disabled=!this.value.trim()||S.trackLoading"
      onkeydown="if(event.key==='Enter')doTrackSearch()"
      autofocus />
    <button id="track-btn" class="search-btn" ${!(S.trackInput||"").trim()||S.trackLoading?'disabled':''} onclick="doTrackSearch()">${S.trackLoading?'Searching...':'Track'}</button>
    ${S.trackInput||S.trackResults?`<button class="clear-search" onclick="S.trackInput='';S.trackResults=null;S.trackErr=null;S.trackExpanded={};render()">✕ Clear</button>`:""}
  </div>
  <div class="track-hint">Searches all 9 carriers in parallel · Whoever recognizes the number wins</div>
  </div>`;

  // Loading state
  if (S.trackLoading) {
    out += `<div class="empty-state"><div class="icon">⏳</div><div class="title">Searching across all carriers…</div><div class="sub">Hitting MSC · CMA CGM · Maersk · HMM · Evergreen · Hapag · ZIM · ONE · COSCO in parallel</div></div>`;
    return out;
  }

  // Error / no-match state
  if (S.trackErr && (!S.trackResults || S.trackResults.successCount === 0)) {
    out += `<div class="track-err"><strong>⚠️ ${esc(S.trackErr)}</strong>
      <div class="track-err-sub">Check the number and type. Each carrier has a distinct format — see <a href="https://www.allog.com.br" target="_blank" style="color:inherit;text-decoration:underline">our reference guide</a>.</div>
    </div>`;
  }

  // Results
  if (S.trackResults && S.trackResults.results) {
    const successes = S.trackResults.results.filter(r => r.ok);
    const configuredFails = S.trackResults.results.filter(r => !r.ok && !r.notConfigured);
    const notConfigured = S.trackResults.results.filter(r => r.notConfigured);

    if (successes.length > 0) {
      out += `<div class="toolbar"><span style="font-size:14px;color:var(--text2);font-weight:600">${successes.length} carrier${successes.length!==1?'s':''} matched <code>${esc(S.trackResults.reference)}</code></span></div>`;
      out += `<div class="results">${successes.map(r => renderTrackResult(r)).join("")}</div>`;
    }

    // Diagnostic: configured carriers that failed (network, no result, etc)
    if (configuredFails.length > 0) {
      out += `<details class="track-diag"><summary>${configuredFails.length} carrier${configuredFails.length!==1?'s':''} replied with no match</summary>`;
      out += configuredFails.map(r => `<div class="track-diag-row">• <strong>${esc(r.carrier)}</strong> — ${esc(r.error||"no result")}</div>`).join("");
      out += `</details>`;
    }

    // Always-shown footer: carriers waiting for API config
    if (notConfigured.length > 0) {
      out += `<details class="track-diag"><summary>${notConfigured.length} carrier${notConfigured.length!==1?'s':''} pending API setup</summary>`;
      out += notConfigured.map(r => `<div class="track-diag-row">⏳ <strong>${esc(r.carrier)}</strong> — API not yet wired up</div>`).join("");
      out += `</details>`;
    }
  } else if (!S.trackErr && !S.trackLoading) {
    // Empty initial state
    out += `<div class="empty-state"><div class="icon">${cur.icon}</div><div class="title">Enter a ${cur.label.toLowerCase()} number to track</div><div class="sub">The system will query all carriers simultaneously and show whoever recognizes the number.</div></div>`;
  }

  return out;
}

function renderTrackResult(r) {
  const expanded = !!S.trackExpanded[r.carrier];
  const carrierKey = String(r.carrier || "").toLowerCase();
  // Header (always shown)
  const tradeName = r.service ? getCommercialServiceName(r.carrier, r.service) : "";
  const headerLine = [
    r.voyage,
    tradeName || r.serviceCode || r.service,
  ].filter(Boolean).join(" · ");

  const statusBadge = r.status ? `<span class="track-status">${esc(r.status)}</span>` : "";
  const directBadge = r.isDirect === false ? `<span class="ts-tag">⛴️ T/S</span>` : (r.isDirect === true ? `<span class="ts-tag" style="background:var(--green-bg,#dcfce7);color:var(--green)">🚢 Direct</span>` : "");
  const transitBadge = r.transitDays != null ? `<span class="tt-badge">${r.transitDays}d</span>` : "";

  let card = `<div class="card" id="track-${esc(r.carrier)}">
    <div class="card-header" onclick="toggleTrackCard('${esc(r.carrier)}')">
      <div class="card-left">
        <div class="card-icon ${r.isDirect===false?'ts':'direct'}">${r.isDirect===false?'⛴️':'🚢'}</div>
        <div>
          <div class="card-vessel"><span class="carrier-tag ${carrierKey}">${esc(r.carrier)}</span>${esc(r.vessel||"—")}</div>
          <div class="card-meta">${esc(headerLine||"—")}</div>
        </div>
      </div>
      <div class="card-right">
        <div class="date-col"><div class="date-label">ETD</div><div class="date-val">${fmtDateShort(r.etd)}</div></div>
        <span class="card-arrow-icon">→</span>
        <div class="date-col"><div class="date-label">ETA</div><div class="date-val">${fmtDateShort(r.eta)}</div></div>
        ${transitBadge}${directBadge}${statusBadge}
        <span class="expand-arrow">${expanded?'▲':'▼'}</span>
      </div>
    </div>`;

  if (expanded) {
    card += `<div class="card-body">${renderTrackDetails(r)}</div>`;
  }
  card += `</div>`;
  return card;
}

function renderTrackDetails(r) {
  let out = "";

  // === BL / Booking reference (always shown when present) ===
  if (r.blNumber || (Array.isArray(r.containerNumbers) && r.containerNumbers.length > 1)) {
    out += `<div class="track-section"><h4>📄 Documents & Containers</h4>
      <div class="track-grid">
        ${r.blNumber?`<div><strong>B/L Number:</strong> ${esc(r.blNumber)}</div>`:""}
        ${r.referenceType==="booking"?`<div><strong>Booking:</strong> ${esc(r.reference)}</div>`:""}
      </div>`;
    if (Array.isArray(r.containerNumbers) && r.containerNumbers.length > 1) {
      out += `<div style="margin-top:8px;font-size:12.5px"><strong style="color:var(--text2)">${r.containerNumbers.length} containers in this shipment:</strong>
        <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:5px">${r.containerNumbers.map(cn => `<span class="track-pill">${esc(cn)}</span>`).join("")}</div>
      </div>`;
    }
    out += `</div>`;
  }

  // === Container info (only for cntr type) ===
  if (r.container && r.container.number) {
    out += `<div class="track-section"><h4>📦 Container</h4>
      <div class="track-grid">
        ${r.container.number?`<div><strong>Number:</strong> ${esc(r.container.number)}</div>`:""}
        ${r.container.size?`<div><strong>Size:</strong> ${esc(r.container.size)}</div>`:""}
        ${r.container.type?`<div><strong>Type:</strong> ${esc(r.container.type)}</div>`:""}
        ${r.container.sealNumber?`<div><strong>Seal:</strong> ${esc(r.container.sealNumber)}</div>`:""}
        ${r.container.weight?`<div><strong>Weight:</strong> ${esc(r.container.weight)} kg</div>`:""}
      </div></div>`;
  }

  // === Route summary ===
  out += `<div class="track-section"><h4>🗺️ Route</h4>
    <div class="track-grid">
      <div><strong>Origin:</strong> ${esc(r.origin||"—")}${r.originCode?` (${esc(r.originCode)})`:""}</div>
      <div><strong>Destination:</strong> ${esc(r.destination||"—")}${r.destinationCode?` (${esc(r.destinationCode)})`:""}</div>
      <div><strong>Service:</strong> ${esc(getCommercialServiceName(r.carrier, r.service||r.serviceCode)||"—")}${r.serviceCode&&r.serviceCode!==r.service?` (${esc(r.serviceCode)})`:""}</div>
      <div><strong>Voyage:</strong> ${esc(r.voyage||"—")}</div>
      <div><strong>Type:</strong> ${r.isDirect===true?'Direct':r.isDirect===false?'Transhipment':"—"}</div>
      <div><strong>Transit:</strong> ${r.transitDays!=null?r.transitDays+' days':"—"}</div>
    </div></div>`;

  // === Legs (vessel-by-vessel breakdown) ===
  if (Array.isArray(r.legs) && r.legs.length > 0) {
    out += `<div class="track-section"><h4>🚢 Legs (${r.legs.length})</h4>`;
    r.legs.forEach((leg, i) => {
      const isFirst = i === 0;
      const isLast = i === r.legs.length - 1;
      const legType = isFirst ? "first" : (isLast ? "arrival" : "connecting");
      const legIcon = isFirst ? "🚢" : (isLast ? "📍" : "🔄");
      const legLabel = isFirst ? "Origin Leg" : (isLast ? "Final Leg" : `Transhipment ${i}`);
      out += `<div class="leg">
        <div class="leg-title ${legType}">${legIcon} ${esc(legLabel)}</div>
        <div class="leg-vessel"><strong>${esc(leg.vessel||"—")}</strong>${leg.voyage?` · ${esc(leg.voyage)}`:""}${leg.service?` · ${esc(getCommercialServiceName(r.carrier,leg.service))}`:""}</div>
        <div class="leg-route">${esc(leg.polName||leg.polCode||"—")} ${leg.polTerminal?`<span class="leg-terminal">[${esc(leg.polTerminal)}]</span>`:""} → ${esc(leg.podName||leg.podCode||"—")} ${leg.podTerminal?`<span class="leg-terminal">[${esc(leg.podTerminal)}]</span>`:""}</div>
        <div class="leg-dates">ETD: ${fmtDateLong(leg.etd)} — ETA: ${fmtDateLong(leg.eta)}</div>
        ${leg.imo?`<div class="leg-meta">IMO: ${esc(leg.imo)}</div>`:""}
      </div>`;
    });
    out += `</div>`;
  }

  // === Port calls (chronological) ===
  if (Array.isArray(r.portCalls) && r.portCalls.length > 0) {
    out += `<div class="track-section"><h4>📍 Port Calls</h4>
      <table class="track-pc-table">
        <thead><tr><th>Port</th><th>Terminal</th><th>Arrival (ETA)</th><th>Departure (ETD)</th></tr></thead>
        <tbody>`;
    r.portCalls.forEach(pc => {
      out += `<tr>
        <td><strong>${esc(pc.name||pc.code||"—")}</strong>${pc.code&&pc.code!==pc.name?` <span class="track-code">${esc(pc.code)}</span>`:""}</td>
        <td>${esc(pc.terminal||"—")}</td>
        <td>${fmtDateLong(pc.arr)}</td>
        <td>${fmtDateLong(pc.dep)}</td>
      </tr>`;
    });
    out += `</tbody></table></div>`;
  }

  // === Events timeline ===
  if (Array.isArray(r.events) && r.events.length > 0) {
    out += `<div class="track-section"><h4>📜 Events</h4><div class="track-events">`;
    r.events.forEach(ev => {
      out += `<div class="track-event">
        <div class="track-event-date">${fmtDateLong(ev.date)}</div>
        <div class="track-event-desc">${esc(ev.description||"—")}${ev.location?` · ${esc(ev.location)}`:""}${ev.vessel?` · ${esc(ev.vessel)}`:""}</div>
      </div>`;
    });
    out += `</div></div>`;
  }

  // === Fetched at ===
  if (r.fetchedAt) {
    out += `<div class="track-fetched">Data fetched: ${fmtDateLong(r.fetchedAt)}</div>`;
  }

  return out;
}

function render(){
  // === Top page navigation (Schedules vs Tracking) ===
  // Always rendered above whatever page content follows. Used to switch
  // between the schedules tool and the universal tracking tool.
  const pageNav = `
    <div class="page-nav">
      <button class="page-nav-btn ${S.page==='schedules'?'active':''}" onclick="setPage('schedules')">📅 Schedules</button>
      <button class="page-nav-btn ${S.page==='tracking'?'active':''}" onclick="setPage('tracking')">🔍 Tracking</button>
    </div>
  `;
  if (S.page === "tracking") {
    h = pageNav + renderTrackingPage();
    document.getElementById("app").innerHTML = h;
    return;
  }
  // Default: schedules page
  h = pageNav;
  const f=fp(S.from),t=fp(S.to);const saved=loadSaved();
