<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Next Sailings — MSC Schedule Search</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--blue:#0284c7;--blue-bg:#f0f9ff;--blue-border:#bae6fd;--orange:#f59e0b;--orange-bg:#fffbeb;--orange-border:#fde68a;--radius:12px;--green:#16a34a}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg) 0%,#e2e8f0 100%);color:var(--text);min-height:100vh}
    .container{max-width:980px;margin:0 auto;padding:28px 20px}
    header{text-align:center;margin-bottom:28px}
    header h1{font-size:28px;font-weight:700;letter-spacing:-0.02em}
    header p{font-size:13px;color:var(--text3);margin-top:4px}
    .search-box{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:24px}
    .search-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
    .port-field{flex:1;min-width:200px;position:relative}
    .port-field label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
    .port-btn{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;color:var(--text3);transition:border-color .2s}
    .port-btn.selected{color:var(--text);font-weight:600}
    .port-btn:hover{border-color:var(--blue)}
    .port-btn .arrow{font-size:9px;transition:transform .2s}
    .port-btn .arrow.open{transform:rotate(180deg)}
    .dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.15);z-index:1000;max-height:340px;display:flex;flex-direction:column;overflow:hidden}
    .dropdown-search{padding:10px 12px;border-bottom:1px solid #f1f5f9}
    .dropdown-search input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;direction:ltr;text-align:left}
    .dropdown-search input:focus{border-color:var(--blue)}
    .dropdown-list{overflow-y:auto;max-height:280px}
    .dropdown-group{padding:7px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:#f8fafc;position:sticky;top:0}
    .dropdown-item{width:100%;padding:9px 14px;background:transparent;border:none;border-left:3px solid transparent;font-size:14px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;color:var(--text);transition:background .1s}
    .dropdown-item:hover{background:#f8fafc}
    .dropdown-item.active{background:var(--blue-bg);border-left-color:var(--blue);font-weight:600}
    .dropdown-item .code{font-size:11px;color:var(--text3);font-family:monospace}
    .search-arrow{display:flex;align-items:center;padding-bottom:4px;font-size:20px;color:#cbd5e1}
    .search-btn{padding:12px 30px;background:linear-gradient(135deg,#0284c7,#0369a1);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s}
    .search-btn:disabled{background:#cbd5e1;cursor:not-allowed}
    .clear-search{padding:12px 16px;background:var(--card);border:1.5px solid #ef4444;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#ef4444;white-space:nowrap}
    .clear-search:hover{background:#fef2f2}
    .error{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;color:#991b1b;font-size:14px}
    .filters{margin-bottom:14px}
    .filter-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
    .filter-label{font-size:12px;color:var(--text3);font-weight:600;margin-right:4px}
    .fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
    .fbtn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .fbtn.clear{border-color:#ef4444;color:#ef4444}.fbtn.clear:hover{background:#fef2f2}
    .fdot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .fdot.direct{background:var(--blue)}.fdot.ts{background:var(--orange)}
    .filter-legend{margin-top:8px;font-size:12px;color:var(--text3)}
    .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .tbtn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
    .tbtn.green{border-color:var(--green);background:#f0fdf4;color:var(--green)}.tbtn.green:hover{background:var(--green);color:#fff}
    .tbtn.red{border-color:#ef4444;background:#fef2f2;color:#ef4444}.tbtn.red:hover{background:#ef4444;color:#fff}
    .saved-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px}
    .results{display:flex;flex-direction:column;gap:12px}
    .card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s}
    .card.expanded{box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .card.saved-card{border-left:3px solid var(--green)}
    .card-header{padding:18px 22px;cursor:pointer;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}
    .card-header:hover{background:#fafbfc}
    .card-left{display:flex;align-items:center;gap:14px;min-width:200px}
    .card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .card-icon.direct{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
    .card-icon.ts{background:linear-gradient(135deg,#fef3c7,#fde68a)}
    .card-vessel{font-size:16px;font-weight:700;color:var(--text)}
    .card-meta{font-size:12px;color:var(--text3);margin-top:2px}
    .card-right{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
    .date-col{text-align:center}
    .date-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em}
    .date-val{font-size:15px;font-weight:600;color:var(--text);margin-top:1px}
    .tt-badge{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700}
    .tt-badge.direct{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue)}
    .tt-badge.ts{background:var(--orange-bg);border:1px solid var(--orange-border);color:#d97706}
    .ts-tag{padding:4px 10px;border-radius:6px;background:#fef3c7;font-size:12px;font-weight:600;color:#92400e}
    .save-cb{width:20px;height:20px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
    .expand-arrow{font-size:11px;color:var(--text3);transition:transform .2s}
    .expand-arrow.open{transform:rotate(180deg)}
    .card-body{border-top:1px solid #f1f5f9;padding:20px 24px;background:#fafbfc}
    .leg{margin-bottom:16px}.leg:last-child{margin-bottom:0}
    .leg-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .leg-title.first{color:var(--blue)}.leg-title.connecting{color:#d97706}.leg-title.arrival{color:var(--green)}
    .leg-vessel{font-size:15px;font-weight:600;color:var(--text);display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
    .leg-voyage{font-size:12px;color:var(--text3);font-family:monospace}
    .leg-service-tag{font-size:12px;padding:2px 8px;background:#f1f5f9;border-radius:4px;color:var(--text2)}
    .leg-route{font-size:14px;color:var(--text2);margin-bottom:4px}
    .leg-dates{font-size:13px;color:var(--text3)}
    .port-calls{margin-top:10px;margin-left:14px;border-left:2px solid var(--border);padding-left:16px}
    .port-call{font-size:13px;color:var(--text3);margin-bottom:5px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
    .port-call .dot{color:#cbd5e1;font-size:8px}
    .port-call .pc-name{font-weight:600;color:var(--text2)}
    .port-call .pc-code{font-family:monospace;font-size:11px;color:var(--text3)}
    .port-call .pc-date{font-size:12px;color:var(--text3)}
    .co2{margin-top:12px;font-size:12px;color:var(--text3)}
    .show-more{text-align:center;margin-top:16px}
    .show-more button{padding:10px 28px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;font-family:inherit}
    .timestamp{margin-top:18px;text-align:center;font-size:11px;color:var(--text3)}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
    .empty-state .icon{font-size:52px;margin-bottom:14px}
    .empty-state .title{font-size:17px;font-weight:500}
    .empty-state .sub{font-size:14px;margin-top:5px}
    .loading{text-align:center;padding:50px 20px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Port manager - tiny floating button */
    .pm-float{position:fixed;bottom:16px;right:16px;z-index:900}
    .pm-toggle{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .pm-toggle:hover{background:#f8fafc}
    .pm-panel{position:fixed;bottom:60px;right:16px;width:340px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:16px;z-index:901;display:none}
    .pm-panel.open{display:block}
    .pm-panel h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
    .pm-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
    .pm-row input,.pm-row select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;outline:none;direction:ltr;text-align:left}
    .pm-row input:focus{border-color:var(--blue)}
    .pm-add{padding:6px 12px;border:none;border-radius:6px;background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .pm-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
    .pm-tag{display:flex;align-items:center;gap:3px;padding:3px 8px;background:#f1f5f9;border-radius:4px;font-size:11px;color:var(--text2)}
    .pm-tag button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:13px;font-weight:700;padding:0}
    @media(max-width:640px){.search-row{flex-direction:column}.search-arrow{display:none}.port-field{min-width:100%}.search-btn{width:100%}.card-header{padding:14px 16px}.card-body{padding:16px 18px}.pm-panel{width:calc(100% - 32px);right:16px}}
  </style>
</head>
<body>
<div class="container" id="app"></div>
<div class="pm-float">
  <button class="pm-toggle" onclick="togglePM()" title="Manage ports">⚙️</button>
  <div class="pm-panel" id="pmPanel">
    <h3>⚙️ Add Custom Port</h3>
    <div class="pm-row">
      <input id="pm-name" placeholder="Name" style="flex:1;min-width:80px"/>
      <input id="pm-id" placeholder="ID" type="number" style="width:60px"/>
      <input id="pm-code" placeholder="Code" maxlength="5" style="width:60px"/>
    </div>
    <div class="pm-row">
      <select id="pm-region" style="flex:1"><option>China</option><option>East Asia</option><option>Southeast Asia</option><option>South Asia</option><option>Brasil</option><option>South America</option><option>Europe</option><option>Africa</option></select>
      <button class="pm-add" onclick="addPort()">+ Add</button>
    </div>
  </div>
</div>

<script>
const BUILTIN_PORTS=[{region:"China",ports:[{id:441,name:"Ningbo",code:"CNNGB"},{id:444,name:"Shanghai",code:"CNSHA"},{id:446,name:"Qingdao",code:"CNTAO"},{id:448,name:"Xiamen",code:"CNXMN"},{id:2,name:"Yantian",code:"CNYTN"},{id:30,name:"Shekou",code:"CNSHK"},{id:900,name:"Nansha",code:"CNNSA"},{id:343,name:"Hong Kong",code:"HKHKG"},{id:438,name:"Fuzhou",code:"CNFOC"},{id:463,name:"Dalian",code:"CNDLC"},{id:1298,name:"Tianjin Xingang",code:"CNTSN"},{id:440,name:"Lianyungang",code:"CNLYG"}]},{region:"East Asia",ports:[{id:95,name:"Kaohsiung",code:"TWKHH"},{id:274,name:"Busan",code:"KRPUS"},{id:279,name:"Tomakomai",code:"JPTMK"},{id:281,name:"Matsuyama",code:"JPMYJ"},{id:282,name:"Nagoya",code:"JPNGO"}]},{region:"Southeast Asia",ports:[{id:122,name:"Singapore",code:"SGSIN"},{id:221,name:"Port Klang",code:"MYPKG"},{id:220,name:"Pasir Gudang",code:"MYPGU"},{id:1292,name:"Vung Tau",code:"VNVUT"},{id:51,name:"Haiphong",code:"VNHPH"},{id:336,name:"Jakarta",code:"IDJKT"},{id:328,name:"Surabaya",code:"IDSUB"}]},{region:"South Asia",ports:[{id:252,name:"Colombo",code:"LKCMB"},{id:311,name:"Tuticorin",code:"INTUT"},{id:1516,name:"Ennore",code:"INENO"},{id:16,name:"Mundra",code:"INMUN"},{id:1362,name:"Hazira",code:"INHZA"}]},{region:"Brasil",ports:[{id:475,name:"Santos",code:"BRSSZ"},{id:1032,name:"Navegantes",code:"BRNVT"},{id:479,name:"Itajaí",code:"BRITJ"},{id:480,name:"Paranaguá",code:"BRPNG"},{id:1281,name:"Itapoá",code:"BRIOA"},{id:470,name:"Rio Grande",code:"BRRIG"},{id:471,name:"Rio de Janeiro",code:"BRRIO"},{id:473,name:"Salvador",code:"BRSSA"},{id:19,name:"Suape",code:"BRSUA"},{id:332,name:"Pecém",code:"BRPEC"},{id:476,name:"Vitória",code:"BRVIX"},{id:1088,name:"Manaus",code:"BRMAO"}]},{region:"South America",ports:[{id:512,name:"Buenos Aires",code:"ARBUE"}]},{region:"Europe",ports:[{id:401,name:"Valencia",code:"ESVLC"},{id:377,name:"Le Havre",code:"FRLEH"},{id:300,name:"Genoa",code:"ITGOA"},{id:1466,name:"Vado Ligure",code:"ITVDL"},{id:429,name:"Bremerhaven",code:"DEBRV"},{id:481,name:"Antwerp",code:"BEANR"},{id:149,name:"Leixões",code:"PTLEI"},{id:319,name:"Haifa",code:"ILHFA"}]},{region:"Africa",ports:[{id:125,name:"Dakar",code:"SNDKR"},{id:126,name:"Berbera",code:"SOBBO"},{id:127,name:"Mogadishu",code:"SOMGQ"}]}];

const WORKER="https://msc-proxy.cacatu00007.workers.dev";
window._customPorts=[];
function loadCP(){return window._customPorts}
function getPorts(){
  const cp=loadCP();if(!cp.length)return BUILTIN_PORTS;
  const groups=BUILTIN_PORTS.map(g=>({...g,ports:[...g.ports]}));
  cp.forEach(p=>{
    const g=groups.find(x=>x.region===p.region);
    if(g){if(!g.ports.some(x=>x.id===p.id))g.ports.push(p)}
    else groups.push({region:p.region||"Other",ports:[p]});
  });
  return groups;
}
function allPorts(){return getPorts().flatMap(g=>g.ports)}
async function fetchCustomPorts(){try{const r=await fetch(WORKER+"/ports");window._customPorts=await r.json();render()}catch(e){}}
function loadSaved(){try{return JSON.parse(localStorage.getItem("savedSailings")||"[]")}catch(e){return[]}}
function saveSavedLS(s){localStorage.setItem("savedSailings",JSON.stringify(s))}
function isSaved(key){return loadSaved().some(s=>s._key===key)}
function sailKey(route,item){const l=route.RouteScheduleLegDetails||[];const f=l[0]||{};return`${f.Vessel?.VesselName||""}_${f.DepartureVoyageNo||""}_${route.EstimatedDepartureDate||""}_${route.EstimatedArrivalDate||""}`}
function toggleSave(key,idx){
  let saved=loadSaved();
  if(saved.some(s=>s._key===key)){saved=saved.filter(s=>s._key!==key)}
  else{
    const{route,item}=window._routes[idx];
    const legs=route.RouteScheduleLegDetails||[];const f=legs[0]||{};const last=legs[legs.length-1]||{};
    const isDirect=legs.length===1&&f.SingleLegOnly;
    const tsLeg=legs.length>1?legs.slice(1).find(l=>l.DeparturePortName):null;
    // Collect all port calls across all legs
    const allPC=legs.flatMap(l=>(l.PortCalls||[]).map(p=>({name:p.PortName,code:p.PortCode,arr:p.EstimatedArrivalDate,dep:p.EstimatedDepartureDate,arrH:p.EstimatedArrivalHour,depH:p.EstimatedDepartureHour})));
    saved.push({_key:key,vessel:f.Vessel?.VesselName||route.VesselName||"TBN",voyage:f.DepartureVoyageNo||"",
      service:f.MaritimeServiceName||item.Key.MaritimeServiceName||"",
      origin:item.PortOfLoad||"",originCode:item.PortOfLoadUnCode||"",
      destination:item.PortOfDischarge||"",destinationCode:item.PortOfDischargeUnCode||"",
      etd:route.EstimatedDepartureDate,eta:route.EstimatedArrivalDate||last.EstimatedArrivalTime,
      isDirect,transitTime:route.TotalTransitTime||"",co2:route.CO2FootPrint||"",
      tsPort:tsLeg?.DeparturePortName||"",tsPortCode:tsLeg?.DeparturePortUNCode||"",
      tsVessel:tsLeg?.Vessel?.VesselName||"",tsService:tsLeg?.MaritimeServiceName||"",
      tsEtd:tsLeg?.EstimatedDepartureTime||"",tsEta:tsLeg?.EstimatedArrivalTime||"",
      portCalls:allPC});
  }
  saveSavedLS(saved);render();
}

// Port manager
function togglePM(){document.getElementById("pmPanel").classList.toggle("open")}
async function addPort(){
  const name=document.getElementById("pm-name").value.trim();
  const id=parseInt(document.getElementById("pm-id").value.trim());
  const code=document.getElementById("pm-code").value.trim().toUpperCase();
  const region=document.getElementById("pm-region").value;
  if(!name||!id||!code)return alert("Fill name, ID and code.");
  if(allPorts().some(p=>p.id===id))return alert("Port ID already exists.");
  const pwd=prompt("Enter password:");
  if(!pwd)return;
  try{
    const r=await fetch(WORKER+"/ports",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,id,code,region,password:pwd})});
    const d=await r.json();
    if(d.error)return alert(d.error);
    window._customPorts=d.ports;
    document.getElementById("pm-name").value="";document.getElementById("pm-id").value="";document.getElementById("pm-code").value="";
    render();alert(name+" added to "+region+"!");
    document.getElementById("pmPanel").classList.remove("open");
  }catch(e){alert("Failed to save.")}
}

let S={from:null,to:null,fo:false,to2:false,fs:"",ts:"",loading:false,err:null,res:null,sf:"ALL",mx:5,_cur:null};
window._routes=[];
const fp=id=>allPorts().find(p=>p.id===id);
const esc=s=>{const d=document.createElement("div");d.textContent=s;return d.innerHTML};
const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MPT=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function fd(d){if(!d)return"—";const t=new Date(d);if(isNaN(t))return String(d);return`${String(t.getDate()).padStart(2,"0")}/${M[t.getMonth()]}/${t.getFullYear()}`}
function fdt(d){if(!d)return"—";const t=new Date(d);if(isNaN(t))return String(d);return`${String(t.getDate()).padStart(2,"0")}/${M[t.getMonth()]}/${t.getFullYear()} ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`}
function parseAnyDate(d){
  if(!d)return null;
  let t=new Date(d);if(!isNaN(t))return t;
  // Handle "Fri 24th Apr 2026 06:15" or "Fri 24th Apr 2026"
  const s=String(d).replace(/(\d+)(st|nd|rd|th)/,"$1");
  t=new Date(s);if(!isNaN(t))return t;
  // Try extracting day month year
  const m2=s.match(/(\d+)\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i);
  if(m2)return new Date(`${m2[2]} ${m2[1]}, ${m2[3]}`);
  return null;
}
function fdpt(d){if(!d)return"";const t=parseAnyDate(d);if(!t)return"";return`${t.getDate()}-${MPT[t.getMonth()]}.`}
function tt(a,b){if(!a||!b)return"—";return Math.round((new Date(b)-new Date(a))/864e5)}
function allSvcs(data){const m=new Map();for(const i of data){const s=i.Key.MaritimeServiceName,dr=i.Key.IsDirectRoute;if(!m.has(s))m.set(s,{name:s,direct:dr,count:0});m.get(s).count+=i.Routes.length;for(const r of i.Routes)for(const l of(r.RouteScheduleLegDetails||[]))if(l.MaritimeServiceName&&!m.has(l.MaritimeServiceName))m.set(l.MaritimeServiceName,{name:l.MaritimeServiceName,direct:false,count:0})};return[...m.values()].sort((a,b)=>a.name.localeCompare(b.name))}
function matchSvc(item,route,f){if(f==="ALL")return true;if(item.Key.MaritimeServiceName===f)return true;for(const l of(route.RouteScheduleLegDetails||[]))if(l.MaritimeServiceName===f)return true;return false}

function handleSearchInput(type,el){
  const k=type==="from"?"fs":"ts";
  S[k]=el.value;S._cur=el.selectionStart;render();
}

function renderDD(type){
  const sr=type==="from"?S.fs:S.ts,cur=type==="from"?S.from:S.to;
  const fl=getPorts().map(g=>({...g,ports:g.ports.filter(p=>p.name.toLowerCase().includes(sr.toLowerCase())||p.code.toLowerCase().includes(sr.toLowerCase()))})).filter(g=>g.ports.length>0);
  const ok=type==="from"?"fo":"to2",k=type==="from"?"fs":"ts";
  return`<div class="dropdown"><div class="dropdown-search"><input id="dd-input" placeholder="Search port..." value="${esc(sr)}" oninput="handleSearchInput('${type}',this)"/></div><div class="dropdown-list">${fl.map(g=>`<div class="dropdown-group">${esc(g.region)}</div>${g.ports.map(p=>`<button class="dropdown-item ${p.id===cur?'active':''}" onclick="S.${type}=${p.id};S.${ok}=false;S.${k}='';render()"><span>${esc(p.name)}</span><span class="code">${esc(p.code)}</span></button>`).join("")}`).join("")}</div></div>`;
}

function renderCard(route,item,idx){
  const legs=route.RouteScheduleLegDetails||[];const f=legs[0]||{};const isDirect=legs.length===1&&f.SingleLegOnly;
  const vessel=f.Vessel?.VesselName||route.VesselName||"TBN";const voyage=f.DepartureVoyageNo||"";
  const service=f.MaritimeServiceName||item.Key.MaritimeServiceName||"";
  const etd=route.EstimatedDepartureDate,last=legs[legs.length-1]||{};
  const eta=route.EstimatedArrivalDate||last.EstimatedArrivalTime;const days=tt(etd,eta);
  const tsLeg=legs.length>1?legs.slice(1).find(l=>l.DeparturePortName):null;
  const id="c"+idx;const key=sailKey(route,item);const saved=isSaved(key);

  let lhtml=legs.map((l,li)=>{
    let title="";
    if(legs.length>1){if(li===0)title=`<div class="leg-title first">🚢 1st Vessel</div>`;else if(l.LastLeg&&!l.DeparturePortName)title=`<div class="leg-title arrival">📍 Arrival</div>`;else title=`<div class="leg-title connecting">🔄 ${li+1}° Vessel — ${esc(l.MaritimeServiceName||"Connecting")}</div>`}
    let vl="";
    if(l.DeparturePortName){
      if(li===0){vl=`<div class="leg-vessel"><span>${esc(l.Vessel?.VesselName||vessel)}</span><span class="leg-voyage">${esc(l.DepartureVoyageNo||"")}</span>${l.MaritimeServiceName?`<span class="leg-service-tag">${esc(l.MaritimeServiceName)}</span>`:""}</div><div class="leg-route">${esc(l.DeparturePortName)} (${esc(l.DeparturePortUNCode||"")}) → ${l.ArrivalPortName?`${esc(l.ArrivalPortName)} (${esc(l.ArrivalPortUNCode||"")})`:""}</div>`}
      else{vl=`<div class="leg-vessel"><span>${esc(l.Vessel?.VesselName||"TBN")}</span><span class="leg-voyage">${esc(l.DepartureVoyageNo||"")}</span>${l.MaritimeServiceName?`<span class="leg-service-tag">${esc(l.MaritimeServiceName)}</span>`:""}</div><div class="leg-route">${esc(l.DeparturePortName)} (${esc(l.DeparturePortUNCode||"")}) → ${l.ArrivalPortName?`${esc(l.ArrivalPortName)} (${esc(l.ArrivalPortUNCode||"")})`:""}</div><div class="leg-dates">ETD: ${fdt(l.EstimatedDepartureTime)}${l.EstimatedArrivalTime?` — ETA: ${fdt(l.EstimatedArrivalTime)}`:""}</div>`}
    }else if(l.ArrivalPortName){vl=`<div class="leg-route">→ ${esc(l.ArrivalPortName)} (${esc(l.ArrivalPortUNCode||"")}) — ETA: ${fdt(l.EstimatedArrivalTime)}</div>`}
    let pc="";
    if(l.PortCalls&&l.PortCalls.length>0){pc=`<div class="port-calls">${l.PortCalls.map(p=>{let di="";if(p.EstimatedArrivalDate)di+=`ETA ${esc(p.EstimatedArrivalDate)}${p.EstimatedArrivalHour?" "+esc(p.EstimatedArrivalHour):""}`;if(p.EstimatedDepartureDate)di+=` → ETD ${esc(p.EstimatedDepartureDate)}${p.EstimatedDepartureHour?" "+esc(p.EstimatedDepartureHour):""}`;return`<div class="port-call"><span class="dot">●</span><span class="pc-name">${esc(p.PortName)}</span><span class="pc-code">(${esc(p.PortCode)})</span><span class="pc-date">${di}</span></div>`}).join("")}</div>`}
    return`<div class="leg">${title}${vl}${pc}</div>`;
  }).join("");

  return`<div class="card ${saved?'saved-card':''}" id="${id}"><div class="card-header" onclick="tog('${id}')"><div class="card-left"><input type="checkbox" class="save-cb" ${saved?'checked':''} onclick="event.stopPropagation();toggleSave('${esc(key)}',${idx})" title="${saved?'Remove':'Save'}"/><div class="card-icon ${isDirect?'direct':'ts'}">${isDirect?'🚢':'⛴️'}</div><div><div class="card-vessel">${esc(vessel)}</div><div class="card-meta">${esc(voyage)} · ${esc(service)}</div></div></div><div class="card-right"><div class="date-col"><div class="date-label">ETD</div><div class="date-val">${fd(etd)}</div></div><span class="card-arrow-icon">→</span><div class="date-col"><div class="date-label">ETA</div><div class="date-val">${fd(eta)}</div></div><span class="tt-badge ${isDirect?'direct':'ts'}">${days}d</span>${!isDirect&&tsLeg?`<span class="ts-tag">T/S ${esc(tsLeg.DeparturePortName)}</span>`:""}<span class="expand-arrow" id="a-${id}">▼</span></div></div><div class="card-body" id="b-${id}" style="display:none">${lhtml}${route.CO2FootPrint?`<div class="co2">CO₂: ${esc(route.CO2FootPrint)}</div>`:""}</div></div>`;
}

function tog(id){const b=document.getElementById("b-"+id),a=document.getElementById("a-"+id),c=document.getElementById(id);if(b.style.display==="none"){b.style.display="block";a.classList.add("open");c.classList.add("expanded")}else{b.style.display="none";a.classList.remove("open");c.classList.remove("expanded")}}

// === EXCEL EXPORT ===
async function exportExcel(){
  const saved=loadSaved();if(!saved.length)return alert("No saved sailings.");
  const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet("NEXT VESSELS");
  const blue="FF215E99",yellow="FFFFFF00",black="FF000000",white="FFFFFFFF";
  const hf={name:"Arial",size:11,bold:true,color:{argb:white}};
  const df={name:"Arial",size:11};
  const hFill={type:"pattern",pattern:"solid",fgColor:{argb:blue}};
  const yFill={type:"pattern",pattern:"solid",fgColor:{argb:yellow}};
  const bFill={type:"pattern",pattern:"solid",fgColor:{argb:black}};
  const ct={horizontal:"center",vertical:"middle"};
  const directs=saved.filter(s=>s.isDirect),trans=saved.filter(s=>!s.isDirect);

  // Collect up to 2 origin-country ETD ports and up to 2 dest-country ETA ports
  function getPortCols(items){
    const etdMap=new Map(),etaMap=new Map();
    // Gather all origin and destination ports across all saved items
    items.forEach(s=>{
      if(s.originCode&&!etdMap.has(s.originCode))etdMap.set(s.originCode,s.origin);
      if(s.destinationCode&&!etaMap.has(s.destinationCode))etaMap.set(s.destinationCode,s.destination);
    });
    // Also scan port calls for same-country ports
    const oPres=new Set([...etdMap.keys()].map(c=>c.substring(0,2)));
    const dPres=new Set([...etaMap.keys()].map(c=>c.substring(0,2)));
    items.forEach(s=>{
      (s.portCalls||[]).forEach(pc=>{
        if(!pc.code)return;
        const pre=pc.code.substring(0,2);
        if(oPres.has(pre)&&!etdMap.has(pc.code)&&etdMap.size<2)etdMap.set(pc.code,pc.name);
        if(dPres.has(pre)&&!etaMap.has(pc.code)&&etaMap.size<2)etaMap.set(pc.code,pc.name);
      });
    });
    return{etdPorts:[...etdMap.entries()].slice(0,2),etaPorts:[...etaMap.entries()].slice(0,2)};
  }

  function findPCDate(s,code,type){
    // Direct match: origin ETD or destination ETA
    if(type==="etd"&&s.originCode===code)return s.etd;
    if(type==="eta"&&s.destinationCode===code)return s.eta;
    // Search port calls by code
    const pc=(s.portCalls||[]).find(p=>p.code===code);
    if(pc){
      if(type==="etd")return pc.dep||pc.arr||"";
      return pc.arr||pc.dep||"";
    }
    // Search port calls by name match (fallback)
    const allP=allPorts();const portInfo=allP.find(p=>p.code===code);
    if(portInfo){
      const pcByName=(s.portCalls||[]).find(p=>p.name&&p.name.toLowerCase().includes(portInfo.name.toLowerCase()));
      if(pcByName){
        if(type==="etd")return pcByName.dep||pcByName.arr||"";
        return pcByName.arr||pcByName.dep||"";
      }
    }
    return"";
  }


  ws.getCell("A1").value="NEXT VESSELS";ws.getCell("A1").font={name:"Arial",size:14,bold:true};
  let row=3;

  // DIRECT
  if(directs.length){
    const{etdPorts,etaPorts}=getPortCols(directs);
    const totalCols=1+etdPorts.length+etaPorts.length;
    ws.mergeCells(row,1,row,totalCols);
    ws.getCell(row,1).value="DIRECT";ws.getCell(row,1).font={...hf,size:14};ws.getCell(row,1).fill=bFill;ws.getCell(row,1).alignment=ct;
    for(let c=1;c<=totalCols;c++)ws.getCell(row,c).fill=bFill;
    row++;
    // Service row
    const dsvcs=[...new Set(directs.map(s=>s.service))].map(s=>`MSC (${s})`).join(", ");
    ws.getCell(row,1).value="CARRIERS / SERVICES";ws.getCell(row,1).font=hf;ws.getCell(row,1).fill=hFill;ws.getCell(row,1).alignment=ct;
    ws.mergeCells(row,2,row,totalCols);ws.getCell(row,2).value=dsvcs;ws.getCell(row,2).font={name:"Arial",size:11,bold:true};ws.getCell(row,2).fill=yFill;ws.getCell(row,2).alignment=ct;
    row++;
    // Headers
    let col=1;
    ws.getCell(row,col).value="VESSEL";ws.getCell(row,col).font=hf;ws.getCell(row,col).fill=hFill;ws.getCell(row,col).alignment=ct;col++;
    etdPorts.forEach(([code,name])=>{ws.getCell(row,col).value=`ETD ${name}`;ws.getCell(row,col).font=hf;ws.getCell(row,col).fill=hFill;ws.getCell(row,col).alignment=ct;col++});
    etaPorts.forEach(([code,name])=>{ws.getCell(row,col).value=`ETA ${name}`;ws.getCell(row,col).font=hf;ws.getCell(row,col).fill=hFill;ws.getCell(row,col).alignment=ct;col++});
    row++;
    // Data
    directs.forEach(s=>{
      col=1;
      ws.getCell(row,col).value=`${s.vessel} / ${s.voyage}`;ws.getCell(row,col).font=df;col++;
      etdPorts.forEach(([code])=>{ws.getCell(row,col).value=fdpt(findPCDate(s,code,"etd"));ws.getCell(row,col).font=df;ws.getCell(row,col).alignment=ct;col++});
      etaPorts.forEach(([code])=>{ws.getCell(row,col).value=fdpt(findPCDate(s,code,"eta"));ws.getCell(row,col).font=df;ws.getCell(row,col).alignment=ct;col++});
      row++;
    });
    row++;
  }

  // TRANSSHIPMENT
  if(trans.length){
    const{etdPorts,etaPorts}=getPortCols(trans);
    const totalCols=1+etdPorts.length+etaPorts.length;
    ws.mergeCells(row,1,row,totalCols);
    ws.getCell(row,1).value="TRANSSHIPMENT";ws.getCell(row,1).font={...hf,size:14};ws.getCell(row,1).fill=bFill;ws.getCell(row,1).alignment=ct;
    for(let c=1;c<=totalCols;c++)ws.getCell(row,c).fill=bFill;
    row++;
    const tsvcs=[...new Set(trans.map(s=>s.service))].map(s=>`MSC (${s})`).join(", ");
    ws.getCell(row,1).value="CARRIERS / SERVICES";ws.getCell(row,1).font=hf;ws.getCell(row,1).fill=hFill;ws.getCell(row,1).alignment=ct;
    ws.mergeCells(row,2,row,totalCols);ws.getCell(row,2).value=tsvcs;ws.getCell(row,2).font={name:"Arial",size:11,bold:true};ws.getCell(row,2).fill=yFill;ws.getCell(row,2).alignment=ct;
    row++;
    let col=1;
    ws.getCell(row,col).value="VESSEL";ws.getCell(row,col).font=hf;ws.getCell(row,col).fill=hFill;ws.getCell(row,col).alignment=ct;col++;
    etdPorts.forEach(([code,name])=>{ws.getCell(row,col).value=`ETD ${name}`;ws.getCell(row,col).font=hf;ws.getCell(row,col).fill=hFill;ws.getCell(row,col).alignment=ct;col++});
    etaPorts.forEach(([code,name])=>{ws.getCell(row,col).value=`ETA ${name}`;ws.getCell(row,col).font=hf;ws.getCell(row,col).fill=hFill;ws.getCell(row,col).alignment=ct;col++});
    row++;
    trans.forEach(s=>{
      col=1;
      ws.getCell(row,col).value=`${s.vessel} / ${s.voyage}`;ws.getCell(row,col).font=df;col++;
      etdPorts.forEach(([code])=>{ws.getCell(row,col).value=fdpt(findPCDate(s,code,"etd"));ws.getCell(row,col).font=df;ws.getCell(row,col).alignment=ct;col++});
      etaPorts.forEach(([code])=>{ws.getCell(row,col).value=fdpt(findPCDate(s,code,"eta"));ws.getCell(row,col).font=df;ws.getCell(row,col).alignment=ct;col++});
      row++;
    });
  }

  // Auto-width
  ws.columns.forEach(c=>{let max=10;c.eachCell({includeEmpty:false},cell=>{const len=(cell.value||"").toString().length;if(len>max)max=len});c.width=max+4});
  ws.getColumn(1).width=35;

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`NEXT_VESSELS_${new Date().toISOString().split("T")[0]}.xlsx`;a.click();URL.revokeObjectURL(url);
}

// === MAIN RENDER ===
function render(){
  const f=fp(S.from),t=fp(S.to);const saved=loadSaved();
  let h=`<header><h1>⚓ Next Sailings</h1><p>MSC Schedule Search</p></header>`;

  // Search
  h+=`<div class="search-box"><div class="search-row"><div class="port-field"><label><span>🚢</span> Origin</label><button class="port-btn ${f?'selected':''}" onclick="S.fo=!S.fo;S.to2=false;render()"><span>${f?`${esc(f.name)} (${esc(f.code)})`:"Select port..."}</span><span class="arrow ${S.fo?'open':''}">▼</span></button>${S.fo?renderDD("from"):""}</div><div class="search-arrow">→</div><div class="port-field"><label><span>📍</span> Destination</label><button class="port-btn ${t?'selected':''}" onclick="S.to2=!S.to2;S.fo=false;render()"><span>${t?`${esc(t.name)} (${esc(t.code)})`:"Select port..."}</span><span class="arrow ${S.to2?'open':''}">▼</span></button>${S.to2?renderDD("to"):""}</div><button class="search-btn" ${!S.from||!S.to||S.loading?'disabled':''} onclick="doSearch()">${S.loading?"Searching...":"Search"}</button>${S.res||S.from||S.to?`<button class="clear-search" onclick="S.from=null;S.to=null;S.res=null;S.err=null;S.sf='ALL';render()">✕ Clear</button>`:""}</div></div>`;

  // Saved bar
  if(saved.length){h+=`<div class="saved-bar"><span style="font-size:14px;font-weight:600;color:var(--green)">📋 ${saved.length} saved</span><button class="tbtn green" onclick="exportExcel()">📥 Export .xlsx</button><button class="tbtn red" onclick="if(confirm('Clear all saved?')){saveSavedLS([]);render()}">🗑️ Clear</button></div>`}

  if(S.err)h+=`<div class="error">${esc(S.err)}</div>`;
  if(S.loading)h+=`<div class="loading"><div class="spinner"></div><div class="loading-text">Searching MSC schedules...</div></div>`;

  if(S.res&&!S.loading){
    const data=S.res.Data,svcs=allSvcs(data);
    const all=[];window._routes=[];
    for(const i of data)for(const r of i.Routes)if(matchSvc(i,r,S.sf))all.push({route:r,item:i});
    all.sort((a,b)=>new Date(a.route.EstimatedDepartureDate)-new Date(b.route.EstimatedDepartureDate));
    window._routes=all;
    const disp=all.slice(0,S.mx),total=data.flatMap(d=>d.Routes).length;

    h+=`<div class="filters"><div class="filter-row"><span class="filter-label">Service:</span><button class="fbtn ${S.sf==='ALL'?'active':''}" onclick="S.sf='ALL';S.mx=5;render()">All (${total})</button>${svcs.map(s=>`<button class="fbtn ${S.sf===s.name?'active':''}" onclick="S.sf='${esc(s.name)}';S.mx=5;render()"><span class="fdot ${s.direct?'direct':'ts'}"></span>${esc(s.name)}${s.count?` (${s.count})`:""}</button>`).join("")}${S.sf!=="ALL"?`<button class="fbtn clear" onclick="S.sf='ALL';S.mx=5;render()">✕ Clear</button>`:""}</div><div class="filter-legend">${f?esc(f.name):""} → ${t?esc(t.name):""} · <span style="color:var(--blue)">●</span> Direct &nbsp; <span style="color:var(--orange)">●</span> Transshipment</div></div>`;
    h+=`<div class="toolbar"><span style="font-size:14px;color:var(--text2);font-weight:600">${all.length} sailing${all.length!==1?"s":""}</span><span style="font-size:12px;color:var(--text3)">☑️ Check to save → export</span></div>`;
    h+=`<div class="results">${disp.map((r,i)=>renderCard(r.route,r.item,i)).join("")}</div>`;
    if(all.length>S.mx)h+=`<div class="show-more"><button onclick="S.mx+=5;render()">Show more (${all.length-S.mx} remaining)</button></div>`;
    if(S.res.ResultTimestamp)h+=`<div class="timestamp">${esc(S.res.ResultTimestamp)}</div>`;
  }
  if(!S.res&&!S.err&&!S.loading)h+=`<div class="empty-state"><div class="icon">🚢</div><div class="title">Select origin and destination to search</div><div class="sub">Next available MSC sailings will be shown</div></div>`;
  document.getElementById("app").innerHTML=h;

  // Fix cursor position in dropdown search
  if(S.fo||S.to2){
    const inp=document.getElementById("dd-input");
    if(inp){inp.focus();if(S._cur!==null&&S._cur!==undefined){try{inp.setSelectionRange(S._cur,S._cur)}catch(e){}}}
  }
}

async function doSearch(){
  if(!S.from||!S.to)return;S.loading=true;S.err=null;S.res=null;S.sf="ALL";S.mx=5;render();
  try{const r=await fetch(WORKER+`/?fromPortId=${S.from}&toPortId=${S.to}`);const d=await r.json();
  if(!d.IsSuccess||!d.Data||!Array.isArray(d.Data)||d.Data.length===0)S.err=typeof d.Data==="string"?d.Data:"No results found.";
  else S.res=d}catch(e){S.err="Failed to connect. Try again."}
  S.loading=false;render();
}
document.addEventListener("click",e=>{if(!e.target.closest(".port-field")){if(S.fo||S.to2){S.fo=false;S.to2=false;render()}}});
render();
fetchCustomPorts();
</script>
